nt from soy. \n\n&#x200B;\n\nBeware the perfect becoming the enemy of the good in terms of marginal nutritional min-maxing. Okay, fine, maybe soy milk has marginally better nutritional content than normal milk. Maybe I can stomach a white sauce on my pasta with soy milk without quoting Pauli from the Soprano's about the \"rape of the culture\"... Let's grant it. Are all the culinary qualities that the milk provides worth the marginal increase in nutritional value? Are however few grams of fiber I'm getting actually better for me? As a non-vegitarian/vegan I don't think having marginally more vitamins is going to make any effect. Loading up on vitamines really just makes expensive pee if you don't have a deficiency.\n\n&#x200B;\n\nPRICE to VALUE ratio! Urrrrg. If we are going to play the game of this is marginally better than that we also have to think about price! It's not an X vs Y here, it is more like an expected value calculation or a value per dollar comparison! If I get, say, 100 units of value from regular milk, and I get 115 from soy milk, but the soy milk costs 1.5x as much... the better option is still the regular milk even though the soy milk is better quality. (If I was drinking milk, I could just increase my portion size or use my savings to buy something else that makes up the difference). \n\n&#x200B;\n\nHALF A GALLON OF SOY MILK AT WALMART: $2.56\n\nHALF A GALLON OF WHOLE MILK AT WALMART: $1.57\n\n&#x200B;\n\nWhat that means is: the soy milk MUST BE 1.63x. That means we would have to multiply the nutritional value of regular milk by this number to break even. Soy milk is not 1.63x as nutritionally valuable , ergo, switching to soy milk would lower your overall value gained per dollar. It's also debatable if one is better than the other. One has more fat and higher calories (well, that means its worth more per serving, right?), the other has more protean, lower fat, lower calories and some dietary fiber. No where close to 1.63x the value, especially when its LOWER caloric content!"}], "swapped": true}, {"index": 24, "branch_id": "t3_1dichws_1", "title": "CMV: \"Hating another country's government, not their people\" deprives foreigners of agency and fuels prejudice and xenophobia.", "description": "I often hear the phrase \"I hate their government, not their people\" (particularly in criticisms of nominal geopolitical foes of the US or West). For example, \u201cI hate the CCP, but not the Chinese people\u201d. The phrasing makes it seem like the speaker is being nuanced and avoiding bigotry (and this is probably why it\u2019s repeated so often). However, this view 1) deprives foreign people of agency over their own government and affairs, 2) perpetuates suspicion, fear, and hostility towards foreigners that come from such countries, 3) worsens discourse about world issues and makes us worse at defending our own values.\n\nMy argument is essentially that we view the actions of\u00a0*our*\u00a0own governments and our responsibility for said actions in a nuanced way, but we don\u2019t extend the same level of empathy to people that live in other countries.\n\n**Before I start I want to say:**\n\n* This is NOT \u201cwhataboutism\u201d or an attempt to deflect criticism from the actions of foreign governments. I am trying to compare \u201cbad things\u201d the US government has done to \u201cbad things\u201d foreign governments have done and show how we often have a double standard. Not to say that either of those bad things are good.\n* This is NOT moral relativism or a defense or condonement of human rights abuses. I will not engage with any comments that justify crimes against humanity. Moral relativism is a lens by which we can examine our own values. It does not denigrate our values to step into the shoes of another, and we cannot productively engage with others or have good faith diplomacy if we refuse to view our values in a relativistic way.\n* I don\u2019t strongly blame the \u201caverage individual\u201d for the actions of the nation they live. For example, no average American is \u201cevil\u201d because of the carpet bombing of Laos. No average German is \u201cevil\u201d because of the Holocaust. I do believe that we bare responsibility for what our nations do. Even if we are not \u201cevil\u201d ourselves, we are responsible for critically examining those values.\n* For the purpose of this argument, a past government of your own country could fill in for \u201cforeign government\u201d.\n\nThese are my main points with some high level examples we can use to frame our discussion:\n\n1. **A government and the people it governs are inseparable; A government\u2019s actions are a proxy for the values of its people.**All governments are a subset groups of human beings that represent the population of said state. The values of a government are direct reflections of\u00a0*some*\u00a0subset of that groups values. There is only so much a government can diverge from the values of the people it governs before it is seen as illegitimate, and this means that government policy is a good proxy for the collective values of a state\u2019s people.For example, when the US conducted 20 years of war in Vietnam, that was because widely held beliefs by the US population led to a large number of people in government that did nothing to stop it or actively pursued it. (ex. domino theory, anti-communism, racial alliance with French who colonized it prior). Hating the US government for Vietnam and not hating the ideologies that the population accepted and perpetuated denies our people of agency and the fact that they were consciously acting within a frame of reference entire time. We are collectively culpable for the things we do (or choose to not do).\n2. **By**\u00a0**painting the government as a singular villain, distinct from the people, we create a narrative where the citizens are a homogeneous mass of brainwashed victims.**I understand my previous point sits on a spectrum, and we tend to attribute less blame to citizens in non-democratic states for the actions of their governments. But there is never\u00a0*no*\u00a0blame, unless we decide that such citizens are 100% brainwashed and completely incapable of moral or ethical reflection. Even in the PRC, where the Great Firewall guards citizens from what they are \u201cnot supposed to see\u201d, people are still conscious and critical of the information they receive, and the actions they take or see their government take as a result.People often use this same moral copout for bad things that happened in the West, ex. the holocaust or the tragedies associated with Manifest Destiny in the US and Canada. The idea is that the government \u201cat the time\u201d was bad, but the people that did such crimes or were complicit in its doing were just \u201cvictims of a system\u201d. I think it cheapens the lessons we can learn from horrors, because we deny that the American Settler who set up a homestead in rural Kansas, or the chemical plant operations manager that perfected the war-time production of Zyklon-B were conscious moral agents capable of ethical reflection. We either frame them as completely inert (they were just doing their job) or so actively constrained they could not have done\u00a0*anything else*. Of course there are exceptions, but in general this is not true.\n3. **When we profess to hate a foreign government, that sentiment can easily bleed into our perceptions of the country's people and culture more broadly.**With the above in mind, I think that \u201chating\u201d a foreign government often leads to us perpetuating simplistic beliefs on other people in a way that degrades their humanity.If we (implicitly, sometimes explicitly) believe that the average mainland Chinese is weak willed, meek, or prone to brainwashing because of how we \u201chate the CCP\u201d \u2013\u00a0we may treat someone that is (or looks) Chinese badly.If we (implicitly, sometimes explicitly) believe that the average devout Muslim hates LGBT people because we \u201chate\u201d the Qatari government for criminalizing homosexuality or transsexuality \u2013 we may be less willing to extend sympathy when a population of Muslims is suffering.If we (implicitly, sometimes explicitly) believe that the average American is selfish, and doesn\u2019t care about other countries because of (well, a lot of our country\u2019s actions lol) \u2013 we may treat an American as simple minded or ignorant.There are certainly \u201cfollow the party line\u201d Chinese folks, \u201cqueerness is a disease\u201d Qataris, and fat, ignorant Americans that couldn\u2019t point out Puerto Rico on a map. But these are largely stereotypes, and giving into them makes it harder to actually make policy or have conversations that would increase understanding between people.\n\nThat\u2019s a lot, thanks for reading if you got here!", "threadA": [{"author": "MrGraeme", "body": ">A government and the people it governs are inseparable; A government\u2019s actions are a proxy for the values of its people. \n\nThis is objectively false. Governments do not inherently need to represent the values of their people at all. This is especially true for systems of government where power is not derived from the people (read: not democracy).\n\n>All governments are a subset groups of human beings that represent the population of said state.\n\nEven within democracies, governments do not necessarily represent the (the values of) majority of the population. Minority-supported governments exist and are prevalent throughout the world. \n\n>By painting the government as a singular villain, distinct from the people, we create a narrative where the citizens are a homogeneous mass of brainwashed victims\n\nThe point of painting the government as the villain is to avoid treating the citizens as a monolith, which they rarely are. Typically statements against governments are also directed towards their supporters, rather than the population at large. This makes more sense, because the population might not broadly support a government."}], "threadB": [{"author": "ShakeCNY", "body": "\"International rankings. China is considered internationally to be amongst the least democratic countries in the world. It has consistently been ranked amongst the lowest as an \"authoritarian regime\" by the Economist Intelligence Unit's Democracy Index, ranking at 156th out of 167 countries in 2022.\"\n\nOr for an even more challenging example, consider the apartheid regime of South Africa in the 1980s. Were the blacks under apartheid and the apartheid regime \"inseparable,\" and was the apartheid government \"a proxy for the values\" of those people?"}], "swapped": false}, {"index": 26, "branch_id": "t3_1e5e06p_1", "title": "CMV: Standard sheet music is an unintuitive mess that has killed countless people's interest in learning music.", "description": "As some background, I've been making music as a hobbyist for over 20 years in DAWs (mostly FL Studio).  A few weeks ago I began learning piano.  The instrument itself is wonderful.  I love the way it sounds.  I love that you can play chords with one hand and melodies with the other.  Practicing scales is fun.  Practicing chords is fun.\n\nLearning to read sheet music is.... A total nightmare.  You shouldn't have to decipher the Rosetta Stone to figure out which note you're supposed to play, but this is what sheet music asks you to do.  Sheet music doesn't reflect the actual physical layout of a piano whatsoever.  They've decided to map the C Major scale (a 2-2-1-2-2-2-1 pattern) onto a series of alternating (1-1-1-1-1) lines and spaces, which is a totally baffling decision that leads to all sorts of insane notation difficulties.  We need to go through a ridiculous process to figure out what note a symbol on the staff is representing.  Is it a treble clef or a bass clef? OK, bass clef, so now I have to say All Cats Eat Grass... Oh wait, my mnemonic device doesn't extend three lines below the staff where this note is, so now I actually have to count the notes as I move down.  Oh wait, the key signature has four sharps, which is... checks Google... E Major.  Which means this note needs to be sharp.... It can legitimately take over a minute just to figure out what one single note is.  And that's not even getting into the ridiculous way that rhythm is notated, with measures of differing physical widths and all sorts of weird symbols to denote things that would've been obvious if you had just placed them on an equally spaced grid.\n\nI genuinely think this miserable, arcane system has caused many otherwise potentially talented musicians to just give up.  And before you go saying \"Well they couldn't have been great musicians if they couldn't learn sheet music\", I heartily disagree.  Nothing about learning sheet music has anything to do with actual music... It's a terrible exercise in rote memorization and deciphering somebody's ridiculous secret code.\n\nAs for alternatives, I've tried reading two other systems that seem to be just completely superior to sheet music in every way.  The first is the hooktheory website.  Now this is a sensible way to notate music.  It gives you the key of the song (I don't need to memorize that four sharps means E Major).  The songs are notated in a piano-roll like format, where the notes are color-coded according to their position in the scale and note names are shown on the left side.  The chords are numbered and named below the melody, and also color coded.  Accidentals are shown on the lines between notes and color coded with stripes of the note above and below.\n\nBut even better than that is Klavarskribo.  This is a notation that just lays out the piano on the page.  White notes are shown as white.  Black notes are shown as black.  Measures are equally spaced out and you can just look at the spacing to know when to play things.  I legitimately was able to just start playing songs of any key, spanning all over the piano, no problem whatsoever, in Klavarskribo notation because it's just an intuitive format that matches the piano perfectly.  Weeks of sheet music study, 2 minutes of Klavarskribo study and I'm already better in the latter.  That speaks volumes.\n\nSo yeah, sheet music is a mess and there are better alternatives.  I think it's important because again, people are being pushed away from learning music by this awful system.  Things that won't change my view:\n\n* \"I learned it! Many people have learned it! Therefore it's fine!\" No, just because you learned it doesn't mean it's a sensible system or that it hasn't turned many others away from music.  \n\n* \"Well it's everywhere now so you'll just have to get used to it!\" Yeah I know, that's why I'm still learning it.  Doesn't mean it's not an unintuitive mess.  And it doesn't mean we shouldn't try to incorporate other alternatives, especially for beginners to learn.\n\nThe one argument I've heard that might make sense is the compactness of sheet music.  But I haven't actually seen any data showing how much more compact it is (or even if it is at all) than other systems.", "threadA": [{"author": "konnar540", "body": "I mean at least it's generalized to all instruments and you can figure out how to play any note on any one of them if you know how to play a note on an instrument. Would you rather get familiar with 1 notation system for every instrument ?"}], "threadB": [{"author": "Antioneluke", "body": "I will preface this comment by saying yes, sheet music in its modern form is confusing, but is ultimately the best system we have for immediate recognition of how to play music. \n\nSo let\u2019s look at the issues with the piano roll in particular. The biggest issue is going to size. Laying out notes on a piano roll takes up significantly more space on a page of music than our current system of sheet music. If I want to play a melody from one end of the piano FI another it might take up nearly an entire sheet of paper or screen on a tablet. Page turns are incredibly difficult for a pianist and moving to a system that creates more is asking for more mistakes in a performance or sight reading. What if I\u2019m a pianist accompanying a signer and I want to know what they\u2019re singing as I\u2019m playing? I could have a separate piano roll above the piano part, but now I\u2019ve created even more page turns for myself. Maybe the singers part could be written on the same roll, but if their range is similar what I\u2019m playing then it becomes nightmarish to read. This problem is only further heightened when we add more instruments. A conductor would have an impossible task of knowing who\u2019s playing what at any given moment. \n\nNow for any other instrument would we show the entire piano roll? Or just the subset of notes that that instrument can play? If we do that, we\u2019ve just reinvented clefs. I think all of the clefs having different notes for the same lines and spaces does not make logical sense, I agree with you on that point but let\u2019s not destroy the whole system to change that singular aspect. \n\nIn terms of rhythm, regular sheet music is easier to read than a piano roll. If I\u2019m playing a rhythm that is 6 sextuplet eight notes to 7 septuplet eight notes (a rhythm I have ahead to read in oboe in the past) the difference in size between those notes on a piano roll is minuscule and is hard to see at first glance, even for a trained musician. In modern sheet music, each set of notes would have a 6, and a 7 above each set of notes respectively. It\u2019s still hard to play, but I now know exactly what needs to be played. This is just one example of a complex rhythm that would be harder to read on a piano roll. Whole, half, and quarter notes may be easy to read on a piano roll but that\u2019s rarely all you play as a trained musician. \n\nTo summarize my main argument, modern sheet music is most concerned with being easy to sight read for trained musicians. If you want to a professional performing musician, modern sheet music is better at conveying information than a piano roll will ever be. While it is difficult to learn in the beginning, it becomes second nature and ultimately beneficial in the long term to learn. A hobbyist pianist like yourself may not ever really need to learn sheet music, I rarely teach my guitar students sheet music because tablature does the job just fine for what they are doing. But for someone who performs an instrument as their main career, the benefits of modern sheet music outweighs its drawbacks."}], "swapped": true}, {"index": 43, "branch_id": "t3_1mcggli_1", "title": "CMV: Despite Trump, Europe has a much grimmer future than Asia or North America.", "description": "I've tried hard to love Europe and want it to succeed but I see no clear path to it ever overcoming collapse (before people say yEah bUt eUorpE iS 27+ cOuNtRieS) im talking about every single one collectively especially the ones with Euro as their currency and the larger theme of the continent itself.\n\nEuropeans love mocking America and ive seen how bad it is getting there Trump, guns, fast food but we never look inward. Europe faces the worse problems, just hidden better and somewhat even in denial. Aging populations, deindustrialization, and policies that punish the young with sky-high taxes, unaffordable housing, and zero real growth. The experience of being a young person in europe is completely different from the glamourous tourism people outside of it think, i\u2019ve yet to meet a single Gen-Z European who\u2019s genuinely optimistic about their future, any talented european that gets an oppurtunity still moves to UAE or US despite critisizing them, its almost hypocrytical.\n\nGermany shut down its last nuclear plants during an energy crisis, most of europe is riddled with green hypocrisy and net-zero laws that have punished the young by shifting jobs elsewhere. The UK is collapsing. France is politically gridlocked and bleeding talent, even skilled youth are fleeing abroad. But these are just symptoms.\n\n* Real wages (esp PPP adjusted) in China\u2019s urban regions are now catching up to and in some cases surpassing Southern and Eastern Europe.\n* Germany, has negative real wage growth and rising living costs. Half of Germans reportedly have less than \u20ac1,000 in savings.\n* Italy\u2019s youth unemployment is above 20%. Spain\u2019s isn\u2019t much better. Entire generations are locked out of home ownership and capital accumulation, it offers nothing more than being a vacation spot.\n* Pension and healthcare systems are unsustainable, with shrinking workforces forced to support massive aging populations.\n* Tax burdens on the working-age population are brutal, especially for those who want to start a business, invest, or build anything new.\n* There is an increase in anti-free speach and censorship across europe sometimes in worse ways than america, im not fear mongering like JD Vance but the actual publications by the EU and the UK's new online safety act.\n* It is a region of various languages, internel divide (even within its own countries) so it will never be united against common problems.\n\nIt is cliche, even a meme to suggest or say the US and China are racing ahead in AI, semiconductors, biotech, and deep tech. Europes startup founders are some of the most miserable ive see and are always just looking to find their comapny then flee to the US or Middle East where they are treated better. US, China and even India manufacture the EVs, solar panels, and servers europeans will depend on while contributing little back and only get poorer.\n\nIndia, Vietnam, and even Indonesia are leapfrogging Europe in digital infrastructure, fintech, and manufacturing investment. While europe will head nowhere.\n\nAnd before anyone jumps in with \u201cbut Trump\u201d, yes, the US has its dysfunctions. But the US still has a clear path to course-correct. Presidents change. Policy swings happen. Beneath all the noise, America\u2019s industrial base is real, it still builds planes, chips, AI models, biotech, rockets. It has deep capital markets, global reserve currency status, and still attracts the world\u2019s top talent still lives to go towards US salaries. europe's problems are far more structural.\n\nConvince me I\u2019m wrong, or give any points that make it look like this region of the world can still deliver for the young - CMV.", "threadA": [{"author": "Ok-Bug-5271", "body": "So first off, I am going to say that I agree with your viewpoint that, despite Trump, the US economic picture looks pretty rosy. Moving on, there are a few metrics where I'm going to disagree.\u00a0\n\n\nSo first off, I'm going to change your mind that Europe is in a worse position than Asia and let's ignore North America for now. I'm going to separate the \"Asian countries\" into two buckets, one of them being high income like Japan and Korea, and the rest into low income. This doesn't really grasp the full nuance because obviously middle income countries like China and Malaysia are pretty different from places like Papua New Guinea. However for the crux of my argument, these differences won't be relevant relative to Europe.\u00a0\n\n\nRegarding the high income Asian countries, like Japan and Korea, in what regard are their futures and less \"grim\" according to your metric than Europe?\u00a0European countries have higher birthrates on average than most Asian countries. Europe also has higher rates of immigration to make up for its shrinking population than most Asian countries. So pretty much all of your points about why Europe is doomed that relate to population is even worse in most of Asia.\u00a0\u00a0\n\n\nNow for the rest of Asia, honestly most of my prior points apply. Most poor Asian countries actually have shockingly low birthrates. They might have higher economic growth for now as they're catching up in development, but I don't see any reason why we shouldn't think that the long-term future looks more grim for poorer countries like Thailand that are going to face their demographic crisis before they even fully develop. There are some exceptions here, Vietnam and China may very well escape the middle income trap, but their demographic trends are still far worse than Europe.\n\n\nThe second way that I am going to change your view is the idea that the future is \"grim\". Europe currently has among the highest quality of life on the planet. Low crime, high disposable income, plenty of free time, long life spans, etc. Within Asia, it's pretty much just Japan, Korea, and Taiwan that can claim similar standards.\u00a0Even if Europe stagnates for decades, it would still take decades for most Asian countries to even catch up to Europe's current quality of life. If a \"grim\" future to you looks like working 30 hours a week, having months of paid time off, living long healthy happy lives, then I think we have pretty different definitions of grim. Sure, current forecasts don't show Europe booming any time soon, but I think there's a pretty big difference between having a doomed future (where I typically imagine everything falling apart and getting worse) and a future that maintains the current pleasant status quo.\u00a0\n\n\nMy third point is going to compare Europe and the US. I'm not sure why you said North America when Canada has a pretty similar economic model to Europe. Also the US deindustrialized more than Europe. If your viewpoint is that deindustrialization is why Europe is doomed, then the US is the perfect foil. While Europe kept more of its export-driven manufacturing economic model than the US (just compare manufacturing as % of GDP), the US economy boomed precisely because it transferred away from manufacturing towards higher value industries.\u00a0Anyway, I'm going to preface this that economically, no matter how you slice it, the US has gotten richer relative to Europe. Yes, even if you account for PPP, yes, even accounting for healthcare, yes whatever other excuse doomers on reddit want to come up with without ever actually looking at the data.\u00a0\n\n\nSo I'm not going to disagree that the US is actually secretly doing worse economically. I'm instead going to try to change your view regarding what a grim future looks like. Compare the average annual working hours by OECD countries over time. Most of Europe used to work similar hours to the Average American, but over time, the average European began working less and less hours while American hours declined less than their European counterparts. Likewise, while life expectancy continues to grow in most of Europe, it has been more stagnant in the US (and some demographics in the US have even seen life expectancy drop). Likewise, Americans on average retire later in life than the average European.\n\n\nSo when discussing a grim future, I honestly find it far more grim that a child in America will grow up working just as many hours, taking very few vacations, and retiring later than their parents even if they will have more disposable income than their European counterparts.\u00a0\n\n\n\n\nTL;DR, Asia has worse demographics, Europe is quite a pleasant place to live, and even if Americans keep getting richer, Europeans will still keep having higher life expectancy and work less hours, and have plenty of vacation time and an earlier retirement date relative to the US. Would it be good if Europe also kept getting even richer? Obviously, but stagnating at high development and quality of life hardly seems from."}], "threadB": [{"author": "mavrik36", "body": "America's Industrial base is in China, at least in europe you can see a doctor and theres rent control, the problems youre describing are happening in an even more pronounced way in the US because have ZERO social safety nets"}], "swapped": false}, {"index": 95, "branch_id": "t3_1dkmobe_1", "title": "CMV: The average Man is more oppressed in the US than the average Woman.", "description": "I observe a country where 80% of suicides are men, university graduates are predominantly women, and most women I know have enjoyed abundant opportunities, validation, and love at every turn. \n\nYet, men collectively are labeled 'privileged.' They face open mockery and belittlement from women online and in the real world, excused as 'punching up,' while any critique of women as a group is swiftly condemned as sexist and misogynistic.\n\nThough sympathy for men's societal expectations exists, the will for action to be taken on the issue is nonexistent. Both men and women overwhelmingly expect men to embody physical strength, emotional stability, and financial prowess to deserve respect and love. Despite efforts to deny or virtue-signal above these subconscious biases, evolutionary biology has hardwired these expectations into our psyches.\n\nMen's lives are etched with experiences searing this harsh reality into their minds\u2014accept and overcome or suffer a lonely death as a depressed failure. In contrast, women are often told by both sexes that they're inherently worthy, and any hardship or disrespect is blamed on societal misogyny. Our culture perpetuates the narrative that women's hardships stem from systemic injustice, while men's derive from personal failings and inadequacies.\n\nAm I wrong? Please change my view!", "threadA": [{"author": "ApprehensiveGrade872", "body": "You said average so let\u2019s look at averages. Forbes says that on average, women make 16% less than men. So despite women graduating college more than men, they do so often in lower paying fields which make less money. AAMC says 37% of doctors are women. The us census as that a bit over a third of lawyers are women. There are more examples but the point is that men are still on average more successful financially than women are. \n\nIn terms of power, only 28% of congress is made up of women and 74 out 500 Fortune 500 companies have female CEOs. 0 presidents have been women. Women hold a relatively tiny share of powerful positions which should be important in terms of oppression which is what you\u2019re saying. \n\n\nMen have a harder time getting the women they desire and yes they face real hardships but patriarchal standards are what you\u2019re are indicating make being a male harder. It\u2019s that you aren\u2019t validated for your emotions or made to feel important. These are things that I believe are starting to change as our society moves towards greater equality (masculinity was a much bigger issue in past decades and being called weak for emotions and such more common)\n\nI don\u2019t see why men (I am one) try to frame the hardships faced as a gendered issue. Class is a far better way to assess the issues people suffer than gender for so many reasons but if you\u2019re just looking at gender I think you need to take a really holistic view. More men are murdered but far more murderers are men than women. 1/6 women have been victim of rape or attempted rape. Women are far more likely to be trafficked and victims of domestic violence. Women likely suffer in greater numbers from eating disorders and body dysmorphia despite these affecting men as well. \n\nI truly respect the struggles you may have faced as a male in our society but the ways in which u have suffered may be distinct to men while there are many others that are distinct to women. Viewing the world this way will make u resentful and angry towards women when a healthy outlook on gender has a far greater chance of playing out in your favor."}], "threadB": [{"author": "ConsultJimMoriarty", "body": "I read an extremely interesting article earlier this year, about how the world was built by men, and therefore, for them.  A lot of examples included that the vast majority of things we use with our hands - phones, tools, keyboards etc - are *always* built with the average man\u2019s hand size in mind. That\u2019s why a woman can\u2019t take a photo with her phone with one hand, and why women are more likely to be injured in construction work - the tools are literally not designed for her to be used properly.  \n\nIt also went on to explain PPA gear, and how for both police, armed services and health services, *none* them are designed with an average female body in mind. This means that the gear is next to worthless, because it\u2019s too big and/or too long or too small to protect her chest.\n\n Vehicles of all kinds, too - women drivers are not considered in the design process. It\u2019s always built for an average man. \n\nThink about it - is it oppression to live in a world that is literally created with you as the focal point?\n\nI don\u2019t feel oppressed for being a man and I certainly don\u2019t think women have it easier."}], "swapped": false}, {"index": 31, "branch_id": "t3_1i61xbn_1", "title": "CMV: Canada becoming a US State would be disastrous for Republicans.", "description": "Putting aside the obvious anger this would cause throughout both countries, and the general stupidity of the entire premise, if this plan were to go through and Canada became a state, I don't see a way that it would ever benefit Republicans. On the whole, my understanding is that Canada is generally more left leaning than America (not a high hurdle) and issues like healthcare costs and abortion rights would not be ones they'd be likely to want to bend a knee on. And, assuming the entire country was brought in as the 51st state, that'd mean they'd have the most influence of any singular state in the House. And if the provinces were kept separate and made individual states, that'd be 20-26 new seats in the Senate depending on how the territories are treated, the majority of which I would imagine would normally be democrats. While some of those new states may be more right-leaning than others, I struggle to believe that many, if any of them would be right-leaning by US standards, meaning that it'd be very difficult for Republicans to ever win an election again. The only ways I see this being idea being a net neutral for Republicans is if they either plan to bring Canada in as a territory, rather than a state, or simply don't plan to ever have an election again.\n\nTo change my view, one of these points would have to be refuted:\n\n1. Canada is, generally speaking, more left leaning than the US.\n\n2. Regardless of whether Canada is brought in as one state or 10-13, democrats would overwhelmingly be the ones to benefit in future national elections.\n\n3. The prior two points would make it nearly impossible for Republicans to win future national elections.\n\n4. Republicans should be concerned about the prior 3 points, and should logically be against Canada joining the US for those reasons.", "threadA": [{"author": "iryanct7", "body": "Trump won by 86 electoral votes. Even if Canada joined before 2024, Trump would have still won."}], "threadB": [{"author": "mcmur", "body": "You are making me laugh thinking we would get any votes at all in the EC or senate. \n\nIf the US took Canada over forcefully it would probably be more akin to Puerto Rico where on paper Canadians would now have US citizens ship but have no votes when it comes to federal elections including presidential elections."}], "swapped": false}, {"index": 0, "branch_id": "t3_1ctzqv1_1", "title": "CMV: In order to thrive at business you either need to have no empathy or be able to reprogram yourself", "description": "I was reading a speech from Charles T. Munger today. This text talks about how Sam Walton managed to destroy the businesses of many small town merchants, then grew and could go against bigger companies, all the way until he built the giant Walmart ended up being. He mentions Sam Walton was ruthless, and went out of his way to win over all these other businesses.\n\nHe then says:\n\n>\u201cI personally think that the world is better for having Walmart. I mean, you can idealize small town life, but I\u2019ve spent a fair amount of time in small towns. And let me tell you\u2014you shouldn\u2019t get too idealistic about all those businesses he destroyed. Plus, a lot of people who work at Walmart are very high grade, bouncy people who are raising nice children. I have no feeling that an inferior culture destroyed a superior culture. I think that is nothing more than nostalgia and delusion.\u201d\n\nLet\u2019s assume Charlie Munger truly believes this from the bottom of his heart and it is not a rationalization to be able to convince himself that investing in Walmart is morally good.\n\nIt got me thinking there is no way someone can be good at building a capitalist company with an idealized view of the world. Idealized in this case meaning a world where everybody is better than before you were thriving at your business.\n\nCharlie points out that he believes the loss of small family-owned and operated stores is progress. In order to be able to replace such stores, with small owners and their families sustaining themselves, you need to be ruthless at combating them.\n\nThere are many things that need to happen a certain way for a business such as Walmart to become as big and important as it has been. Sam Walton must have dedicated a lot of effort and done many things well. Charlie Munger does not go into details and we don\u2019t know what Sam Walton had to do in order to get Walmart on the top.\n\nWhat is clear in my opinion is that the mentality Sam Walton needed to have to be able to do what he did requires one of two paths.\n\n* He had a strong sense of morality and truly believed he was going to make a better world, and therefore the end justified the means.\n* He had a strong will to be the best at what he did, and he did not care however many other people lives he destroyed as long as he came on top.\n\nWhy? Because for a company to win they need to be able to offer better prices, a better model, something to outweigh competition. In the early days, such competition was a small store, owned by a family, who only knew that way of living. By offering a much better option for customers, and winning, inevitably you are going to condemn that family to a harsher life, at least until they figure out a new livelihood.\n\nYou could again rationalize this in a million ways. You could think that probably this family will be okay, maybe they are also competitors that did this to others, maybe you could say that in your place they would have done the same. But the fact is you need to either believe the world will be in a better place if you win over them or you need to believe that your goal is so important and the world is so unjust that you winning justifies everything.\n\nThis means that the only way to win in business is by being ruthless and not caring about others or by convincing yourself that whatever you do to win, you winning is the best option for the world.", "threadA": [{"author": "Finklesfudge", "body": "You seem to be looking at one *extraordinarily extreme* set of businesses and assuming that is the example of 'thriving' at business no?\n\nIf that one small extreme minority set of business is the key to your point, that's fine, but I would think you need to better differentiate between that, and the concept throughout your post which is simply about \"businesses thriving\"\n\nThere are literally ten thousand times more thriving businesses that are not the Walmarts and Amazons of the world.  Almost all of which don't fit any of the criteria you've laid out."}], "threadB": [{"author": "erutan_of_selur", "body": ">It got me thinking there is no way someone can be good at building a capitalist company with an idealized view of the world. Idealized in this case meaning a world where everybody is better than before you were thriving at your business.\n\nMilton Hershey is the exact opposite of this.\n \n 1.)He wanted to build a Utopia for anyone who worked at the Hershey Plant.\n\n2.)He cut bonuses, but in doing so devised a way to keep all of his employees employed throughout the great depression. \n\n3.)He would build amenities for his town as requested by the factory workers. So for example, when movie theaters hit the mainstream he built one almost immediately. \n\nHenry Heinz is another example.\n\n 1.)It was malicious compliance but he basically created the modern standard for food hygiene. When people were preserving food with stuff like formaldehyde and people were dying from stomach cancer due to such food preservatives he pushed forward legislature. The malice is that it was good for his bottom line to get imposter ketchups full of trash off the market but it still benefitted everyone and so so to this day.\n\nBoth of these men are household names over a hundred years later, and they were in no way as ruthless as you've described.\n\n\nLastly you have Bill Gates. If you disagree with Microsoft's role in how much better your life is that's fine I guess, but consumer computing is something I think that his been mostly good for society even if it's been not so great for the individual. We are eons more data driven than we were 30 years ago. That has had it's ups and downs to be sure, but I think it's fair to say the outcome is more positive than the negative.\n\nLike or Hate Bezos: 2 day logistics from Amazon down from 3 to 6 weeks from the 1990s. Better for everyone.\n\n>Why? Because for a company to win they need to be able to offer better prices, a better model, something to outweigh competition. In the early days, such competition was a small store, owned by a family, who only knew that way of living. By offering a much better option for customers, and winning, inevitably you are going to condemn that family to a harsher life, at least until they figure out a new livelihood.\n\nThis is loss focused. Everything is a tradeoff. You need to ask *yes we lost this, but what did we gain for it?* Because frankly, as a consumer I hate mom and pop shops anymore. Should EVERYONE have a harsher life just so a few people can have a less harsh one? \n\n>This means that the only way to win in business is by being ruthless and not caring about others or by convincing yourself that whatever you do to win, you winning is the best option for the world.\n\nYou can improve the world at a cost. That's literally the colloquial cost of progress.\n\n\nYou're hyper focused on the people who lost something, but I'm sure you're not complaining for example about all the coal towns who lost their jobs due to transitioning to green energy caused by those evil solar companies making energy generation greener and more affordable!"}], "swapped": true}, {"index": 30, "branch_id": "t3_1fj5qc5_1", "title": "CMV: The Minimum Driving Age in the US SHOULD be 16. ", "description": "I think the minimum driving age in the US being 16 makes sense. \n\nSteel Man: Granting literal children the ability to legally barrel down the highway at 70+mph in half a ton of metal with no supervision doesn\u2019t make sense.\n\nMy Opinion: \n\n 1. American infrastructure is car-centric. This is fact, partly because of automobile lobbyists, partly because of the sheer size of the US, and mostly because the infrastructure for the US, especially the western half was built post Industrial Revolution and the popularization of automobile travel, unlike out European counterparts. Outside of a half dozen East-Coastal metropolises (metropoli?), most parts of America are just not reasonably accessible by public transportation. \n\n2. Cars are relatively cheap. You can get a beater that runs for about 3 months min-wage salary, if you are living at home and saving it all. This is not the case in many other countries, but the US has .9 cars per person, higher per capita rate than any other country > 10 million citizens.\n\n3. Income inequality is large in America. Yes the US is a very wealthy country, but for the have-nots, it can still be tough. College is expensive, and even Community College while inexpensive is often difficult to access in rural communities. Trade schools, certifications and boot camps to try to further one\u2019s career can be expensive. Many kids need to work to start preparing for their future, and having a car helps jump start that process.\n", "threadA": [{"author": "destro23", "body": "Why have driving, one of the most dangerous activities a person can do, be an outlier from out typical age of majority? Why, if we already recognize that young people are too immature to drink (lower chances of death) enter into contracts (no chance) or join the military (still lower than driving) should we let them do the more dangerous thing sooner? \n\nThe US driving age should be 18, just like everything else. (drinking age should be lowered to comport with this view)"}], "threadB": [{"author": "TexanTeaCup", "body": "16-19 year-old drivers are involved in a higher rate of car accidents than other age groups, and have a higher risk of death in a crash. Three times higher than drivers aged 20 and older.\n\nMinimum driving ages reflect concerns about maturity and judgement of younger drivers. Your comments don't address these concerns at all."}], "swapped": false}, {"index": 193, "branch_id": "t3_1m4qdi0_1", "title": "CMV: The English grammar rule to put personal pronoun last (i.e. \"John and I went to the store\" vs. \"Me and John went to the store\") is unecessary in nearly every circumstance.", "description": "The main purpose of grammar should be to eliminate confusion and to maximize understanding during communication. It should not be an arbitrary list of rules. \n\nThere are clear reasons for tons of grammar rules that increase comprehension when communicating - for example it is easy to think of examples where the oxford comma eases communication and eliminates ambiguity. \n\nThere is not a clear reason I can understand for the \"personal pronoun must come last rule.\" If I say \"My and my brother went to the store\" there is no way someone would be confused compared to saying \"My brother and I went to the store.\" The same meaning is understood in both cases. \n\nI can't understand the purpose of this rule nor correcting people about it in most communication. ", "threadA": [{"author": "ThePhilVv", "body": "Just a heads ups: \"Me and John went to the store\" is not correct, not because of the order, but because you would never say \"Me went to the store\".\n\nThe reason we put the personal pronoun last is because the \"John and\" is extra information. The main point is \"I went to the store\". If you put the extra information in square brackets and add it in, it makes more sense to say:\n\n>\\[John and\\] I went to the store.\n\nthan it does to say \n\n>I \\[and John\\] went to the store.\n\nInserting the extra at the beginning makes more sense than adding it to the middle. You could also add it on the end with\n\n>I went to the store \\[with John\\].\n\nand still have a very complete and sensible sentence. \n\nAnd again, based on your example, saying the following is nonsense cause you can't remove the extraneous info and still have a correct sentence:\n\n>Me \\[and John\\] went to the store."}], "threadB": [{"author": "coolpall33", "body": "The only real reason I can see for the ordering is politeness. The order of address signifies relative importance (ie most important first), so by putting yourself last in the order you\u2019re demonstrating a bit of humility.\n\nI think once you\u2019ve got a system / rule in place it does make sense to encourage people to be consistent with it as that likely reduces potential confusion,  misunderstandings, and speeds up communication - if people spoke using Yoda-like grammar some of the time, it would be quite confusing.\n\nAs an example of this I actually have Japanese friends whose English names are pronounced \u2018I\u2019 and \u2018Mei\u2019. It would be confusing more if you aren\u2019t strictly keeping to the name ordering convention."}], "swapped": false}, {"index": 147, "branch_id": "t3_1e7a220_1", "title": "CMV: Warhammer 40k is poor satire", "description": "To start, I'm happy to admit my familiarity with the setting is casual. I don't play any of the board games, have little interest in most of the video games, either. Most of what I know is from reading a half dozen Horus Heresy books, browsing wikis, and conversations with fans. If there are obvious things I'm missing, I'm open to that. Though, I'll also say that if you have to dig into obscure lore from short paragraphs written in the margins of old physical codex books or back issues of White Dwarf to \"get\" the points of the setting, then it's still probably not doing a good job \n\nSo, in the 41st millennium, the universe--and humanity in particular--has descended into brutal wars of survival on every possible front. Once, there was a big special guy, the God Emperor, who spent tens of thousands of years trying to orchestrate an ascension, an escape, for his people, but due to the meddling of various Chaos gods, just as he was in the middle of his great crusade to unite all his people under the rule of order, he was betrayed by his favoured sons and mortally wounded. Ever since, he exists at the brink of death, sitting on his golden throne. Without his guidance, and against his wishes, humans have stagnated, become theocratic fascists who spend as much time trying doing silly superstitious (or are they?) rituals and burning heretics as they do fighting their enemies, with no real ambitions to make anything better \n\nAnd that's all fine. As plot, it works well, and for sure there are fits and starts of poking fun here and there. Like, the fact that the Emperor of Mankind was kind of a huge piece of shit, who was too busy trying to do intergalactic genocide and create his psychic mind palace to, like, give his \"favoured sons\" a thumbs up and a hug every now and then, destroying thousand of years of his perfect planning overnight. That's fun, in its own way. It works. All the stuff about the space marines becoming hyper religious technophobes because they can't move on from worshiping the one guy who constantly told them worship was bad has some charm. The \"grimdark\" aesthetic itself is neat, but also reveals the flaws in the foundation. It's the cosmology of Warhammer that undermines it\n\nBeing over the top as a joke is fine, and leaning in to bad systems to show that they suck is also good. The problem is that Warhammer can't wink at us. You take something like the Starship Troopers movie, which also has a future of fascism, and even tries to make it look good. But it also tells you what's going on, it lets you know that the humans here aren't the good guys because they're the ones invading territory. They are the cause of the problems, and using the blowback as justification to perpetuate all the bad things they wanted to do anyway. That's important. It's also important that, because of that, it doesn't have to be that way. These people could live in a democracy and have peaceful relations with those around them, and clearly that would be better for everyone \n\nAnd then you have 40k and you have Chaos and the Warp. Everything else, the orks and the Tyranids and the space elves. They are enemies of humanity, but humanity could be fighting them or not in plenty of different ways that are better or worse than all the terrible shit they're doing. But not Chaos. Just being aware that chaos exists makes falling under its sway likely, if not inevitable. That's a core feature of the setting. So, when you have a regime of secret police that go around executing people who looked at them funny one time, that seems like an extreme response, but the more of it there is, the less so that becomes. It's not just plausibly justifiable, but starts to become the rational response. You may not like it, but what else can be done? Helldivers will tell you the government had to \"put down\" a worker action in some factories to benefit the war effort, and you know what that means and how silly it is. 40k tells you that an Inquisitor had to exterminate all life on an entire planet because some of the people there started talking funny and, I mean, what else are they gonna do? \n\nThere's no real alternative, and importantly, none of this is their fault. Humans create the dystopia everywhere else, and they could have not done so. That tells us something. Humans didn't create the warp, they didn't create the chaos gods. They're victims trying to defend themselves, using only the tools they have available. Could they do it better or nicer? Probably, but also probably not \n\nI know it's a problem in the community, the whole fascism thing, and how there are way too many unironic dorks being weird about that. But, honestly, this is Games Workshop's own fault. It's way too easy to justify anything because the setting itself implicitly sanctions \"evil\" as the status quo. If things can't be different, then it's hard to coherently critique anything \"bad\" going on. What's left is all the actually sincere heroism and badassery the theocratic fascists accomplish \n\nAnyway, that's my bit. I'm open to changing my mind", "threadA": [{"author": "KreedKafer33", "body": "So this is a thorny question, OP. On one level you are correct that the current fluff writing team have lost sight of the satirical side of 40k. It's it has increasingly moved away from satire to heroic sciencd fantasy. I would encourage you to look into Rogue Trader era 40k fluff.\u00a0 The OG universe leaned much into satire of militarism and it was free of a lot of the elements that muddy the waters.\u00a0\u00a0\n\n\nFor example, Space Marines in Rogue Trader were less Knight's Templar in space and more the dregs of society (Youth Gang members, Criminals and the Unwanted) brainwashed and press ganged into an endless war.\u00a0 There was no Horus Heresy either.\u00a0 Originally the Emperor was just old.\u00a0 He's so old that he's become an ancient, senile husk kept alive by an all consuming war machine he set in motion before anyone was born.\u00a0 A machineb which has run out of control which needs endless war to justify its own existence.\u00a0 Less Space King Arthur and more Space Ronald Reagan.\n\n\nHowever, I think your view of Satire is needlessly narrow.\u00a0 It's a symptom of Twitter/Tumblr/Reddit word games. Change the definition of Satire so only things you like fit, then declare everything else invalid.\n\n\nSatire can also describe a style of storytelling where you imagine series of events so bleak, awful and depressing that it loops around full circle and becomes an absurdist parody of itself.\u00a0 This is useful for game fluff because, if everyone is a horrible person, we don't have to feel bad when bad things happen to them.\u00a0 No one has to feel bad that the \"good guys\" lost when there aren't any \"good guys.\"\n\n\nHelldivers II is an excellent example of this.\u00a0 Super Earth may be an authoritarian Technocratic, tyranny of the majority, but the world they inhabit is so fundamentally awful, and the titular Helldivers are such jackbooted thugs that it's not tragic when our character gets reduced to a dismembered torso and cape by friendly fire for the umpteenth time.\u00a0 It's funny.\n\n\nSo you're kind of right that 40k started as a definite satire of Reagan/Thatcherite Britain,\u00a0 then moved to a more general \"Grimdark to the point of self parody\" satire and current 40k has gradually shed even that style to focus on more straightforward heroic space fantasy.\n\n\nI guess this is a really long-winded way of soft agreeing with you, OP."}], "threadB": [{"author": "10ebbor10", "body": ">But not Chaos. Just being aware that chaos exists makes falling under its sway likely, if not inevitable. That's a core feature of the setting. So, when you have a regime of secret police that go around executing people who looked at them funny one time, that seems like an extreme response, but the more of it there is, the less so that becomes. **It's not just plausibly justifiable, but starts to become the rational response.** You may not like it, but what else can be done? Helldivers will tell you the government had to \"put down\" a worker action in some factories to benefit the war effort, and you know what that means and how silly it is. 40k tells you that an Inquisitor had to exterminate all life on an entire planet because some of the people there started talking funny and, I mean, what else are they gonna do?\n\nThis, I will contradict.\n\nIt is easy satirize the fascist, by saying that they're wrong about whatever threat they are talking about. It's not that it's not true, fascists love to lie and exaggerate, but it doesn't hit at the core of their argument. \nThe core of their argument, is that in a deadly battle to the knife, they would be the best choice.\n\nAnd that is where you can/must satirize them, because it's absolutely not true. Fascists suck at war, and so does the Imperium and it's various institutions.\n\nTake the Inquisition. They have been given the perfect setup to justify a massive, intrusive, genocidal intelligence operation. And what happens, well the rampant paranoia, massive concentration of power in individual without oversight or accountability, that all combines to create an intelligence service that does not work, because half the time it's accusing itself of heresy.\n\nReally, you got dozens upon dozens of inquistitorial movements, all fighting one another in order to get to the truth."}], "swapped": true}, {"index": 83, "branch_id": "t3_1g6vsv0_1", "title": "CMV: RE Agent fees are way too high.", "description": "I am a financial advisor that has worked with clients as they go through the home purchase process. For some it's an investment property, but for most it's a primary home. I am regularly disgusted by the high fees agents charge while doing so little work. While I think selling agents also are over compensated, I will accept they put in more work.\n\nFor the typical experience, the majority of my clients have found houses to tour themselves (no notice from their agents, everything is online), and have only gotten the agent involved only when they want to put in a bid. The agent will then tour the property talk to the client and set up a bid offer. In my area houses are going for well over a million, but we will use a million dollar average house with the noticeable workload broken down as such (as explained to me by several different clients):\n\n1 hour touring the property  \n1 hour speaking with client agreeing to terms of the bid  \n1 hour setting up the paperwork (and this is usually done by an admin.)  \n1 hour follow up for counters or whatever\n\nThe average number of bids has been around 6 per client, for a total average hours of 24 hours (generous number).\n\nLet's also assume 6 hours (give or take) for closing.\n\nFor the average commission of 2.5%, selling real estate agents are earning over $1,000 per hour of work. If we assume the selling agent might work twice the number of hours per client that's still $500 an hour.\n\nTo CMV, explain what duties I'm missing that lower the hourly rate, or what value earns the hourly rate. Why not just work with a real estate lawyer. And I will not accept any comment discussing how much time it takes to get a regular flow of prospects. \"Foot in door\" hours happens in every industry.", "threadA": [{"author": "MrGraeme", "body": ">For the typical experience, the majority of my clients have found houses to tour themselves (no notice from their agents, everything is online), and have only gotten the agent involved only when they want to put in a bid.\n\nThat sounds like your clients are doing the job of real estate agent themselves - which is fine - but it doesn't devalue the role. Let's use financial advisor as an example. If I identify my own risk tolerance, set my own goals, research the investments offered by your firm, select the investment that's best for me, then only involve you to click \"buy\", does that mean that your fees are way too high? We can apply this to any job. \n\n>For the average commission of 2.5%, selling real estate agents are earning over $1,000 per hour of work.\n\nThe commission earned by real estate agents is revenue, not profit. It's also often paid to the agency that the agent works for, then the agent receives some percentage of the total. Of that, costs incurred by the agent need to be removed before we end up with our profit. As others have mentioned, this profit also needs to be counted against unsuccessful sales. \n\n>The average number of bids has been around 6 per client, for a total average hours of 24 hours (generous number).\n\nYou're neglecting a lot of things, here.\n\n\u2022 Time spent looking for properties\n\n\u2022 Time spent coordinating site visits\n\n\u2022 Time spent driving to/from sites\n\n\u2022 Time spent building relationships with other agents, inspectors, lawyers, etc that can all be leveraged by the client\n\nThese are just a few. Even if the customer does these things, the time cost is still present. If a customer willingly does the agent's job for them, that's not an issue with agent pay. That's the customer donating their time to the agent. It'd be like if you went to a restaurant, cooked your own meal, and then concluded that chefs were overpaid."}], "threadB": [{"author": "iryanct7", "body": "I\u2019ll see if I can change a small part of your view. I\u2019ll take this angle from both sides. Licensed broker and investor fyi.\n\n\nI would tend to agree with you that the standard 2.5 percent for both sides is mostly ridiculous given the quality of the average agent you find these days. (building a company to try and tackle this, but that\u2019s neither here nor there.) I\u2019m going to act like I am a top 10% who actually gives a damn and wants to provide value. My goal is to CMV by showing the value you get is not the immediate short term gratification of drugs but the long term rewards that add up.\n\nFrom the buyers side. Zestimates are usually not that good. A decent agent can do a comparative market analysis on a home to give a reasonable value on what a house is worth (within 3k of an appraisal). I can tell you which areas are highly likely to appreciate or depreciate (making you money). While I\u2019m not a licensed inspector, I can tell you the basic things from a home tour that may or may not be costly things to fix. It can save you time and money not putting an offer on a house and paying a couple hundred for an inspection when you are going to back out regardless. As an investor I can tell you the locations and neighborhoods with the highest and lowest crime rates and area with lower vacancy rates. I view my service is something that will eventually pay for itself.\n\n\nNow for the sellers side (where there is a lot more value). The biggest issue with FSBOs is that they price way too high. As they come to the realization a month in they drop the price. At that point buyers start to wonder why the property dropped so much. Doing a CMA on a property is key to providing a value that\u2019s actually going to generate activity. Two things sellers need to be told. CLEAN YOUR GOD DAMN HOUSE, and take really nice professional photos. You don\u2019t know how many times shitty photos and a hoarders house are a huge turn off. Think how much lower a buyer is going to offer as well. Sometimes the most valuable things to a seller is just telling them a simple thing they never would have done otherwise. Other major value add includes staging, landscaping, and power washing. It\u2019s all about the little things that add up to sell for more money (they do in fact sell for more money). If the seller wants to add some sweat equity the biggest value add is renovating the kitchen and bathrooms.\n\n\nNow, that\u2019s a big rant, and I agree with you on principle on the current rate, but I do believe there are ways that RE agents can add value both by their knowledge and telling you shit you need to hear that puts money into their pockets on top of all the other fiduciary activities they do for their clients.\n\nLet me know if you have any other questions."}], "swapped": true}, {"index": 157, "branch_id": "t3_1glzrvp_1", "title": "CMV: Utilitarianism is Impossible to Implement or Use in Practice", "description": "**Disclaimer: I approach this from a practical perspective, avoiding overly abstract arguments. If you feel technical points are relevant, feel free to bring them up.**\n\nUtilitarianism is ethical framework where you choose actions that maximize happiness, that is utility.\n\n# How to measure happiness?\n\nThe first, obvious criticism against this idea is that happiness is very vague and subjective. I won't delve too much on the definition itself as I'm OK with term being when we \"know it when we see it\", as long as it has enough properties that we can comfortably work with it. In this case I would consider properties as the definition for the concept itself. With what instrument or procedure can we measure happiness? What is the SI unit for happiness? Is happiness linear, can it be added and subtracted? Can we take the average? Can we compare happiness in quantity?\n\n# How do we maximize the utility of the group?\n\nEven if we have a concept of utility we can work with, we are often not working with the individual. Imagine we have a group with 100 people. How do we maximize the utility of the group? What average are we using?\n\nAre we using the mean? In that case if we could do action A that would give 10 units of happiness to everyone, or action B that would give 0 units of happiness to everyone, except for one person who gets 2000 units of happiness. In this case we would choose option B. Perhaps you agree, but consider this example. Action A still gives 10 units of happiness to everyone, but action B harms everyone by 5 units (-5 utility), except for the last guy who gets awarded 2000 units. Still, B is more preferable than A. You may disagree, but this is where our theory led us.\n\nAre we using median? In that case, if we have option A that gives everyone 100 points, and option B which gives slightly more than half the people 99 points, and the rest gets 999999 points of happiness, we should choose option A. \"This is an extreme unrealistic example\", I hear you say, but we have to justify a universal theory. Even if you argue that the theory is good for most cases, then we should be easily able to tweak the theory to perform better, either by changing the parameters or by introducing the examples.\n\nIf you fundamentally disagree with both averages, what do you suggest?\n\n# Where do you draw the line for harming one person to reward the other?\n\nIf you say we should never harm anyone to reward other people, in that case consider the following scenario. If our action causes mild unpleasant feeling (equivalent to a sting of a mosquito) to person A, person B will get all their problems solved and $1 million in cash as a gift (assume person B would appreciate the gift). Most people would do this. What if we increase the harm? When would you draw the line? Most people would draw the line before harm and happiness become equal, but how do you justify that exact line?\n\nWhat if there are multiple people? what if multiple people would get a slight benefit, but one person would get greater harm? Still, if we accumulated that slight benefit, it would outweigh the harm of that person. Would you do this? How do you justify it? By what principle?\n\n# Every rule needs justification\n\nEven if you have a proposition for every question I raised, and even if that proposition is relatively general and simple, you would still need to justify using it. Why are we maximizing utility for that matter?\n\n# Brief closing remark\n\nAs you can see, the concept of \"maximizing utility\" is impossible to define precisely even for one individual, let alone a whole group. Thus, it can't be worked with.", "threadA": [{"author": "MagicGuava12", "body": "You're thinking of it too logically you need to think of it emotionally. All humans are incredibly logical, they're all so extremely emotional. Utilitarianism is a framework so you need to create a framework of general principles and then just like in computer coding have an if else statement. All of the various things that don't fit, you can even make a framework that is just to sit down and think about the problem. There is also absolutely nothing stopping you from say using virtue ethics, stoicism, deontology, or any of the other ethical Frameworks in place of confusion.\n\nFor example I'm a pacifist I don't hurt people. This is fine and dandy but what happens if you get punched in the face and someone's about to murder you? You can stick to your guns, or you can have an if else policy of if I am in immediate danger I'm allowed to use Force. \n\nMost of our thoughts come from the words that we use. We're able to put a label on things based off of the language that's already available. Just because something means one thing, doesn't mean that it can't mean something else, you can add and change definitions over time. Much like an idea. \n\nAny framework is going to have ups and downs there's never going to be anything perfect. That's a Fool's errand. What you can do, is you can optimize your process to allow your Optimal Performance in most situations."}], "threadB": [{"author": "wibbly-water", "body": "Utilitarianism is not a political stance. It is a lense baseline, that can be used to build beliefs on.\n\n\nThe political ideologies based on utilitarianism can be from any corner of the political spectrum. They may even clash. The word has become synonymous in politics with \"doing something despite (some) consequences for angreater good\" - but often both sides of an issue are utilitarian.\n\n\n\n# How to measure happiness\n\n\nThis is actually relatively simple. You ask people.\n\n\nYou can do polling and investigations into quality of life. You can then impliment policies. You can then do do more polls to see if they boost QOL and happiness, and deem them a success or failure.\n\n\nThis may seem like common sense - in which case congrats you are already a utilitarian!\n\n\nBut political parties that don't think this way will impliment policies regardless of suffering they cause. For instance if your morality is about pleasing a deity by following a certain set of rules, then a country which follows the rules well but the people live in squalor is a success to you."}], "swapped": true}, {"index": 16, "branch_id": "t3_1n6m5jt_1", "title": "CMV: Antisemitism right now is no different to any time before, and it's a bad omen for the future.", "description": "I think Anti Semitism, and by extension Anti Zionism which I consider a rebranding of Anti Semitism, is the same exact phenomenon rearing its ugly head the way it did many times before in history.\n\nHonestly I'm concerned.   \nWith my upbringing, I could never fathom a way to become an antisemite, and viewed this phenomenon as a bad omen.  \nThroughout history, it has been a hallmark of internal turmoil and a moral decline, all of which we see today in the west in abundance, which leads to scapegoating of the weakest communities, as a form of sacrifice in order to reunite a broken society. \n\nJews are an easy and obvious target for this due to them being a tiny, powerless minority who's perceived as powerful due to their relative success. It's the smart kid in class getting bullied basically.  \nThe examples are countless. If it's the first crusade, the black plague, the Spanish expulsion, the Russian empire or Germany in the 1920s and 30s, Jews always become the target for any society looking for who to blame for their troubles. Now it's not a perfect correlation, there have been cases where Jews were persecuted and it ended in nothing, but that's often brief and doesn't spread beyond localized communities the way we see it do today.  \n  \nMore than anything, I just can't see how a society which allows itself to fall to such levels of hate as we see today can come out the other end superior to what it was before.\n\nI want to believe this is truly just about anti Israeli government, but I see hatred for Jews everywhere now and authorities are doing nothing, like they're enabling it.  \nAnd since it looks like true antisemitism, I want to believe it's just one of those brief spikes and not a sign of bad times coming, but it's been lasting a while, getting worse, it's all over the globe and it's getting really bad, guys.\n\nI honestly wish I could be convinced to look ahead and see better days, but I doubt it.  \nI'm doing this to hear a positive outlooks on all this, and how it leads to a better future.  \nBut I chuckle writing these words, since it's like watching a KKK rally and asking someone to tell you how is this a good thing and not absolutely disgusting and scary.", "threadA": [{"author": "stockinheritance", "body": "Antisemitism *is* terrible, we agree there. We even agree that it is on the rise. However, antizionism isn't synonymous with antisemitism. Can a person be both? For sure. Does the former necessarily entail the latter? Nope.\u00a0\n\n\nThe main Zionist in my life is my father-in-law, who is an evangelical Christian who believes that a strong Israel is necessary to bring about the end times. In his religious beliefs, anyone who doesn't believe that Jesus Christ is their Lord and savior goes to hell. Meaning, my father-in-law believes that every single Jewish person on earth is going to be tortured for eternity after they die.\u00a0\n\n\nThis is a big reason for right-wing support of Israel in the US: evangelicals are a huge voting bloc for Republicans. So, my rancor over our policies towards Israel is mostly directed towards evangelical Christians, not Jews.\u00a0\n\n\nIsrael is a state of some 70 years in its contemporary form. Judaism is a religion more than 4,000 years old. The two are not identical."}], "threadB": [{"author": "FerdinandTheGiant", "body": "I think concerns about anti-semitism is valid. I also think conflating anti-Zionism with antisemitism is antisemitic and deeply problematic. Jews are not a monolith and the actions of Israel should never be conflated with the actions of Jews.\n\nNothing about being against the formation of a Jewish state implies a hatred of Jews, only a hatred of ethnocracies which is what Israel currently exists as. Being opposed to a state intended to limit self determination to a single ethnic group doesn\u2019t mean you are against members of that ethnic groups existence or safety."}], "swapped": false}, {"index": 150, "branch_id": "t3_1cq9uws_2", "title": "CMV: If a person is old enough to vote, they are old enough to be responsible for their own student loan.", "description": "There\u2019s a lot of talk on student loan forgiveness. I see a lot of arguments in support of the policy. Here are some of them and my thoughts on it:\n\n1. \u201cStudent loan are predatory loan that prey on young people that are still naive\u201d - so are scams that target elders or adults of all ages in general. People lose money in all shitty situation that can turn their life upside down.\n\n2. \u201cCost of college has risen so much comparing to the past, and it\u2019s not fair for younger generations\u201d - it\u2019s also not fair for young people that understand the consequences of loans and opted out of college, or people who worked their asses and saved every penny to pay it off.\n\n3. \u201cLoan forgiveness is basically a stimulus for poor people. They can spend the money now instead of paying student loan, helping the economy\u201d - right but we also have inflation, maybe it isn\u2019t the best time to print more money. And statistically people with a college degree have higher income than those who dont, so we\u2019re not actually helping the poorest people. \n\n4. \u201cWell PPP\u2026\u201d - the dumbest and most common arguments of all. No PPP wasn\u2019t a good idea, and it got bipartisan support at the peak of covid so it was passed before any of us could even have a discussion. People who opposed SLF most likely also oppose PPP. But It already happened. We passed one bad policy doesn\u2019t mean we should pass another one.\n\nMy opinion is if certain age group is considered young and naive and therefore society should help shoulder the consequences of their action, then they are also too naive to vote, because the consequences of their vote not only affect themselves but also the whole country.\n\nOn the side note, there are other ways that can better address student loan problems better than forgiveness. address the cost of tuition, forgive only the interest, or lower interest rates to name a few.", "threadA": [{"author": "themcos", "body": "> \"Student loan are predatory loan that prey on young people that are still naive\u201d - so are scams that target elders or adults of all ages in general. People lose money in all shitty situation that can turn their life upside down\n\n\nWe're usually talking about federal student loans in this context though? If you're comparing predatory loans to scams, doesn't it make a big difference that the entity doing the loan forgiveness is the same entity that issued the loan? If a private company issues a predatory loan without violating any laws, I think you can plausibly look at that and say \"well, tough shit\". But if the federal government issues a loan and then later decides it was predatory and harmful, why shouldn't they just say \"hey, that was shitty of us, we'll give you a break now\". They issued the loan in the first place because they wanted to be helpful!"}], "threadB": [{"author": "GadgetGamer", "body": "The consequences of a single vote are insignificantly small to the voter and to the country. The consequences of a student loan can mean the difference between having a future (being able to get an education) and being stuck at minimum wage jobs (no money means no education). The consequences for the country is a giant hole where money gets sucked out of the economy rather than being constantly on the move.\n\nThere is simply no comparison. The fact is that we need to have an educated population. Ultimately we need to work towards reducing the cost of education, but as a stop-gap measure we can make a start by forgiving student loans.\n\nIf it is unfair that some people manage to pay off their loans while others have theirs forgiven, then surely it is equally unfair to make changes that reduce the cost of tuition because those very same people would still have paid off their loans."}], "swapped": false}, {"index": 66, "branch_id": "t3_1c6vg6z_1", "title": "CMV: I don\u2019t believe going back in time and killing one person would change much", "description": "I saw a post about the theoretical ethics question, \u201cWhat if you could go back in time and kill baby Hitler?\u201d\n\nI know that part of the debate is whether it would be okay to kill a baby you know will do horrific things. But that\u2019s not what I\u2019m focusing on.\n\n**Overall, I believe everything that happens in history is the result of a collective social / cultural push rather than the specific actions of an individual.** For example, you can look at the Wright Bros in the US, who were literally RACING other inventors to claim the patent for their plane. If they hadn\u2019t done it, someone else would\u2019ve\u2014and not that much later, timeline-wise.\n\nObviously that example is simpler and clearer than others because we can look at the other people involved and know for sure that it was a literal race. But I believe this to be true for everything world-changing.\n\nFor example, I truly believe that killing baby Hitler wouldn\u2019t stop the Holocaust because someone else would have risen up and done it\u2014the environment was poised with hat
