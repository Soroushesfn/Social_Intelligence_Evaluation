e and bigotry and resentment, and Hitler just happened to be the one to drive it over the line.\n\nAs another example, I believe that if Trump hadn\u2019t ran for office, we still would\u2019ve had this push of white nationalism and events such as Jan 6 (albeit maybe not on Jan 6 exactly) because I think that was an almost inevitable swing America was going to experience after Obama.\n\nI will acknowledge that I don\u2019t believe every single event would play out the *exact same way* if someone else was in charge\u2014but I believe if we look at the timeline of humanity broadly, that the differences would be minimal. Occasionally someone super intelligent might invent something 10 years sooner than it would be invented otherwise, for example, or Trump might use specific language that helps erode political decorum in this particular way, but the trends would be loosely the same.\n\nAs a final note, I don\u2019t believe this absolves any bad people of guilt or minimizes people\u2019s accomplishments. Just that essentially no one is that important on a big scale.", "threadA": [{"author": "Then_now_maybe", "body": "I dunno. You'd really need to define \"change much\"\n\n If you killed Vasily Arkhipov it's a coin toss if the apocalypse happens or not.\n\nHis submarine had an error that told him enemy nukes had been launched during the cuban missile crisis. The protocol was to go dark and return fire. \n\nHe refused.\n\nI'd of just followed protocol and the cold war would have become a thermonuclear one. \n\nI'm moderately sure a real nuclear war classifies as changing much related to now."}], "threadB": [{"author": "Butter_Toe", "body": "There was no one else spiraling down insanity like Hitler.  The holocaust was direct result of Hitler. \n\nWhite nationalism/Obama\n\nHave you been under a rock? That's always been a thing in usa. Long before Trump. \n\nIfvyou don't believe eliminating one person could have a tremendous impact on the world, just think, countless generations ago a man and woman came together to create what is the bloodline you come from. If that man had been killed, your entire family history over countless generations, would never exist.  You, would never exist."}], "swapped": false}, {"index": 49, "branch_id": "t3_1ef1rhi_1", "title": "CMV: In the United States, the feminist movement is NOT attacking men.", "description": "There are individuals who make over-broad criticisms of men, but in terms of the feminist movement\u2019s actual political goals none of them threaten to make life worse for American men. The major focus on the movement currently is the pro-choice position, and you can disagree with that for whatever moral reasons, but it\u2019s a civil liberties issue, not an anti-man issue. Another big issue for feminists is pay equality which doesn\u2019t mean men would be paid less. Corporate profits are so huge that all workers could be paid more, and no one would immediately lose money.\n\nAdditionally, there are lots of feminist positions that would DIRECTLY help men. Feminists discuss child care lots and almost all support an expansion of paid family leave for both men and women. Further, the alimony system is biased against men because of an expectation that men are breadwinners, and women are caretakers. Feminists are much quicker to recognize this sexism that non-feminists and mostly support a fairer alimony system that would help out lots of men.\n\nAs for the idea that feminists are mean to men on a personal level, I\u2019d say that firstly, people need to have more spine and learn to judge political movmeents on their POLITICS rather than on how they make them FEEL personally. And, in my experience, feminist women AND men do not hate men, and I think you\u2019d have to do lots of mental gymnastics to argue the great number of feminist men all hate men.\n", "threadA": [{"author": "Ill-Description3096", "body": ">but in terms of the feminist movement\u2019s actual political goals\n\nWhat exactly are *the* feminist movement's actual political goals? Is there a definitive list from an authoritative body that speaks for the movement? If not, then this is simply a case of you picking which individual feminists count as speaking for the actual goals and handwaving the others.\n\n>Another big issue for feminists is pay equality\n\nWhich is already legally binding. What political policy is going to more than literally making it against the law to discriminate based on sex?\n\n>\u00a0Further, the alimony system is biased against men because of an expectation that men are breadwinners, and women are caretakers. Feminists are much quicker to recognize this sexism that non-feminists and mostly support a fairer alimony system that would help out lots of men.\n\nWhat is this based on? I haven't dug much into alimony because it isn't a super important issue to me, but this seems like a vague claim based on not much of anything. Since you alluded to the actual political positions, surely this would be easy to show?\n\n>As for the idea that feminists are mean to men on a personal level, I\u2019d say that firstly, people need to have more spine and learn to judge political movmeents on their POLITICS rather than on how they make them FEEL personally.\n\nIf there is a movement dedicated to putting term limits on all elected offices and supporters of that movement personally attack you for whatever reason, maybe they use racial slurs or sexist remarks about you, are you really saying that won't color your opinion of the movement at all and you will judge it only by their specific political stances? Separation of the two isn't that easy, and it is more than fair to point out shitty behavior even if it doesn't stem from the specific political positions. \n\n>and I think you\u2019d have to do lots of mental gymnastics to argue the great number of feminist men all hate men.\n\nHating all men is a very tough bar. If they hate all men who don't completely support their views that wouldn't be all men so the bar is passed. Not really a great standard IMO. If some racists hates black people but is okay with Candace Owens because she agrees with them on some policy, should we not criticize them for hating black people because they don't hate every black person on the planet?"}], "threadB": [{"author": "obese_tank", "body": "I consider some feminist policy goals, like sex-based affirmative action in education and employment, a gendered approach to addressing sexual assault/IPV that emphasizes male perpetration and female victimization, are quite hostile to men. \n\nAnd feminist rhetoric is also often biased against men, like discussions on unequal household labor in marriages that ignore or downplay men's greater financial contributions, rhetoric on sexual assault/IPV, broadly stereotyping men as dangerous, and holding us accountable for changing the behavior of other men because we happen to be the same sex."}], "swapped": true}, {"index": 180, "branch_id": "t3_1loliff_1", "title": "CMV: calling a man a \u201cgolden retriever\u201d is an insult, not a compliment", "description": "If you haven\u2019t heard this term, it\u2019s common to refer to a certain type of guy as a \u201cgolden retriever\u201d (typically in the context of dating) which basically describes someone who is innocent and happy go lucky. This can be compared with the \u201cblack cat\u201d type who are less happy and aloof all the time, and more cool and complex I guess.\n\nI totally understand it means well and I\u2019m not trying to come at this from like a \u201cmen\u2019s rights\u201d victimhood angle. I\u2019m not saying this is some big injustice. But I\u2019d opine that I probably wouldn\u2019t appreciate being referred to as a \u201cgolden retriever\u201d type guy. \n\nBasically, I see comparing a human personality to an animal, specifically for the reason of explaining how innocent and aloof someone is, is somewhat infantilizing and demeaning. I don\u2019t want a partner who has the same type love for me that they would a golden retriever- that being the infantilizing type of love you\u2019d give an animal with way less intelligence than you, but you have a soft spot for because they\u2019re cute and happy all the time. To me it\u2019s basically saying the same thing as \u201cmy bf is so great he has the personality of a 10 year old\u201d without sounding really creepy. \n\nTo sum up, I want a partner who views me as an intellectual and emotional equal, not some innocent, aloof, less intelligent being who is still dateable because I\u2019m cute and sweet. I think the term \u201cgolden retriever\u201d basically suggests that you are just that. \n\nPS: I have absolutely no issue with dogs, just because I don\u2019t want to be compared to one by my romantic partner doesn\u2019t mean I dislike them!", "threadA": [{"author": "DewinterCor", "body": "Let start from the basics. \n\nAre there any personality traits typically associated with golden retrievers that you find disagreeable?"}], "threadB": [{"author": "CasualCrisis83", "body": "It would seem like an  insult by your definition. But that's not typically what people mean. \n\nGenerally, it means a man who is  loyal, openly affectionate, outgoing, and playful. \n\nI have never heard anyone say it means dumb. Golden retrievers are widely known as brilliant dogs, they're often trained as working dogs, like guide dogs, search as rescue, and  detection. \n\nThey're also naturally good with children which make them excellent family dogs.\n\nSo as far as a metaphor goes, being compared to an golden retriever is high praise."}], "swapped": true}, {"index": 110, "branch_id": "t3_1e66okq_1", "title": "CMV: The Palestinian \u201cStop, don\u2019t skip\u201d videos did a lot of damage to their cause. ", "description": "Many of you have probably seen these types of videos on Tiktok. They consist of people shouting at the beginning of the video \u201cStop! Don\u2019t Skip!\u201d or something like \u201cDon\u2019t skip if you care about Palestine.\u201d They all usually claim that their family is in danger in Palestine and ask for money or interaction with the post. This became such a common way to get money over there to Palestine and in the short term it was very successful in that goal. Now it seems interactions with these videos have significantly dropped and I think I know why. There are many problems with these videos, the first one being they feel very scripted and performative, often saying the same things in many different videos. For example there is this one guy who is always crying and acting really angry and in every single video he says \u201cI don\u2019t forgive anyone who skips this video.\u201d It\u2019s so obvious that he\u2019s acting so over the top and just trying to take advantage of people\u2019s sympathy. There\u2019s just no way he\u2019s always constantly angry and constantly crying. The videos just don\u2019t seem genuine, they all seem very performative and this is damaging to the cause because the issue is a real issue and many people are suffering but this gives a bad look to the cause making it look fake. Another thing is these videos can easily be made by anyone and anyone can claim they are from Palestine even though they\u2019re not. I don\u2019t think it\u2019s a reliable way to help overall as it helps one family at a time when there\u2019s millions of people who are in need of help. I think if you truly want to help, you should donate to trusted aid organizations or go out and protest. My final theory is that they also desensitize the audience to the conflict, constantly being bombarded with videos and not really being able to do much. They became too much and for the average person wanting to kill time on TikTok, their FYP gets taken over by these videos causing them to get desensitized and annoyed. Think of it like this, imagine a beggar comes to you when you\u2019re walking down the street. You might feel bad for them and give them some change, then another comes and you also give them some change. Now imagine after giving those two beggars money, you\u2019re constantly stopped by beggars every two minutes, you would be annoyed and less inclined to give and you may not even go back on that street anymore. These videos target the average joe who doesn\u2019t really have much power when instead the attention should be brought to politicians who actually can do something. \n\nTL;DR: These videos became way too many, are very performative, and have desensitized people to them. The best way to help is to donate to trusted aid organizations or protest. ", "threadA": [{"author": "Thoth_the_5th_of_Tho", "body": "These videos are totally irrelevant to Palestine. \n\nPeople don\u2019t like to feel helpless, but the fact of the matter is western  domestic opinion has almost zero bearing on the conflict. The Yom Kippur War and Black September were catastrophic for Palestine and they have not come even close to recovering for the last 40 years. Videos and campus protests now are talking about closing the barn doors, about 40 years after the horses have bolted.\n\nThis conflict will be decided by regional politics, not western. And those politics have been arrayed against Palestine for reasons totally unrelated to Tick Tok."}], "threadB": [{"author": "BrassAge", "body": "I don't disagree, but please keep in mind many of these videos are not made by a sophisticated organization as part of a larger brand strategy.  They are made by individuals in need of help who have heard rumors that a few magic words on social media might convince people they have never met to donate money.  Even those content creators you see posting multiple videos with the same premise and different families are scrambling trying to help those around them and doing whatever works to try and get your attention, sympathy, and money.\n\nTiktok, GoFundMe, and other social media and fundraising platforms are, in some ways, pillars of a rickety support system people with very limited means are trying to cobble together to save their own lives.\n\nI would argue protesting does almost nothing, unless you are protesting something very specific and have a reasonable plan as to what you want the result of your protest to be.  Columbia students protesting their own University's use of endowment funds to support specific organizations?  Actionable and likely worth their time.  Big groups of citizens protesting a state government for \"change\"?  Worthless.\n\nDonations to credible aid organizations are fine, but the problem with delivering aid in Gaza is not a lack of resources, it's a lack of ability to get aid where it is most needed.  That's a more complex issue that donations and protests cannot address.\n\nBefore the IDF took control of the Rafah crossing and effectively closed all traffic between Gaza and Egypt, it was the only way for normal Gazans to escape.  It cost roughly $5000 per person to get on the list that would let you across the border, and people were doing whatever they could to gather that money.  International donations like these saved the lives of many.\n\nToday, with skyrocketing food and fuel prices as well as gang control of almost all remaining supplies in Gaza, money is still the answer to most problems there.  Aid organizations are not distributing money to individual recipients, who know best how to use it.  Individual donations, however, still make a huge difference in the lives of those who receive them."}], "swapped": true}, {"index": 144, "branch_id": "t3_1hqfto3_1", "title": "CMV: People who died from or attempted suicide are people who were failed by the people around them", "description": "I can\u2019t help but think how if these people who were suicidal had the right support or help, suicide wouldn\u2019t be haunting their head as much.\n\nIf maybe they had friends or family members who cared more, checked up on them, listened to their cries of help and supported them then maybe they would feel like they had a reason to live.\n\nPeople keep talking about how people who want to take their lives are so selfish because they don\u2019t think about the people around them who care. But isn\u2019t the same for the people around them too? Isn\u2019t it selfish for you to want someone to continue to struggle just for you? Aren\u2019t you just thinking for yourself and not them? And maybe if you showed this person you cared then maybe they would\u2019ve thought about it.\n\nBut in a way I know this way of thinking is kind of fucked up because it seems like I\u2019m blaming the people around them.\n\nDo suicidal people really just want to end their lives or is it because they don\u2019t have the support they need to continue? Or both?", "threadA": [{"author": "Bobbob34", "body": "This seems a very childish, \"then they'll all be sorry! I'll make them pay for not doing X!' view of suicide.\n\nA good percentage of suicides are not people stewing about it, but people who decide within minutes to do it.\n\nA friend of mine came from a great family, very loving, very open, everyone very well educated (which I include because there was no uncertainty about what professionals could be contacted, no disbelief in psychology or medication, everyone involved was knowledgeable and accepting - not that education guarantees that but). He was depressed and told his family and said he needed psychological help. They immediately found him a psychiatrist and psychologist. Immediately. \n\nHe went, he felt better, he got on meds, he was doing well, communicating. He was an adult, with a great job, gf, house,, no shame around it, no hiding. His parents and siblings checked in with him regularly; saw him, asked how he was doing, did all the regular things they normally all did. It was the perfect scenario in those terms. He felt like he needed help, was open about it, got help and support from professionals and family. \n\nOne day he was visiting his parents, took his dad's glasses to have the frame fixed in the am on his way to work, made plans for another thing, was doing well, talked openly about how he was feeling not great but better. Went home and a couple hours later was dead. Why? \\*shrug\\*. \n\nIs that somehow the fault of his family? His friends? Who?"}], "threadB": [{"author": "Para-medix8", "body": "This kind of thinking is naive. Support isn't always enough. Sometimes, there's no solution. There are such unfortunates. \n\n\"If maybe they had friends or family members who cared more, checked up on them, listened to their cries of help and supported them then maybe they would feel like they had a reason to live.\"\n\nYou think that \"checking up on\" and \"listening to\" suicide victims is a solution? Naive."}], "swapped": true}, {"index": 168, "branch_id": "t3_1n2e19s_1", "title": "CMV: DC should not be a state", "description": "The purpose of DC was to ensure no state has influence over federal government. The surge in population came later. The 23rd amendment was passed to give the people that live there some voting representation. That is as good as it should be. Because making it a state would defeat the original purpose of creating it and also be impossible logistically. Puerto Rico should be a state. There is no reason for it not to be Guam and NMI are on the same archipelago, they should be combined to be a state. But I never hear people talk about making Guam a state like DC. I think it's a purely political push to make it a state is purely political to get two safe Democratic senators. \n\nThe main objection and really the only one required is the 23A. All proposals to make it a state, carve out a two block radius where the White House is and leave it as a federal district while making the rest of it a state. Well, the 23A isn't going anywhere. it still applies. So now the residents of that district get 3 Electoral College votes. The only people that live there are the President and his family. So we're giving the president 3 EC votes in this scenario.\n\nThe other main argument is that making DC a state would now place all federal agencies and government building under a state's influence. Which is what we wanted to avoid in the first place. If that happens, all the federal agencies are being moved. Think about it. Would you want, say Alabama to have influence over the DoD, HHS or Department of the Interior? No, and I don't want DC either. Republican legislators won't either. All the agencies, departments, NGOs, think tanks, consulting and lobbying firms are out of there. Which leaves the question. What is this neighborhood sized state you just created going to do for money. Their lauded GDP numbers are entirely because of the federal government. Remove the government from there and that state will collapse faster than you could blink.\n\nTo CMV: \n\n1. Tell me how we're addressing the 23A. Because you can't repeal it. No one has the votes to pass another amendment. So how are you getting around that?\n\n2. Tell me how it's viable as a functioning body. How it will fund the government, civil services etc. when all the federal government moves out of the area. Because it will. Republicans aren't leaving a D+80 state to influence federal agencies.", "threadA": [{"author": "Donkletown", "body": ">\u00a0Tell me how we're addressing the 23A\n\nRepeal it as part of statehood for DC. You say the votes aren\u2019t there for that, which is true. But the votes aren\u2019t there to make DC a state either. We are talking about whether DC *should* be a state, not whether the votes currently exist to make it so.\u00a0\n\n\u201cThe political climate doesn\u2019t include enough votes to make DC a state\u201d is a different view from \u201cDC shouldn\u2019t be a state.\u201d\u00a0\n\n>\u00a0when all the federal government moves out of the area. Because it will. Republicans aren't leaving a D+80 state to influence federal agencies.\n\nI don\u2019t know that they would, but whether DC is a state wouldn\u2019t change that. The federal government is currently free to relocate federal agencies, regardless of DC statehood. Trump did just that with BLM his first term.\u00a0\n\nThe main reason fed agencies are in DC isn\u2019t about statehood, it\u2019s because proximity to the White House and Congress is important. Agency officials need to regularly communicate with Congress and the executive branch, which proximity facilitates. That doesn\u2019t change based on statehood.\u00a0\n\nDC already heavily \u201cinfluences\u201d the federal government in that it is the place where many federal government employees live and work. That\u2019s going to be the case regardless of statehood.\u00a0\n\nThe only reason to deny statehood, id say, is politics."}], "threadB": [{"author": "MonkeyMadness717", "body": "I disagree with the premise of point 2, that it can't function with the federal buildings and that they will move if it becomes a state. Do you have a justification on why you believe this? Notoriously, there are states in the mountain west, like Nevada, Utah, Wyoming, etc. where a significant chunk of the land is federal land within the state, whether its national parks, BLM land, or other public land. These states all still function without them controlling these regions. I don't think creating a similar system in DC would be simple, it would most likely be a lengthy and lawyer heavy process to create the many rules and carve outs for an existing Metropolis like DC to function. But I dont really see any justification here on why DC would be unable to do similar carve outs on a smaller scale. Additionally, to saying republicans will leave, why? The city is already vastly a democrat city, as you point out. Its useful to have this centralized area for the federal government. \n\nAnd finally no taxation without representation. Like its literally one of our founding principles"}], "swapped": true}, {"index": 177, "branch_id": "t3_1cawhhb_13", "title": "CMV:Taylor Swift is an average musician", "description": "I have seen many posts and heard people say many things to hype up Taylor Swift. They say Taylor Swift is a better vocalist than Adele. They say Taylor Swift is a better performer than Beyonce. I even heard someone say that Taylor Swift is one of the best songwriters of all time(when people like Alicia Keys and Bruno Mars exist). I don\u2019t think Taylor Swift is a terrible artist. She can actually hold a tune unlike Jennifer Lopez or Selena Gomez. Her Performances aren\u2019t as high energy and powerful as a Beyonce performance but something I do appreciate is that Taylor Swift can play instruments while singing which is something not many performers can do. However I don\u2019t think Taylor Swift is anywhere close to Beyonce when it comes to performing.  Something I do appreciate about Taylor Swift is that she story tells through her music however all of her music is a breakup story. Where is the variety in that?\n\nWhen it comes to vocals I think Taylor Swift is closer to someone like Lana Del Rey or Lorde. All three can hold a tune but they are all pretty average vocally when you compare them to actual pop vocalists like Adele, Ariana Grande or Sabrina Carpenter. Taylor\u2019s vocals don\u2019t really stand out. It doesn\u2019t have the power or resonance of Adele\u2019s voice. She can\u2019t sing agile riffs and runs like Ariana Grande. And she can\u2019t sing with her soul like Sabrina Carpenter. Taylor Swift\u2019s voice is average at best. When it comes to performing I think Taylor can be compared to someone like SZA or Olivia Rodrigo. All three can dance and sing but their performances are average when compared to someone like Beyonce,Rihanna or Michael Jackson. Taylor can dance but if you put her on the homecoming stage with Beyonce she would fall off. Nothing about Taylor\u2019s performances make her stand out they are pretty average at best. Yes Taylor Swift can play an instrument but HER and Alicia Keys can do that to and they both at least have the vocals and songwriting skills to help them stand out. Lastly let\u2019s get to her songwriting skills. I can\u2019t think of anyone who only makes music about breakups besides Taylor Swift. Her music only being about breakups is the only thing that makes her stand out because she is the only singer who only makes music about breakups. However Bruno Mars,Lady Gaga,Demi Lovato,Katy Perry,Beyonce,etc. have all made songs about breakups. However they also write music about other stuff like sex,partying,love,school,drinking,swimming and other life experiences. Taylor Swift only makes music about breakups.\n\nI understand that Taylor Swift is one of the biggest artists out right now but in my opinion I don\u2019t think Taylor Swift is as talented as people make her sound. She is average in all aspects of music. Nothing about her screams \u201cI\u2019m the best at what I do\u201d. Nothing about her stands out among the crowd of much better musicians.", "threadA": [{"author": "kiriwells48", "body": "Taylor Swift\u2019s music could slap with a decent bass line. It\u2019s too boring for me. I sense no emotion listening to her music, even ones that I\u2019ve seen videos of people sobbing over. I\u2019m not super impressed by her lyrics. They kind of remind me of middle school poetry. I don\u2019t think I have the most sophisticated music taste, but I can get into just about anything. But for some reason I just can\u2019t find interest in her music, personality, story, anything."}], "threadB": [{"author": "inigos_left_hand", "body": "1) Taylor Swift is not as high energy a dancer as Beyonc\u00e9\n2) Taylor Swift does not have the vocal range of Adele\n3) Taylor Swift is not as good a musician ad Alicia Keys\n4) Taylor Swift is not as good a song writer as Lady Gaga (this is debatable)\n\nBut\u2026 Taylor Swift is fucking great at all those things she\u2019s just not the best in the world at any of them. She is a very good singer, a high energy excellent dancer, a very good musician and a wonderful songwriter. She also probably works harder than all of those people put together (considering the number of albums she\u2019s put out and the scale of her latest a tour).\n\nTaylor Swift may not be to your liking but denying that she is immensely talented is just plain wrong. One of the best things about her is how broad her albums actually are. She\u2019s got her country roots, her more pop albums and some very folksy stuff too.\n\nAlso you should probably actually listen to some of her albums. She does have a lot of breakup songs (mostly earlier stuff) but her more recent albums are much more varied)"}], "swapped": true}];
        let currentIdx = 0;
        let userData = {};
        let activeTab = 'A';
        const STORAGE_KEY = "beh_results_v1";

        function startApp() {
            const name = document.getElementById('user-name').value;
            const email = document.getElementById('user-email').value;
            if(!name || !email) return alert("Please provide details");
            userData = { name, email };
            document.getElementById('identity-screen').style.display = 'none';
            render();
            renderSidebar();
        }

        function switchThread(id) {
            activeTab = id;
            document.querySelectorAll('#thread-pills .nav-link').forEach(btn => {
                btn.classList.toggle('active', btn.innerText.includes(id));
            });
            renderDialogue();
        }

        function renderDialogue() {
            const s = dataset[currentIdx];
            const turns = (activeTab === 'A') ? s.threadA : s.threadB;
            document.getElementById('dialogue-container').innerHTML = turns.map(t => `
                <div class="utterance">
                    <div class="author-meta">${t.author}</div>
                    <div>${t.body}</div>
                </div>
            `).join('');
        }

        function render() {
            const s = dataset[currentIdx];
            document.getElementById('title').innerText = s.title;
            document.getElementById('desc').innerText = s.description;
            document.getElementById('page-info').innerText = `Sample ${currentIdx + 1} / ${dataset.length}`;
            
            // Reset radio buttons
            const checked = document.querySelector('input[name="persuasion"]:checked');
            if(checked) checked.checked = false;

            renderDialogue();
            window.scrollTo(0,0);
        }

        function submitCurrent() {
            const val = document.querySelector('input[name="persuasion"]:checked')?.value;
            if(!val) return alert("Please select a winner!");

            const result = {
                user: userData,
                index: currentIdx,
                branch_id: dataset[currentIdx].branch_id,
                winner: val,
                swapped: dataset[currentIdx].swapped,
                timestamp: new Date().toISOString()
            };

            let all = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
            all = all.filter(x => x.index !== currentIdx);
            all.push(result);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(all));
            
            renderSidebar();
            if(currentIdx < dataset.length - 1) move(1);
            else alert("Last sample submitted!");
        }

        function move(step) {
            currentIdx = Math.max(0, Math.min(dataset.length - 1, currentIdx + step));
            render();
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

        function renderSidebar() {
            const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]").map(x => x.index);
            const list = document.getElementById('sample-list');
            list.innerHTML = dataset.map((s, i) => `
                <div class="sample-item d-flex justify-content-between align-items-center" onclick="jumpTo(${i})">
                    <span>Sample ${i + 1}</span>
                    <span style="color: ${saved.includes(i) ? '#16a34a' : '#cbd5e1'}">${saved.includes(i) ? '●' : '○'}</span>
                </div>
            `).join('');
        }

        function jumpTo(i) { currentIdx = i; render(); toggleSidebar(); }

        function exportData() {
            const all = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
            if(all.length < dataset.length) {
                if(!confirm(`You have only completed ${all.length}/${dataset.length} samples. Are you sure you want to export?`)) return;
            }
            const blob = new Blob([JSON.stringify(all, null, 2)], {type: "application/json"});
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = `behavioral_results_${userData.name.replace(/\s+/g, '_')}.json`;
            a.click();
        }
    </script>
</body>
</html>
