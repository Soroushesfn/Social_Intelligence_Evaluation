 a wide range of different ethnic groups with shared or related religious traditions that existed as distinct categories with limited interactions with each other for centuries. Some of those groups would have considered themselves indigenous to Palestine (probably the ones that lived there), others would not have. Ethnic identity is something that evolves over time and is not a static property of specific individuals or groups of individuals and their descendants. If we were to accept your definition of indigeneity, Indigenous groups would constantly expand and contract as the way people identified changed. For example, the distinction between Jews and Christians was something that developed over centuries. At the beginning, Christians were just a Jewish group. At the end, Christians were viewed as completely non-jewish. Today we have a certain concept of who is Jewish and what it means to be Jewish. 100 years ago, that concept was different, and in 100 years, we may have a very different concept. If that concept includes a large number of people who are currently not considered Jews, will those new individuals suddenly be indigenous to Palestine/Israel and have a claim to live on the land there?\n\nSecond, it doesn't make much sense to consider groups indigenous because they are \"inheritors and practitioners of unique cultures and ways of relating to people and the environment.\" There is no group of people today that has the same culture as Jews or Israelites from Millenia ago. Modern jews practice their religion very differently from ancient Jews - Rabbinic Judaism came into existence less than 2000 years ago. If we start talking about \"inheritors\" of the Jewish religious tradition, but allow for evolution in that tradition, why don't we also consider Christians and Muslims inheritors of ancient Judaism? They no longer share the same name, but they are no less evolutions of the Jewish cultural traditions from 2000 years ago. Even if we consider modern Jewish people alone, that category includes multiple groups with unique cultures and traditions that have elements that originated both in Palestine and outside of Palestine. For example, Ethiopian Jews have a very different practice of Judaism from mainstream rabbinic Judaism, which itself is distinct from the Judaism that was practiced by the original Israelites."}], "threadB": [{"author": "oremfrien", "body": "I would argue that one of the fundamental differences between Zionism and other forms of ethnonationalism is that most other forms of ethnonationalism did not require a large-scale population movement to \"return\" to the ancestral homeland. If we compare Zionism to Greek Nationalism, Turkish Nationalism, Bulgarian Nationalism, German Nationalism, and other ethnonationalist movements, there were certainly regions where the given nationality was a minority -- Greeks were a minority in Western Thrace, Bulgarians were a minority in some regions of Eastern Rumelia, and Turks were a minority in Smyrna -- but the overwhelming majority of the territory claimed by these movements (and ultimately subsumed by the resulting ethnonationalist states) did have locally-extant majorities of the named ethnicity.\n\nBy contrast, Jews had to make a large-scale migration to Ottoman/British Palestine in order to become a sizable population in any part of that territory aside from the city of Jerusalem. Jews had to immigrate in large numbers to push themselves up from being roughly 8% of the Mandate of Palestine population to 35% in 1948. \n\nYou try to compare this to the Armenification of the Erivan Khanate, but we should note that the Armenians who moved into the Erivan Khanate under Russian control did so because of Russian motivations. The Russians wanted to have a loyal population south of the Caucasus to defend the position from the Persians. The Russians wagered (successfully) that creating an Armenian enclave there would allow the Russians a natural bridgehead and protective line -- especially as the Cossacks were tied up with the Circassians in the Aul-Wars (and later Tsitsekun). It was not an attempt by Armenians to create a national state; Armenian nationalism did not really come to the fore until the founding of the Dashnaktsutyun Party over 50 years after these resettlements largely took place AND we should be clear that the Dashnaks were primarily oriented towards creating an Armenian State in West Armenia (modern Turkey) because Russia was sponsoring them, so they would not want to directly threaten Russia. Dashnaks only really began pushing for Armenian independence in East Armenia (modern Armenia/Georgia/Azerbaijan) when the Russian Civil War broke out, weakening Russian power south of the Caucasus."}], "swapped": true}, {"index": 173, "branch_id": "t3_1bzzhzr_1", "title": "CMV: If people on \"the left\" acting aggressive pushed you farther to \"the right\" on social issues, you were probably never a good ally to begin with", "description": "One thing I see many centrists bring up is how the aggressive behavior of the left pushes people \"more in the middle\" to the right.\n\nI understand the theory behind it, but I think it ignores something. If some negative experiences with people on the left caused you change your stance on various social issues, we're you ever really an \"ally\" to these groups in the first place? I honestly don't think so. In most cases it seems very disingenuous, just an excuse to believe the things you were likely going to believe anyways.", "threadA": [{"author": "jatjqtjat", "body": "Adam is far left and active aggressive about it. This push Bruce more toward the middle.  So Bruce was not a good ally to Adam, since he moved away.\n\nI would flip your thinking on this a little.  Adam's aggression has made Adam a bad ally.  Bruce was there ready to compromise until Adam got aggressive.  And presumably if Adam stops being aggressive, Bruce will come back to the table.\n\nIf say we ought to raise the top marginal tax rate by a few points, and then the people around me start saying we ought to eat the rich, and wealthy people are immoral, and socialism is the only path forward.  Hold up, I've been in the center this whole time, raising taxes on the wealthy by a small amount is only slightly left of center and I'm not trying to get mixed up with far left stuff."}], "threadB": [{"author": "colt707", "body": "I can be your ally and not agree with you on everything. If we agree on 95% of things but you continually beat me over the head about the 5% we disagree on then I\u2019m probably going to grow to dislike you. \n\nIt\u2019s not one time incidents doing this, it\u2019s a continual repeated pattern that does it."}], "swapped": true}, {"index": 113, "branch_id": "t3_1k03oig_1", "title": "CMV: Joining an anti-immigrant group indicates insecurity, not strength.", "description": "I believe that people who join groups that promote hatred towards immigrants (or any marginalized group) do so because of deep-seated insecurity, not because they are strong or confident. These individuals often feel threatened, lacking in control, and have low self-esteem.\n\nThey find a twisted sense of belonging and purpose in these groups. The \"othering\" of immigrants creates a false sense of security and bolsters their own fragile identity. The group provides a simplified narrative, offering someone to blame for their problems, which gives them a sense of control in a chaotic world.\n\nI'm willing to change my view if you can find something I'm missing.", "threadA": [{"author": "fisherbeam", "body": "Bernie Sanders has gone on record saying open boarder's is a Koch brothers conspiracy, I dont think hes insecure or totally wrong, I just think he realizes how much wages get suppressed when abundant cheap labor is available.   Most countries have boarder's for a reason, not because they hate immigrants, but because criminals from other countries can start a new life of crime somewhere else as well as protecting the sovereignty of its citizens. This was a mainstream democrat position in the 90's until the democrats started embracing wall-street as much as the republicans."}], "threadB": [{"author": "mmmsplendid", "body": "When you say anti-immigrant group do you mean people that are against immigration in general, or against specifically mass-immigration? \n\nAlso could you provide some examples of the groups you are talking about?\n\nI think this would set up the debate more clearly as I personally don\u2019t know of any groups that are against immigration, but I know of plenty against mass-immigration, as in specifically what we are seeing in the modern age largely in the West, as opposed to immigration in the past which is say was more organic."}], "swapped": false}, {"index": 127, "branch_id": "t3_1bzgwt7_1", "title": "CMV: It is possible for AI-generated art to deserve respect, and it should be allowed to exist.", "description": "For some reason when I say \u201cgenerated art is okay\u201d it\u2019s like people assume I\u2019m implying \u201cthe exploitative utility behind this new technology is fantastic\u201d. The whole topic of AI is incredibly stigmatized to the point where **there are several times I've seen dozens of people come to one post\r just to tell OP they're a piece of shit, that they're soulless, that they should delete the expression they posted.** I've even seen some very impulsive uninformed hate towards AI in real life, too. **So please let me clarify: My point is not that all AI art is amazing and you have to like it or stay quiet. My point is that people are literally becoming bigoted towards anyone who likes AI to the extent that they're advocating for ALL of it to be shamed and discouraged from society.**   \n\n\nIt's such a popular sentiment that I really feel like I NEED to know what I'm missing that is the cause of my disagreement. All this vitriol against something as simple as a picture of a kitten racing a horse just doesn't feel right, but nearly everyone I know seems to think it is.  \n\n\nI discovered a program recently called Suno. Long story short, you can spend an entire day directing a song to sound almost exactly how you want it to sound with little effort. It's incredible. Not only is it fun, but it's impressively precise when you get a paid subscription. After spending several hours on a 3-minute song and listening to the whole thing, I enjoyed it all so much that I cried because the ending resonated with me in a certain way. I'M NOT SAYING THAT MEANS IT'S A GOOD SONG, but I am saying I love it. I'm telling you this AI song has the ability to emotionally resonate with *at least one person*. No one can take away the fact that this piece of art wouldn't exist without my human experience. Nor can they say it's a fact that I put no effort into it. I wrote ALL the lyrics, spent almost an entire day directing the instrumental, mixing and mastering it and arranging all the sections in Ableton. Just because I didn't put as much effort into it as much as Kendrick Lamar did for TPAB does not mean it was easy to make something that I *really really* liked.  \n\n\n# Here are my main points as to why there's no need treat the concept of AI Art as an attack on the human race:\n\n1) **Art was never about talent or effort or skill.** Most people like art because it feels good. There could be a song with only two notes the entire time and any human might fall in love with it if they get comfortable enough with it inadvertently playing often throughout their childhood, or during a special period in their lives. A lot of artists don't even write their own lyrics or instrumentals, that doesn't mean the artists who do are completely exiled from the music industry. In fact, it's so silly to pretend that AI art will replace real art when we all know there are several human things that AI simply can't do. I understand you'd like to exercise your freedom of speech to tell someone their artistic expression is garbage. I'm just saying you don't have to encourage of the non-existence. But just because an art piece didn't take as much skill and time as To Pimp A Butterfly, doesn't mean it shouldn't exist, right?  Like, whether we're talking about AI or not.\n\n2) **AI art software is objectively beneficial for society**. That's how most powerful new tech goes. Many people have told me \"I really want to get into drawing/singing/playing piano, because I have so many ideas!\" Then when I sit them down to actually do anything, guess what? They'd rather go back to doom-scrolling. For 2024 and beyond, not only will Suno and Dall-E only get better at lowering the skill floor of art for regular people in a way to let us make detailed yet easy art that feels human... but ALSO artistic expression is now incredibly easy for the disabled. It's a whole game changer for someone who's mute and would like to have a voice, right? You can't make someone else say absolutely anything you want like with AI. The only real issue that arises from the nature of AI's existence and not from the fault of human beings, is the fact that it can only work by copying the techniques and concepts of human art. But even *that* concern is relieved when you realize that, just like with humans, AI is not going to always rip off everything it sees just because it's talent is influenced by everything it sees. Even if it did rip something off, do you think that's what the devs want? No. So it's only gonna happen less. Psh, You might notice that even without AI, we will still have the human unoriginality that leads to Call of Duty 12: Modern Warfare 3: 2: part 4: the movie. This leads to me to my last point....  \n\n\n3) **AI art is human.** I swear AI tech is the most natural next step for artistic technology. Like c'mon, let's not play pretend. I'm willing to bet every single person reading this knows at least ONE person who has always wanted to make a movie without going to film school, or worrying about the budget, finding who to cast, etc. No matter what, an AI's output is always the result of human input. Humans made AI, humans made the data that AI bases it's algorithm on, and all we need to do now is learn how to get even MORE control over the output than the impressive amount of control we already have. This AI song has vocals singing lyrics that *I* wrote, over a beat that *I* directed in 10-second increments. I think it's completely fair to say my AI song is not 100% organic or human, but to say that it's completely soulless with no potential for emotional expression or human connection is ridiculous. It's at least, like, 1% human so I'mma call it human.  \n\n\nANYTHING that can be entertaining can be emotionally connected with on a human level.  \n**CONCLUSION**  \nI think as a human society we're just having a hard time coming to terms with the fact that music is all just a bunch of math at the end of the day. We took one of the biggest things that make us special and unique as a species, and removed a large chunk of the mystique and hardship around it. It seems that most people think art is basically on life support just because some of it won't be made 100% by humans from now on.  \n\n\nThat's my take. I'm 100% willing to listen to other perspectives. \n\n^((Note this is from the perspective of someone who's been writing and recording music for 12 years.))", "threadA": [{"author": "SoundNo1844", "body": "I don't think AI is beneficial in the way you think it is. It promotes people to have a lazy attitude and not put work into what they want because they can just be lazy and have it made by a system for them instead. It promotes personality traits that hurt people in the long run, ex. just finishing things to get them done and not learnt the important skill or info. That kind of thinkind obviously really hinders people in academic and workplace settings cause they can't do anything themselves and will hurt them in the long run. \n\nI also think your missing an important reason for why artists dislike AI, it's not just job related, it't that theire intellectual property is being UNCONSENTIALLY taken to train AI. Like Developers are purposly stealing peoples works that they value without permission, they are being sneaky on purpose. The artists are mad because they aren't being treated fairly and lashing out at the people would take advantage of the AI despite it sometimes being unethically made."}], "threadB": [{"author": "sophisticaden_", "body": "> My point is that people are literally becoming bigoted towards anyone who likes AI to the extent that they\u2019re advocating for ALL of it to be shamed and discouraged from society.\n\nYes. \n\n1. The problem is that corporations will absolutely *try* to use AI to replace art. We live in a society that already highly devalues the role of artists, and most struggle to make ends meet; the proliferation of AI art only makes things worse. \n\n2. It\u2019s not helping them to get into those things. They still aren\u2019t drawing, or singing, or writing, or playing piano. A computer is. \n\n(Also, AI art *is* going to rip off everything it sees, because that\u2019s the *only* way it can create. It cannot imagine, or invent something new; it can only smash together things it already knows.)\n\n3. If people genuinely believed that the \u201cart\u201d they made with AI was real art (made by themselves), they wouldn\u2019t spend hours upon hours doing mental gymnastics and hooing and haing and trying to convince everyone else their art is worth anything. People are trying so hard to legitimize AI art because they know, deep down, that it\u2019s poor quality, it\u2019s unethical, and it\u2019s never truly their own work. You insult artists and you insult yourself by trying to pretend typing a prompt into generative AI is making art."}], "swapped": false}, {"index": 142, "branch_id": "t3_1hv3k36_1", "title": "CMV: South Korea cannot fix its birthrate crisis without a massive cultural shift.", "description": "The birthrate crisis in South Korea is a major issue, with it being way below the 2.1 replacement level at 0.74, and now I believe dipping into the 0.6 region. There are lots of reasons for this, and I've laid out 3 here, so here it goes:\n\n1. Most people in South Korea cannot afford to have kids. The cost of having a kid in South Korea is massive, and it doesn't help that you need private education, often times costing thousands of dollars a month in order for your kid to have a fair chance, which is another issue I'll touch upon later. The PIR for living in Seoul is[ 15.2](https://m.koreaherald.com/view.php?ud=20231222000484&utm_source=chatgpt.com). The average for most western countries is around a third to half that. And being in Seoul is practically mandatory in order to attend those private education facilities, as all the major teachers and facilities are in Seoul. The average person cannot afford to have a child, let alone buy a home. \n\n2. The people that can afford to have kids do not have time to raise them. South Korea is notorious for being a \"workaholic\" country, and it's true. There's extreme stress and resulting mental health problems. These people, while they can afford to have kids, do not have the time to raise them. Yes, you have maternity leave and things like that, but it still doesn't address the core problem. You just cannot take care of your kid if you have that tight and stressful of a work schedule.\n\n3. Why would you even want to raise your kid here? This is much more speculation than anything, so feel free to skip this part if you want. Life as a student in South Korea objectively sucks. There is so much stress and pressure in the South Korean education system, which results in a very high suicide rate in South Korea. An average student in South Korea (middle-high) attends multiple private education facilities a day, which all have classes ranging from 3 to 5 hours along with their respective homework. \"Vacations\" are seen as an opportunity to study like never before, rather than a chance to relax. It's not uncommon to spend 12 hours of your day roaming the Daechi district in private education facilities. You are actively encouraged to cut ties with friends starting even from middle school in some cases, and you have no time to do things you want like sports or clubs. This does not result in guaranteed success, either. There's people who do more but retake Korea's equivalent of the SAT for multiple years. A \"happy\" childhood is simply not possible in South Korea. And after all this, for males you have to go through conscription. Why would you want to put your kid through this?\n\nAn issue like this cannot be solved by increasing maternity leave or increasing payout to people that have kids. A complex problem cannot be solved by a simple solution. These are all cultural and economic issues rooted into the country. Being a \"workaholic\" and the private education problems all don't have real answers and the government's attempts at fixing this, well, has not been successful.\n\nThere are a few points I haven't talked about, like the 4B movement and all of it's related issues, but I did not want to delve into that. Feel free to look it up if you want to. For context, I'm a South Korean national in Middle School and I just wanted to articulate my thoughts. There's certainly some bias involved but happy CMVing", "threadA": [{"author": "PuffyPanda200", "body": "I am not Korean so take this from an outsider's perspective. \n\nYour comments seem to have this slightly elitist tone to them:\n\n>you need private education (for your child) ... for your kid to have a fair chance\n\n>being in Seoul is practically mandatory in order to attend those private education facilities\n\n>South Korea is notorious for being a \"workaholic\" country (I'll explain this one a bit)\n\nPut fundamentally, there are farmers/shop keepers in South Korea. If those people have children then those children really don't need more than public school to work on their family farm or shop. So they don't need to live in Seoul and don't need private education. And finally, those workers (who own farms or small shops) don't need to work super crazy hours necessarily. \n\nYour CMV seems to be predicated on people moving to Seoul and working at a big firm there and then pointing out that those people can't have kids easily (I agree that a larger shift would be needed to solve this). This seems like someone complaining that one can't own a house with a yard in the US and then insisting on living in Manhattan."}], "threadB": [{"author": "Mean_Construction339", "body": "OP is major BS\u2019ing. \n\nThey are definitely not a Korean national in middle school. They claimed they learned this amount of English while living in the US from ages 10-12. \n\nI\u2019ve been fortunate to live amongst Korean enclaves and non-enclaves in both heavily and non-heavily Korean populated states. Meaning, Korean kids in areas with a high Korean population, as well as in areas with a lower population, and everything in between. They are always VERY shy to use their English, so it takes them several years before they even start fully speaking to others in English. Culturally, it\u2019s seen as quite the burden to use English when you aren\u2019t good at it. \n\nLike a lot of Asian cultures, they tend to be insular and stick to other Korean speakers, which takes away from the time they can spend practicing English. \n\nThere is no one who speaks English like this after just two years of exposure. And before you claim you learned English in Asia too, have you ever listened to a person who learned English in Asia? It\u2019s definitely not like this, lol."}], "swapped": false}, {"index": 176, "branch_id": "t3_19cb32s_1", "title": "CMV: Current harassment rules in schools and workplaces are too subjective because they are based on whether the behavior was unwanted or not instead of whether the behavior was inappropriate or not", "description": "To be clear, I do think harassment is a serious problem affecting both men and women. I'm not trying to minimize anybody's trauma here. Many men/women have been harassed by other men/women and that's not at all Ok. \n\nBut one of the things that bothers me about the way we currently talk about sexual harassment is that it's often \"did this person make you feel uncomfortable or not\" and not \"was this behavior objectively inappropriate.\" \n\nIf I'm walking behind somebody in a dark alley at night, they may very well feel uncomfortable. But I don't face consequences for that because it's generally recognized that the person I'm walking behind might feel uncomfortable even though I didn't do anything problematic. Same thing if the roles are reversed. \n\nThat doesn't seem to be the case with workplace harassment. And the problem I see with that is that a myriad of factors will make a particular behavior seem more/less threatening even if the behavior is the same. For example, looks, fashion or lack of fashion, whether the other person is unkempt or not, mannerisms, and anxiety. \n\nIf there was a list of behaviors that could be considered inappropriate, people would know whether their behavior was in line or out of line. If they behaved in a way that was within guidelines they wouldn't be punished. If they behaved in a way that was not in the guidelines they wouldn't automatically be punished, but they could be if it made the other person uncomfortable. This way women/men wouldn't face consequences just because the other person wasn't attracted or interested in them in some way and women could report harassment with confidence it will be dealt with. \n\nThat's my view but I'm open to hearing other thoughts. CMV!", "threadA": [{"author": "GrumpGrease", "body": "Why do I have a feeling OP is basing their entire worldview off that \"Hello, HR?\" meme?"}], "threadB": [{"author": "Automatic-Sport-6253", "body": ">If there was a list of behaviors that could be considered inappropriate, people would know whether their behavior was in line or out of line.\n\nHow exactly would you compile this list? Which number on the list would be \"stroked a stapler as if he's touching his penis while licking his lips and maintaining an eye contact with the coworker\"? Would you have \"told his male coworker \"I would totally insert my flash drive into \\[female coworker name\\]'s back flash-port\" on your list?\n\nYour concerns seem to be unsubstantiated because the process is not \"I felt threatened/uncomfortable -> okay, we take your word for it -> offender fired\". HR is supposed to analyze the facts and render a decision whether actions were in fact threatening or harassing."}], "swapped": true}, {"index": 23, "branch_id": "t3_1d7sisn_2", "title": "CMV: AI art will be ultimately negative for humanity if we don't take steps to regulate it", "description": "\n\nI believe AI generated images, or AI art, will be ultimately negative for humanity because it uses work from other artists, it doesn't democratise art and instead reduces it's value and it sets a dangerous precedence that can make humans unemployable in the future\n\n\n\nAI requires the hard work from other artists to function and the models require large amounts of work to be fed into it for the models to work. I disagree with the notion that the AI is stealing from artists as the AI transforms the artwork, but I still think that the people developing AI should have asked the artists before using their art. AI's supporters make the argument that the fact that they posted their work online means that they consented to anyone seeing it. They consented to people seeing it, not for it to be scraped from the internet to create a machine that may ultimately completely destroy their career and the profession of art. \n\n\n\nThe second argument for AI art is how it democratises art. I very much disagree with this sentiment as art is already democratised, all you need to make art is a pencil (or pen), a medium and time. People compare AI art to other technological advancements like DAWs in music, photography and digital art, these aren't alike to AI art as DAWs allowed the common person to use their musical skill to use many instruments that would never be used otherwise, photography still requires the skill of the camera operator to arrange and align objects to get what they want (I've heard someone call it \"painting with light\") and digital art allows people to create art with a few time saving additions (like layers and the fill tool), who does AI art open art to? people who can't draw? \n\n\n\nAn argument I've heard for who can benefit from AI art is how it allows people with disabilities to create art and how it allows people to become artists without an opportunity cost. The first is condescending to disabled people as it implies 'oh disabled people need a machine to make art for them', which isn't true as Frida Kahlo, who was stuck in a wheelchair, was able to make art and Paul Alexander, who was stuck in an iron lung, was able to become a lawyer and write a book (without ChatGPT). The second is incredibly laughable as the opportunity cost (or time spent learning) is what makes art valuable and admirable as a skill. Imagine applying the same logic to other professions:\n\nOh this escalator up Mount Everest will democratise climbing to allow people to climb it without the opportunity cost\n\nOh this punch-inator 9000 will democratise martial arts by allowing people to punch as hard as Mike Tyson without any of the training or opportunity cost\n\n\n\nI actually think this will make art less valuable as it'll make it so people will initially think \"oh this is just made with AI\" rather than amazement that a human has the skill to make that kind of art. \n\n\n\nThe final argument against AI is how it will replace artists en masse. I've heard 2 arguments against it:\n\n1. AI sucks at certain things and can't be creative so if you got replaced with AI you probably suck\n\n2. This is just the nature of automation\n\nThe first only really applies to high art, because most art isn't in art galleries, it's in the designs of floors, walls, bags, cards, book covers, and so many other things, and these things are prime examples of things that can be easily replaced with AI. AI may have weaknesses now (like hands, firearms, anything mechanically consistent) but don't forget that 5 years ago this was fantasy, hands have been improved incredibly with AI over the last year, who knows what AI will be able to do in 5, 10 or 20 years? Human artists are also at a massive disadvantage as they cost minimum wage while AI costs just a subscription and is orders of magnitude faster due to being made of lines of code rather than flesh.\n\n\n\nThe second sets a dangerous precedence as you can very easily apply the same logic that \"it's just the nature of automation\" to every profession on the planet when AI gets to them. An argument made is that \"AI will replace some jobs but it'll create new ones\", which may not be true as most of the most popular jobs existed in some form before the industrial revolution, so this means that automation hasn't created more jobs for people, it forced people to go into other professions\n\n\n\nI know that automation is the reason why we can live the lives we can live now, but I look at the trend and see the end of employment and think \"maybe we should stop?\"", "threadA": [{"author": "poprostumort", "body": ">AI requires the hard work from other artists to function\n\nArtists also need the hard work from other artists to function - most artists are not innovators, they follow the trends set by other artists.\n\n>I disagree with the notion that the AI is stealing from artists as the AI transforms the artwork, but I still think that the people developing AI should have asked the artists before using their art.\n\nDo artists do it themselves? It is common to look at other artists pieces for inspiration, whole art college is based on learning from better artists. If a guy can go and use other artists work to learn how to be artist themselves - all without asking, why another guy who is training an AI does need to do it?\n\n>The second argument for AI art is how it democratises art. I very much disagree with this sentiment as art is already democratised, all you need to make art is a pencil (or pen), a medium and time.\n\nThat is dismissing the point of how this democratization happens - and it is by lessening effort needed to create art. Right now you need time and money to learn art in a capability allowing you to do anything beyond pencil drawings for your drawer. AI lessens that burden by allowing people to use much less time and money to be able to create AI art that is usable for them.\n\n>Oh this punch-inator 9000 will democratise martial arts by allowing people to punch as hard as Mike Tyson without any of the training or opportunity cost\n\nThis is actual reason why people oppose AI art. It's elitism - I paid opportunity cost and put effort into training and that makes me better - so they need to pull by their bootstraps and become artists, not use some automation tool to do that. You can see it with artists talking about AI art - from arguments of \"It's stealing\" (that does not apply to artists who do the same process), \"It's not real art\" (which does not apply to artists, who can buy a tin can, shit into it - and it will be performative art) or my favorite \"automation supposed to get rid of work and chores leaving us art to focus on\" (which is thinly veiled statement that artists creating art should be the pinnacle of achievement, not be automated like work of those laborers).\n\n>The second sets a dangerous precedence as you can very easily apply the same logic that \"it's just the nature of automation\" to every profession on the planet when AI gets to them.\n\nAnd what is the problem with that? Why labor should be the default? It's not like this change will happen overnight - it will be happening gradually as with every other kind of automation. This allows to make changes both in market and society that will accommodate less people needing to work. \n\n>AI will replace some jobs but it'll create new ones\", which may not be true as most of the most popular jobs existed in some form before the industrial revolution\n\nWhich ones are you talking about? Cashiers? They were a tiny minority of people because people lived off the land, it was the industrial revolution that made people need more shops due to them living in urban areas and working for money not produce. Food preparation workers? The same - they were a minority that experienced a boon after industrialization started. Stocking associate? Born from industrial age. Bookkeeper? Exploded via industrial age. Medical assistants, nurses? Industrial era caused them to explode.\n\nIf you look at most popular jobs - they were ones created due to advancements of science and technology. And outliers like construction workers or carpenters will not be replaced by AI in any foreseeable future, due to the fact that they operate in too complex environment for it to happen (blue collar jobs that could get automated, largely are)."}], "threadB": [{"author": "DieselZRebel", "body": "> I still think that the people developing AI should have asked the artists before using their art.\n\nIf 'their' here refers to the possession, then you are wrong because most of the artwork being used is actually licensed to few corporates to use them in any way the like, until the artist removes them. The artists had already provided such permission when they agreed to use instagram, facebook, and their likes. They benefited from it and they didn't pay a penny to have their content hosted, stored, and viewed by fans. More than a decade later, these companies find a way to utilize this art, which these companies legally own through licensing. So why would they need to go back and ask permission?\n\n> They consented to people seeing it, not for it to be scraped\n\nWell... That is inaccurate. They literally consented to either transfer copyrights entirely at some places, or license corporates to use their art in any way, including sharing them with third parties, at other places. These have literally been the sorts of wordings on user agreements."}], "swapped": true}, {"index": 4, "branch_id": "t3_1awvqov_1", "title": "CMV: the 1948 Nakba, the seizure of civilian houses and territory by Israel, was a war crime under the standard definition", "description": "As a result of the 1948 Arab-Israeli war, Israel seized a large amount of territory and houses from about 700,000 Palestinians who had evacuated in anticipation of the war:  \n[https://en.wikipedia.org/wiki/Nakba](https://en.wikipedia.org/wiki/Nakba)\n\nThe [Geneva Convention](https://www.un.org/en/genocideprevention/war-crimes.shtml) defines a \"war crime\" to include: \"extensive... appropriation of property, not justified by military necessity and carried out unlawfully and wantonly\".  This straightforwardly meets the definition, since taking of houses from 700,000 people is pretty \"extensive\".\n\nA common response to this is that the territory was seized as a result of a war that was started by the Arab states; however, under the standard definition of a \"war crime\", it doesn't matter. It's still a war crime to take civilian houses even if the other side started the war.\n\nOther excuses I've heard in response to this argument have been \"The Arabs would have done the same or worse if they'd won\" and \"Arab countries were doing the same thing to Jews at the same time\". Even if true (and the second one is in fact true), none of these change the fact that it met the definition of a war crime when done by Israel. CMV.", "threadA": [{"author": "Xolver", "body": "Can I try to meta change your mind? ie, your motivation for even creating this CMV?\n\n\nIt seems you pretty much agree, both in the OP and then in a few of your comments, that other countries and peoples, Arab countries and peoples certainly not withstanding (and there's plenty to be said about Europe as well), that displacement/genocide/war crimes have happened abundantly, and not just historically but in recent times, around when the Nakba happened, and before that, and after.\n\n\nAssuming I am not mischaracterising you, and it's something that's very common - what's the point of this specific CMV? Why isn't it, for example, \"Egypt committed war crimes, CMV\"?\n\n\nWe are left with little options:\n1. We think that Israel admitting said war crimes will suddenly change something in its policy, maybe give justice back to wronged people, etc. But this doesn't make sense unless you are specifically anti Israel, as you don't ask for this to happen for other countries and peoples.\n2. We believe Israel is unique in its war crimes. Doubtful you think that way.\n3. This is just an academic exercise. You're trying to be intellectual and \"impartial\" about this while ironically missing how it's so bad faith to single out just one country, sadly as many other intellectuals are doing.\n\n\nBased on your text, I'm betting on option 3. And if by pure luck I managed to convince you to take the whole of option 3 and not just the first part about the academic exercise, then maybe you'll stop asking these seemingly innocuous questions, and ask others to stop, as well.\u00a0\n\n\n*Insert a smart sounding snippet about road to hell being paved with good intentions or another one about evil only needs good people to do nothing to thrive, etc.*\n\n\nCheers."}], "threadB": [{"author": "Old-Rip4589", "body": "I think it might be relevant that the section of the Geneva Convention you reference was part of the the Fourth Geneva Convention which was drawn up in 1949.\n\nLaw isn't applied to events occuring before it was written. This is a pretty standard legal principle.\n\nThe Nakba is obviously morally wrong, and I'm sure broke some sort of international law. However I wouldn't use that specific justification to call it a war crime. If conducted a couple years later than yes it would be a war crime.\n\nMorally wrong yes, illegal in that specific way at that time no."}], "swapped": true}, {"index": 1, "branch_id": "t3_1g25tec_1", "title": "CMV: Blood donation should earn a tax credit", "description": "Implementing a tax credit for blood donation would be an effective way to increase the number of donors and alleviate blood shortages. Here's why:\n\n* **Incentive:** A tax credit would provide a tangible benefit to donors, motivating more people to participate.\n* **Reduced Shortage:** A 1% increase in donors could significantly impact blood availability, potentially eliminating shortages.\n* **Fairness:** A tax credit would avoid the ethical concerns associated with paid donation, which could incentivize vulnerable individuals to donate beyond safe limits.\n* **Limited Benefit:** To prevent abuse, the tax credit could be capped at a reasonable amount, such as $1,000 per donation, with a cap at 5 donations a year.\n* **Tracking:** By linking your donation to your SSN, this cap will be easily enforceable.\n* **Net positive for society**:According to GiveWell, the average cost to save a life through a charity is between $3,000 and $5,500 and a single blood donation can help two or more patients in need so the \"cost\" of this tax credit is much lower than the benefit.\n\n[sources](https://americasblood.org/wp-content/uploads/2024/08/U.S.-Blood-Donation-Statistics-and-Public-Messaging-Guide-Jan.-2024-v-2.1-FINAL.pdf)\n\nI'm open to discussion and reconsidering my views if presented with new insights. I'm very interested to know what kind of downside this approach would have. ", "threadA": [{"author": "TheTightEnd", "body": "There are already far too many tax credits and other forms of discrimination in the tax code where we should not be encouraging more.  This also is problematic for those who for health or other reasons are unable to donate blood."}], "threadB": [{"author": "ferretsinamechsuit", "body": "$1000 per donation?  that's crazy.  13.6 million blood donations are made per year.  so this would cost the government 13.6 billion (roughly) in tax revenue even if it didn't increase donations.  if it doubled blood donations, great, but that would cost US citizens 27.2 billion dollars ( because ultimately taxes one way or another go to supporting US citizens).  I can think of a lot better uses for 27.2 billion dollars.\n\nLet's say you are an HIV positive person, but you lost your job and need some money.  You would be highly incentivized to lie about your HIV status to be allowed to donate blood.  If we have some national registry of who has any sort of disease to disqualify them from donating, that would be a big legal issue first off, and it would encourage people to avoid even getting tested.  People would go to out of country or off the books doctors who would perform the tests but keep them off any official record.  \n\nSure, one blood donation could help 2 people, but it could also take 10 blood donation to help a person. Or a couple of donations and the person isn't going to die either way."}], "swapped": true}, {"index": 123, "branch_id": "t3_1dkbyfw_1", "title": "CMV: You can\u2019t manifest negative or positive things happening.", "description": "You can do work and make things happen, but just being willing to see, consider and/or address the possibility of negative things (for example) happening has no impact on those negative things actually happening.\n\nFurthermore, if you focus only on the positive possibilities, they won\u2019t happen just because you focused on them. If they happen and you did nothing to make them happen, other than your ritual of manifesting positive outcomes, then that was always going to happen and it\u2019s just a coincidence that it did. There are probably thousands of other people that tried to manifest something positive and it didn\u2019t happen for them, at exactly the same time.\n\nAlso, it can be really helpful to be willing to consider the negative instead of denying the possibility of negative things. This is simple preparation. I tend to do better than my coworkers that have the \u201cmanifest the positive\u201d mentality because I\u2019m prepared with backup plans in the event that something negative does occur, while they seemingly have an existential crisis (which often has no impact on how they handle the next situation).\n\nTo be fair, it\u2019s also not good to be just positive or just negative all the time. There\u2019s a balance. I think it\u2019s all about seeing things for exactly what they are, being willing to express exactly how we feel about them, and being as prepared as humanly possible while still accepting that we may still fail despite our seemingly thorough preparation.\n\nEither way, believing that something will happen has no impact. Only work does.", "threadA": [{"author": "hacksoncode", "body": "See... the thing is, you can't manifest the *things* unless the manifestation changes your behavior (which, of course, it can and does), but you  *can* manifest them being positive or negative based on your mental outlook. \n\nThis is so obvious it sounds stupid to even mention it, but that's what people (except the ones with no self-awareness who are dumb as a rock) are actually talking about... manifestation is a *metaphor*."}], "threadB": [{"author": "WantonHeroics", "body": "The placebo effect can have a powerful effect on outcome, such that research studies *require* it. If your drug research omits a control group that takes only a sugar pill, the results will be thrown out. Everything you're saying contradicts decades of science."}], "swapped": true}, {"index": 145, "branch_id": "t3_1h79sq7_1", "title": "CMV: urban developers should return to traditional gridded patterns", "description": "This is opposed to the commonly used modern system of new clear-cut development accessible only from a busy road and with no other outlet.\n\nThe reasons being:\n\na) streets that randomly curve and dead-end may contribute to an immense sense of spatial disorientation\n\nb) gridded streets may reduce traffic by generating multiple combinations of routes all leading to the same place in near-equal time\n\nc) grids may encourage mixed-use development and small business because they're not isolated, so more individuals flow through them and it makes more sense to prop up a commercial endeavor. This may in turn reduce car dependency and the need for parking spaces, creating a self-perpetuating cycle of densification and eventually public transport feasibility. It also means the cost per capita of maintaining infrastructure drops.\n\nd) more intersections may mean cars travel more slowly, making it safer for children to play outside\n\ne) usually when isolated neighborhoods are created, all houses are in a similar if not identical price bracket. If new neighborhoods are more seamless connections to greater urban areas, it may encourage the production of homes in a variety of sizes and materials, making it more accessible for low-income individuals and building local character.", "threadA": [{"author": "SpiritualCopy4288", "body": "You make solid points about grids, but I don\u2019t think they\u2019re the universal solution. Curved roads and cul-de-sacs can reduce cut-through traffic, making neighborhoods quieter and safer for residents. Grids, while great for connectivity, can bring congestion and noise into areas meant to be residential.\n\nAlso, the benefits you mention\u2014like mixed-use development and reduced car dependency\u2014depend more on zoning and transit investment than street layout. A grid won\u2019t solve car reliance if the area is still zoned for single-family homes and lacks public transit.\n\nGrids are useful, but wouldn\u2019t better zoning and planning achieve the same goals, no matter the layout?"}], "threadB": [{"author": "destro23", "body": ">streets that randomly curve and dead-end may contribute to an immense sense of spatial disorientation\n\nNah, roads should be way more curvier:\n\n\"increasing the number of sharp curves on a road segment appears to lower the risk of crashing, according to a new paper in the journal Accident Analysis & Prevention. Curves carry a level of inherent risk\u2014they\u2019re more dangerous than a straight segment of road, independent of other risk factors. As this paper points out, a decrease in a curve\u2019s radius can make it safer, as can an increase in the number of sharp curves on the road itself.\" [source](https://ssti.us/2019/10/28/more-sharp-curves-make-roads-safer/)\n\n>more intersections may mean cars travel more slowly, making it safer for children to play outside\n\nNah, we need more roundabouts, and less intersections. \n\n\"Driving in a roundabout is safer and more efficient when compared to traditional signalized intersections and stop-controlled intersections. In a roundabout, the cars are traveling at a slower speed (approx. 15-20 mph), there are fewer conflict points, and if crashes occur, they are much less severe. Studies have shown that when compared to signalized intersections, roundabouts result in: 90% fewer traffic fatalities - 75% fewer injury collisions\" [source](https://www.dot.nm.gov/roundabouts/#:~:text=75%25%20fewer%20injury%20collisions,than%20if%20it%20was%20signalized.)\n\n>grids may encourage mixed-use development \n\nGrids actually make it way easier to impose strict zoning regulations. \n\n> it may encourage the production of homes in a variety of sizes and materials\n\nNah, not without altering the larger trends in the home building industry:\n\n\"In recent years, builders have focused on building larger homes because they have the financial incentive to do so. Builders were only building luxury, high-end homes because those were the sure thing, said Nela Richardson, chief economist at Redfin, a real estate data firm and brokerage. Not only did wealthier buyers have the money to purchase homes, but they were also the only ones who could qualify under tighter mortgage standards.\n\nOther factors in the construction industry have amplified this tendency. Lot availability has declined,\u201d said Nino Sitchinava, principal economist at Houzz. As lots become more scarce and expensive, and construction costs go up, builder margins get squeezed. It makes economic sense for developers to build larger homes, she said.\" [source](https://www.constructiondive.com/news/new-homes-in-the-us-are-getting-larger-heres-why/427018/)"}], "swapped": true}, {"index": 17, "branch_id": "t3_1ck17a7_2", "title": "CMV: Boycotting the Eurovision and complaining about those who want to watch it due to Israel's involvement is completely irrational and achieves nothing.", "description": "With the Eurovision coming up soon I am finding the push to Boycott it and complain to those still happy to watch it completely irrational at best. This prevailing attitude makes absolutely no sense in anyway, and the common arguments for these actions also to me are nonsensical.\n\nI will address the common reasons I hear in this text, in order to CMV you can try to alter my perspective on any one of these.\n\n* It is hypocritical for Russia to be banned from the Eurovision but not Israel: Russia was banned for starting an uninstigated war with Ukraine; another competing state. It should be clear why the competition can not have two countries actively at war with one another be competing in the same competition. Israel on the other hand is in a completely different situation; Palestine is not in the competition and regardless of ones views of Israel's actions since it is inargubable that they instigated the current conflict. All action taken by Israel has followed the October 7th attacks, without those there would currently be no new conflict. Ones views of how proportionate the Israeli response has been is irrelevant, the fact they did not begin the current conflict unprovoked is sufficient to see how a comparison between them and Russia is not possible,\n\n* Countries must boycott the Eurovision to send a message: I do not believe Israel, Israeli's, or the Israeli government cares in the slightest whether or not a specific country competes in a music competition due to their activity. Much in the same way that no other European country cares in the slightest which are competing year after year. Boycotting the Eurovision is a pointless activity that won't be noticed, if one wants to make a meaninful impact then protesting, volunterring, donating, or anything else is a much better way to make their views felt rather than boycotting a random music competition.\n\n* Eurovision is meant to be apolitical, including Israel is an inherently political act: Eurovision is meant to be apolitical; hence why it does not ban nations for whatever they are currently doing elsewhere. The sole exceptition is Russia and that is because Ukraine is another competing state, rather than taking issue with a member state entering a war. As well as this the focus on the eurovision is bizarre considering, to my knowledge, there has been no pushback for similar organisations such as the Olympics, World Sport Organisations, or literally any other apolitical competitions. It is solely the Eurovision that people are passionate about in this case.\n\n* Letting Israel compete in the Eurovision helps them profit and thus helps them in the current conflict; Literally no nation makes money from the Eurovision. The only possible arguement is the host nation and it's unlikely Israel will win anyway. Even if they did win it's a meme at this stage that no country actually wants to win since the competition becomes a money sink for the host nation. Eurovision is simply a thing people invest in to compete, I do not think a single nation ever has left the competition solely as a competitor with some kind of monetary profit.\n\nThose are the four main points I have heard, and if I recall a fifth I may add it to this post. If you can change my view on any of these four points, or give another reason why one should seriously entertain boycotting the Eurovision over Israel's involvement please share.", "threadA": [{"author": "NotMyBestMistake", "body": ">**It is hypocritical for Russia to be banned from the Eurovision but not Israel:**\n\nIs it really your idea that Russia was banned because it would be awkward having two warring countries attend the same event? Not the moral and ethical condemnation? If Russia was committing genocide of Nigerians would you be here demanding that they be included and that anyone who disagrees is just being dumb?\n\n>**Countries must boycott the Eurovision to send a message:**\n\nIsrael absolutely cares about its international standing. It's why they throw a fit anytime Spain or Ireland criticize them or, hell, anytime a country doesn't shield them from criticism. Israel is entirely dependent on international support and they're absolutely shit at any diplomacy that isn't calling people nazis. Every loss of face on the global stage is a risk and they're handling of the conflict shows that the only reason they've not been thrown away is that the US shields them.\n\nAlso, the message doesn't have to be to Israel alone, as it sends a message to other European nations who might care that their neighbor thinks their actions are endorsing genocide.\n\n>**Eurovision is meant to be apolitical, including Israel is an inherently political act:**\n\nYou continue to construct some extra special reason why barring Russia from everything is okay because it'd be a little too uncomfortable haivng them and Ukraine attend, but that doesn't actually matter. In addition, people paying attention to Eurovision is not invalid or strange just because you haven't noticed people doing every single other event that exists alongside it.\n\nGenerally, the inclusion of a nation actively engaged in a genocide in your fun little culture festival is uncouth, unethical, and calls into quesiton the morals and ethics of everyone involved. \"It's apolitical\" is a pretty unconvincing reason when you openly say you have no problem excluding other countries for their recent political and military actions. You can disagree with these ideas, but you've presented no reason that opposition to Israel's inclusion is irrational. You just don't like it and want to insist that the only reason anyone could disagree with you is if they're fundamentally irrational."}], "threadB": [{"author": "icyDinosaur", "body": "First of all, personal disclaimer on where I come from on this because I think that matters: I have an ambiguous, conflicted, and hopefully nuanced view on Israel, but I am a massive Eurovision fan and I genuinely don't think I have it in me to boycott Eurovision for anything short of something genuinely outrageous being done directly by the contest. So, I'll be happily watching, and I'll be treating the Israeli entry as a completely normal entry in the lineup.\n\nAs for your CMV: I am a little confused about your points, because your title deals with individual people not watching it, while your arguments seem to speak more about entire countries pulling out if Israel participate. Those are vastly different arguments (for starters, the former is actually still possible, while countries pulling out at this stage would only be possible with massive financial penalties). I will here first argue why I think fundamentally, boycotting Eurovision is useful for those who believe it to be justified, and then I will talk a bit more about the individual points you make.\n\n**Is personally boycotting Eurovision a sensible decision given certain convictions?**  \nLet's assume someone has a strong conviction that Israel's actions in Gaza are terrible, they amount to genocide, and that they must take some steps against it. It doesn't matter whether this is true or not, we just assume that our hypothetical person genuinely believes that. Under those assumptions, for this person, watching Eurovision with Israel in it can be understood as normalising Israel and saying that it is still a normal, acceptable country (see below on why Eurovision has that effect). Doing so would break their moral convictions. It is therefore useful for that person to boycott Eurovision because they believe that not doing so would be immoral. You argue that boycotting Eurovision does nothing and you should go protest, volunteer, or donate instead. However, boycotting Eurovision incurs no opportunity cost. The person is still equally able to do all of those things, and if they sleep a bit better that night thinking they did the right thing that is a perfectly reasonable decision.\n\n**Does Israel participating in Eurovision do anything to help them?**  \nThe body of your message essentially argues that nobody cares or notices if Israel is there. I agree that other things are significantly more important, but Israel's participation in Eurovision does actually help its image. It includes Israel in a group of European countries. It's also an event that specifically has a progressive, diverse, tolerant image. Having Israel there contributes to the idea that Israel is \"one of us\", a tolerant Western nation. This is a narrative that Israel often uses to appeal to Western audiences, and European (and American) politicians use to justify supporting Israel. \n\nIsrael (and other countries, they are by no means alone in this) are also aware of this: In 1998, it is well reported that they deliberately chose Dana International - a transwoman - to represent them in order to present Israel as a tolerant country. This is fairly common too, many countries choose entries to promote a specific self-image. This year, Israel's entry, even in its revised version, contains clear references to the Hamas attacks. It paints Israel as a hurt, wounded country that needs to defend itself. Now, I personally believe that is entirely reasonable from the perspective of an Israeli artist, but it does contribute to building a narrative. \n\nBefore you, or someone else, responds that this is a conspiracy theory and Israel's artists are just expressing their personal hurt: It doesn't matter. I am not saying they deliberately chose this entry to manipulate us, I'm just saying that this is one of the effects their participation has, *even if it's entirely unplanned by Israel*\n\n**Does this mean we all should boycott?**  \nI don't think so. But it does give a reason why someone who cares a lot about the Palestinian cause, and not so much about Eurovision, might have moral inhibitions about watching. I don't share those moral inhibitions, but I believe they come from legitimate takes. Therefore, given a certain conviction, it is a sensible decision not to watch Eurovision this year."}], "swapped": true}, {"index": 78, "branch_id": "t3_1eaiyh5_1", "title": "CMV: Most communication problems boil down to the fact that people are not taught respectful debate", "description": "This might be a bit long because I was taught how to debate, not how to keep things concise, and I apologize for that in advance.\n\nWhen you\u2019re opposing another person\u2019s point of view, whether it\u2019s about gun rights or which ice cream flavor is the best, the most basic rule of debate is that you _cannot brute force someone else\u2019s opinion to your own_. People exist with all sorts of pre-conceived notions and beliefs, and you cannot convince someone to change their mind by simply saying \u201cyou\u2019re wrong\u201d; and this in most cases is why internet arguments tend to be such a cesspool.\n\nTake the abortion argument, for example. Personally, I\u2019m fully pro-choice and I believe everyone should have the choice of what to do with their body. But I can\u2019t just walk up to someone who\u2019s pro-life and say \u201cbodily autonomy!!\u201d and expect that to win the argument, because to them, the sanctity of life, even for a fetus, is more important. \n\nAnd this is where the respectful debate needs to come in. The people on both sides of the argument hold strongly in their belief that they are right, and the other side is wrong - so convinced, in fact, that it is impossible for them to see the issue from the other side\u2019s point of view. If I want to convince pro-life people to legalize abortion, my arguments should not be the common ones of \u201cit doesn\u2019t matter because the fetus isn\u2019t alive yet\u201d or \u201cthe mother\u2019s bodily autonomy is more important than the life of the fetus\u201d because these are _core beliefs_ that the other side will not change. Similarly, if I wanted to convince the pro-life side that abortion was immoral, the argument of \u201clife begins at conception\u201d simply wouldn\u2019t work because the other side already strongly believes the opposite. These beliefs may be wrong or right, but if we want to change people\u2019s minds, it shouldn\u2019t be done with mindset that \u201cThey\u2019re wrong, I\u2019m right, and I\u2019m going to let them know that.\u201d\n\nIn both cases, the parties arguing are simply viewing their own belief as a fact, and fail to take into account that stating this fact, no matter how often and through what medium they do it, will never change the opposition\u2019s mind, because the opposition already has their own very strongly held belief. Because nobody on either side is willing to be open-minded and explore the other side\u2019s opinions, every discussion of such topics devolves into an argument.\n\nContinuing the abortion argument, the right way to do it if I was pro-choice would be to try and understand _why_ my opponent believes in the sanctity of life. Whatever the reason is for their belief, whether religious or educational or social or anything else, I can dissect it and compare it to why I believe in bodily autonomy, and how that is different from what my opponent believes; and then use the information we gain to understand each other\u2019s positions better. The goal isn\u2019t to prove I\u2019m right; it\u2019s to understand my opponent and their thoughts well enough that they can be _led_ to my belief on their own terms.\n\nAll of this obviously requires a lot of effort, time and willingness to be open-minded and occasionally accept that you are wrong, none of which is really possible in today\u2019s rage-baity engagement-farmy internet. However, I still honestly think we could prevent so many large scale arguments around the world if people were simply taught the right way to deal with opposition and arguments, instead of turning these issues into a screaming hotbed of two parties insulting each other\n", "threadA": [{"author": "eggs-benedryl", "body": "I was taught to write persuasively during school. I was made aware of a fallacy is. \n\nWhat makes you think these things aren't taught? They're taught, they're just disregarded and forgotten due to the echo chamber's of social media and media at large. People believe the world agree's with them, or those with authority do because we're shown that in our personalized feeds. \n\nI have scientists in reels confirming my own views and people on the other side have the opposite in theirs. We think it's unfathomable that someone could believe X, because we're shown our \"proof\" all day every day.\n\nPeople can argue but they don't, they're shown content confirming their biases all day every day and they just believe that the proof is right in front of everyone's faces. \n\nYou don't seem to focus on any info about people not being taught this and instead focus on WHAT people are doing, not why they aren't doing it correctly. \n\nYou're preaching to the choir about debate, this is CMV after all. We seek sweet sweet deltas"}], "threadB": [{"author": "LapazGracie", "body": "It could also be due to underlying beliefs that are in conflict with each other.\n\nFor example I'm no KKK racist. But I believe if you break down humans by ethnicity instead of race. You would see differences between ethnicities in things like IQ, aggression, athleticism, work ethic, impulse control and a whole host of other features. The differences may not be as big as the KKK style racists would lead you to believe. But they do exist.\n\nMe and a person who believes that all ethnicities are identical. Are going to disagree majorly on topics. Even if we perfectly understand each others positions. Even if I can argue his points using his beliefs and he could argue mine. It doesn't matter. We just believe polar opposite things."}], "swapped": false}, {"index": 63, "branch_id": "t3_1oa6nrb_1", "title": "CMV: Retirement is dumb. It's better to save only for emergencies and take vacations while you still can.", "description": "Background: I have two grandfathers. One worked until he was 92. One retired at 65. One of them had a much much happier life (Despite having far less money)\n  \n  \n\nRetirement doesn't make sense for a few reasons\n\n  \n* You may not ever live to spend the money you save. Retiring then dying is a common occurance. People make elaborate plans of what they are going to do when they retire, and then often no longer have the ability to do those plans when they are old. Given that every day is another chance for death it doesn't make sense to wait for a future day that you will be happy\n\n  \n\n\n* You can spend that money to have a happier life now. This I think is the most important part of the equation. Scrooge Mcduck vults of money are worthless to you. Obviously it is still important to be prepared for emergency, and I would support being able to live a year without a job, but more than that is meaningless. There is very very few situations that could arise that would lead to you needing more money than that as long as you have insurance to cover catastrophes (Health/Life/Property etc) Many of things you would want to do in retirement are completely doable during a long vacation.\n\n  \n\n \n\n* People who retire aren't happier. I think that my view would be less strong if people who retired actually were happier but that just isn't the case. The hedonic treadmill comes for everyone. Even if you don't have a worst case scenario situation of death or illness preventing you from enjoying retirement, you still are going to have your happiness return to a nominal level. As long as you are making enough money to not be stressed about money, you are better off with infrequent dopamine rush vacations than retirement.\n\n  \n\n\n* If you hate your job so much you are looking forward to not having to ever do it again you need to change jobs now, not wait decades to quit. I think this is really the tragic part of the retirement argument. People get trapped into a life they hate and are trying to run out the clock. This is awful, but really has nothing to do with retirement. If you are 45 and are counting the days till you are 65 then you should make a change now. It's pretty much never too late to change careers and find something that you find satisfying.", "threadA": [{"author": "ProblematicTrumpCard", "body": "Saving money pays for retirement.  I retired a couple years ago at age 57.  I made around $3.5 million in my life from W-2 earnings.  Today, I have a net worth of around $3.2 million ($2.5 million investments, $700,000 home) to fund my (and my wife's) retirement for however long it might last.  \n\nDoesn't that seem like a better situation today than having spent all that money, be sitting with no cash and a $300,000 mortgage, and having to work until I die?"}], "threadB": [{"author": "RevolutionaryHole69", "body": "I don't understand who you think is going to pay for everything you need when you are old and bedridden. In most places in the world, someone has to pay for that, even if the medical care itself is free. You still have to pay someone to wipe your ass and bathe you. That shit is expensive, no pun intended."}], "swapped": false}, {"index": 108, "branch_id": "t3_1bq3nur_1", "title": "CMV: Acts of civil disobedience leading to arrest only matter if it's large enough. Small or lone acts don't accomplish anything.", "description": "Recently I participated in a small protest/march for Palestinian Liberation.  I don't think there were more than 40 people there total.  A subset of our group split off and blocked traffic for about 15-20 minutes on a major road in NYC as part of the protest.  My partner was amongst the people who blocked traffic.  It was very peaceful.  They sat down in the middle of the street after a red light and didn't move until they were arrested.  When they were arrested, they didn't fight back, or do anything aggressive, just peacefully allowed themselves to be taken away.\n\nI want to believe it made a difference in some capacity, but it felt like dropping a handful of sand in a beach to stop erosion.  Symbolic but without actually helping in any way.  I don't think the protest got to any news outlet, and I don't know if the people who were inconvenienced by the traffic stop even knew why there was a stoppage.  We were chanting on the sidewalk the whole time, but it's NYC during rush hour.  20-30 people chanting can be lost in the din.\n\nI do believe civil disobedience can work as a catalyst for change, but small acts like this one I don't think push the needle at all.  I want to believe they can and do, and my time wasn't wasted just trying to make myself feel better, and like I was doing something, but it just kinda felt pointless when it was all over.  \n\nI think only large or sustained acts can move the needle, a huge march, or regularly stopping traffic at the same place for days on end, things like that.  A one off like what I participated in doesn't cut it and is there for protestors to feel good than to make any meaningful change.  \n\nI want to believe it makes a difference, but in the end my small act of protest, as well as my partner's arrest don't do anything at all to help any given situation.\n\n (Please no responses specifically about Palestine, or Isreal/Palestine, this isn't about that conflict, or about the efficacy of civil disobedience as a whole, as I believe civil disobedience does work.  Not as the only tactic but a powerful one that works in coordination with others.   This is specifically about small acts versus big ones and how much a small act of civil disobedience can really do any good).", "threadA": [{"author": "clavitronulator", "body": "Nixon had to go through two attorneys general who resigned and refused to order the CIA to intervene in Watergate. The Saturday Night Massacre was essentially two people that triggered Watergate. \n\n> Civil disobedience is the active, professed refusal of a citizen to obey certain laws, **demands, orders or commands of a government (or any other authority).**"}], "threadB": [{"author": "monty845", "body": "A single small act is very unlikely to have major impact. But many small acts can add up. \n\nHowever, its important to understand that small or even big acts primarily raise awareness that your cause exists. But that doesn't mean you are winning. It works well when there are tons of people who are predisposed to support your cause, but who either aren't aware of it, or don't see it going anywhere. But it is a double edged sword, in that it can also galvanize opposition to your cause."}], "swapped": false}, {"index": 70, "branch_id": "t3_1bh0qp4_1", "title": "CMV: Cow's milk drinkers should change to soy milk", "description": "\r  \n1. The USDA [lists](https://ask.usda.gov/s/article/What-food-group-is-soymilk-soy-beverage-in-What-about-tofu-tempeh-and-other-soy-products) fortified soy milk as dairy due to its nutritional similarities with cow's milk, such as its protein, calcium, vitamin A, and vitamin D content. Most cow's milk in the USA is also fortified.  Soy milk has fiber and other beneficial phytonutrients. \r  \n\r  \n2. 1%, 2%, and whole cow's milk has more saturated fat, while skim milk has less saturated fat than soy milk.  Whole milk is the [most popular](https://www.statista.com/statistics/257290/us-milk-product-sales-by-category/) milk in the USA, with 2% coming in at a close 2nd.  1% and skim make up a much smaller percent of demand.  Changing away from cow's milk can significantly reduce our total saturated fat intake.\r  \n\r  \n3. Cow's milk protein has about a [3-6%](https://shop.elsevier.com/books/vegetarian-and-plant-based-diets-in-health-and-disease-prevention/denis/978-0-12-803968-7) higher absorptivity as compared to soy milk protein; this is fully offset by soy milk's 6% higher protein content ([3.55g](https://fdc.nal.usda.gov/fdc-app.html#/food-details/1999630/nutrients) per 100g versus [3.36g](https://fdc.nal.usda.gov/fdc-app.html#/food-details/746778/nutrients) per 100g).  Like cow's milk protein, soy is a [complete](https://www.sciencedirect.com/topics/agricultural-and-biological-sciences/soy-protein) protein, containing the necessary essential amino acids in the correct proportions for humans.  \r\r  \n\r  \n4. Soy [does not cause](https://www.fertstert.org/article/S0015-0282(10)00368-7/fulltext) feminizing effects due to its phytoestrogen / isoflavone content. Other foods that contain phytoestrogens / isoflavones: chicken nuggets, cereal, doughnuts, beef tacos, coffee, grapes, peanuts, oats, apples, lentils, walnuts, etc.; it is a wide-spread nutrient in plants.  [60-80%](https://www.ncbi.nlm.nih.gov/pmc/articles/PMC4524299/) of mammalian estrogens in western diets come from cow's milk and other bovine dairy products.\r  \n\r  \n5. The [majority of the world](https://pubmed.ncbi.nlm.nih.gov/28690131/) is lactose intolerant to varying degrees.\r  \n\r  \n6. There are a ton of different brands of soy milk, each of them with their own slightly different taste and consistency.  I had to try about 4 before landing on [one I loved](https://silk.com/plant-based-products/soymilk/organic-unsweet-soymilk) more than cow's milk. \r  \n\r  \n7. According to the most comprehensive [metastudy](https://josephpoore.com/Science%20360%206392%20987%20-%20Accepted%20Manuscript.pdf) ever performed on the topic, with 38,700 farms constituting 90% of global calories consumed, soy milk on average causes \\~69% less greenhouse gas emissions, 92% less land use, 84% less acidification, 82% less eutrophication, and 90% less scarcity-weighed fresh water use compared to cow's milk.\r  \n\r\r  \n8. The dairy industry is very cruel to cattle.  [This](https://www.youtube.com/watch?v=UcN7SGGoCNI) 5-minute video explains how the vast majority of dairy cattle are treated (legally).\r  \n\r  \n\r  \nThis post does not apply to those who do not have access to soy milk (including being a dependent), cannot afford it if it's expensive in their area, or have allergies/intolerances to soy.  It only applies to cow's milk and soy milk directly, not other dairy products.\r  \n\r  \nNote: I'm using the USDA/AVMA since they're the organizations that control dairy in my country; the story is very similar to dairy in most other western countries.\r", "threadA": [{"author": "draculabakula", "body": "I'll address your points one by one but my overall point is that milk is a great natural source of vitamins and that you should just drink water and take a supplement if you are gonna drink soy milk for the vitamins.\n\n1. Anything fortified is just vitamins added to the product. Just get your vitamins from natural sources or take a supplement instead of drinking soy milk. \n\nNatural vitamins are always inherently better for you because you don't know what the quality or efficiency of those vitamins are. \n\n2. Saturated fat are not a serious problem for most people. Saturated fats being bad is a 1980s nutrition blunder that people still believe. You need them in your diet and you probably aren't going to do much harm to your body with 1% and 2% milk. \n\n3. Most people don't need extra protein in their diet (in America at least)\n\n4. True. It raises your thyroid hormones levels though which shouldn't be a concern unless you have thyroid problems.\n\n5. Yes. Don't drink milk if it makes you sick. That doesn't have anything to do with people who aren't though. \n\n6. This is irrelevant.\n\n7. This is a valid concern but not necessarily a reason to not drink cows milk. You can just drink less cows milk and address this or you can support more sustainable dairy practices and address this. \n\n8. That majority of dairy cows are definitely not treated like that and again, support farms that don't do that and this is not a concern.\n\nOverall, there is nothing wrong with drinking cows milk that you listed here. I'm not a cows milk drinker but I consume it in other products. \n\nYou seem to be making a moral argument for not drinking it but you are cherry picking the scenarios. There are plenty of situations where soy milk is not a good substitute for cows milk that I shouldn't need to explain."}], "threadB": [{"author": "Subcomfreak", "body": "As someone who cooks a lot... yeah, never going to happen. Milk will cook down differently than soy milk. It has a different viscosity, especially when heated. The flavor profile, no matter how many artificial flavors you throw at the problem is going to change. Thus, as a cooking ingredient all of your nutritional arguments don't really matter, nor should they. A dish's nutritional content is determined by the whole list of ingredients and not simply a single one.  I personally don't drink milk or use milk as nutritional source alone, but, rather, as an ingredient in combination with others to then make a dish. Now, if you want to start talking about goat's milk or sheep's then your argument is even more flimsy as that ingredient(s) is also different from cow milk which is differe
