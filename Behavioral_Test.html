    <script>
        const dataset = [{"index": 162, "branch_id": "t3_1jnrxru_1", "title": "CMV: Any religion that wants to survive can no longer questions related to [mis]interpretation resulting from [mis]translation.", "description": "I am an agnostic, but I have a deep fascination with all \"big question\" kinds of topic. I was raised in the kind of Christian church that de-facto identified as literalist (if pushed, although they made efforts to avoid identifying with *any* position on interpretative hermeneutics). The stories that pundits like to bring up when arguing against literalist christianity-like Noah's Ark, Jonah and the Whale, David and Goliath, and Adam and Eve were-reserved for children.\n\nThat church is dying. Perhaps my folks \"made a mistake\" by enrolling me in foreign language immersion school at kindergarten. I turned out to be a natural at language acquisition, and now speak 4 languages (Spanish, Greek, and Mandarin). I left it as soon as I moved out- one glaring issue I always saw was that some words were simply not translatable from Greek into English or Spanish (without losing part of their meaning). \n\nI used AI to generate a simple list to demonstrate the problem, as I see it:\n\nChallenging Bible Verses for English Translators:\n- **Genesis 1:2** \u2013 *\u201cAnd the earth was without form, and void...\u201d*  \n  - The Hebrew phrase *tohu va\u2019vohu* (\u05ea\u05b9\u05d4\u05d5\u05bc \u05d5\u05b8\u05d1\u05b9\u05d4\u05d5\u05bc) suggests not just formlessness, but also chaos or uninhabitable emptiness.  \n  - English lacks a single equivalent term to fully capture this meaning.  \n\n- **Exodus 3:14** \u2013 *\u201cI AM THAT I AM.\u201d*  \n  - The Hebrew *Ehyeh Asher Ehyeh* (\u05d0\u05b6\u05d4\u05b0\u05d9\u05b6\u05d4 \u05d0\u05b2\u05e9\u05b6\u05c1\u05e8 \u05d0\u05b6\u05d4\u05b0\u05d9\u05b6\u05d4) is a complex verb form suggesting ongoing being/existence.  \n  - English must choose between \u201cI am\u201d (present) and \u201cI will be\u201d (future), losing the full nuance.  \n\n- **Psalm 22:16** \u2013 *\u201cThey pierced my hands and my feet.\u201d*  \n  - The Hebrew *ka'aru* (\u05db\u05b8\u05bc\u05d0\u05b2\u05e8\u05d5\u05bc) is debated; some manuscripts suggest \u201cpierced,\u201d while others indicate \u201clike a lion.\u201d  \n  - This translation issue carries theological implications.  \n\n- **John 3:5** \u2013 *\u201cBorn of water and the Spirit.\u201d*  \n  - The Greek *ex hydatos kai pneumatos* (\u1f10\u03be \u1f55\u03b4\u03b1\u03c4\u03bf\u03c2 \u03ba\u03b1\u1f76 \u03c0\u03bd\u03b5\u03cd\u03bc\u03b1\u03c4\u03bf\u03c2) has multiple interpretations\u2014baptismal, amniotic fluid, or spiritual rebirth.  \n  - English translation often requires disambiguation, potentially influencing theological interpretation.  \n\n **Isaiah 7:14** \u2013 *\u201cBehold, a virgin shall conceive, and bear a son...\u201d*  \n  - The Hebrew word *\u02bfalmah* (\u05e2\u05b7\u05dc\u05b0\u05de\u05b8\u05d4) can mean \u201cyoung woman\u201d or \u201cvirgin.\u201d  \n  - Some argue that \u201cvirgin\u201d (as in the Greek *parthenos* in the Septuagint) is an interpretative choice rather than a direct translation.  \n\n- **Luke 14:26** \u2013 *\u201cIf anyone comes to me and does not hate his father and mother... he cannot be my disciple.\u201d*  \n  - The Greek *mise\u014d* (\u03bc\u03b9\u03c3\u03ad\u03c9) literally means \u201chate,\u201d but it can also imply \u201clove less\u201d or \u201cdetach from.\u201d  \n  - English readers may take it literally rather than understanding it in its cultural-hyperbolic sense.  \n\n- **Romans 9:13** \u2013 *\u201cJacob I loved, but Esau I hated.\u201d*  \n  - Again, *mise\u014d* (\u03bc\u03b9\u03c3\u03ad\u03c9) is used, potentially meaning rejection rather than an emotional hatred.  \n  - English translation struggles to convey the covenantal nature of this statement rather than personal animosity.\n\nChallenging Bible Verses for Mandarin Translators: \n\n- **John 1:1** \u2013 *\u201cIn the beginning was the Word...\u201d*  \n  - The Greek *logos* (\u03bb\u03cc\u03b3\u03bf\u03c2) carries both philosophical (rational principle) and linguistic (spoken word) meanings.  \n  - The Mandarin translation (*\u9053*, \u201cDao\u201d) aligns with Daoist philosophy but loses the linguistic aspect.  \n\n- **Ecclesiastes 1:2** \u2013 *\u201cVanity of vanities, all is vanity.\u201d*  \n  - The Hebrew *hevel* (\u05d4\u05b6\u05d1\u05b6\u05dc) means \u201cvapor\u201d or \u201cbreath,\u201d not just vanity.  \n  - The Mandarin *\u865a\u7a7a* (x\u016bk\u014dng) means \u201cemptiness\u201d but may sound overly Buddhist, potentially shifting the meaning.  \n\n- **Matthew 5:3** \u2013 *\u201cBlessed are the poor in spirit...\u201d*  \n  - The Greek *ptochoi t\u014d pneumati* (\u03c0\u03c4\u03c9\u03c7\u03bf\u1f76 \u03c4\u1ff7 \u03c0\u03bd\u03b5\u03cd\u03bc\u03b1\u03c4\u03b9) is difficult to convey.  \n  - *\u7075\u91cc\u8d2b\u7a77* (l\u00edng l\u01d0 p\u00ednqi\u00f3ng) suggests spiritual lack, while *\u5fc3\u7075\u8d2b\u7a77* (x\u012bnl\u00edng p\u00ednqi\u00f3ng) may sound more like psychological weakness.  \n\n- **Revelation 22:13** \u2013 *\u201cI am the Alpha and the Omega.\u201d*  \n  - Alpha and Omega are Greek letters, which do not exist in Mandarin.  \n  - Often translated as *\u6211\u662f\u521d\uff0c\u6211\u662f\u7ec8* (w\u01d2 sh\u00ec ch\u016b, w\u01d2 sh\u00ec zh\u014dng, \u201cI am the beginning, I am the end\u201d), but this loses the alphabetic symbolism.\n\n- **Genesis 2:7** \u2013 *\u201cThen the LORD God formed man from the dust of the ground...\u201d*  \n  - The Hebrew *adam* (\u05d0\u05b8\u05d3\u05b8\u05dd) means both \u201cman\u201d and \u201chumanity,\u201d while *adamah* (\u05d0\u05b2\u05d3\u05b8\u05de\u05b8\u05d4) means \u201cground\u201d or \u201csoil.\u201d  \n  - Mandarin loses the wordplay between *Adam* and *adamah* when translated as *\u5c18\u571f* (ch\u00e9nt\u01d4, \u201cdust\u201d) or *\u6ce5\u571f* (n\u00edt\u01d4, \u201csoil\u201d).  \n\n- **Matthew 16:18** \u2013 *\u201cYou are Peter, and upon this rock I will build my church.\u201d*  \n  - The Greek *Petros* (\u03a0\u03ad\u03c4\u03c1\u03bf\u03c2, Peter) and *petra* (\u03c0\u03ad\u03c4\u03c1\u03b1, rock) have a pun-like connection.  \n  - In Mandarin, the translation (*\u4f60\u662f\u5f7c\u5f97\uff0c\u6211\u8981\u5728\u8fd9\u78d0\u77f3\u4e0a\u5efa\u9020\u6211\u7684\u6559\u4f1a* - \u201cYou are Peter, I will build my church on this rock\u201d) loses the wordplay because *\u5f7c\u5f97* (B\u01d0d\u00e9) does not resemble *\u78d0\u77f3* (p\u00e1nsh\u00ed, \u201crock\u201d).  \n\n- **Hebrews 4:12** \u2013 *\u201cFor the word of God is living and active, sharper than any double-edged sword...\u201d*  \n  - The Greek *logos* (\u03bb\u03cc\u03b3\u03bf\u03c2) appears again, meaning both divine reason and spoken/written word.  \n  - Mandarin translations (*\u795e\u7684\u9053* - \u201cGod\u2019s Dao\u201d) can align with Daoist philosophy, while alternative translations like *\u795e\u7684\u8bdd* (sh\u00e9n de hu\u00e0, \u201cGod\u2019s words\u201d) risk missing the philosophical depth.\n\n\nI've heard some religious people argue that god's grace guarantees that enough of the essential message gets translated correctly or something like that, so you don't have to worry about mistranslation, very much if at all. \n\nAm I being pedantic?", "threadA": [{"author": "collegetest35", "body": "There is an entire religious exegesis about original meanings. If you get a good study Bible the original words will often be in the notes about what they meant in the original language so nothing is lost in translation. Depending on your Church there may also be an official interpretation of the text or you could look up apologists in your denomination who have written exegesis or study bibles\n\nCatholics and Orthodox for example benefit from having Church fathers who understood the original language and wrote thousands of pages about them. For example, St Augustine devoted a whole chapter in *Confessions* to Gen 1:2 and the meaning of \u201cwithout form\u201d"}], "threadB": [{"author": "Various_Tangelo2108", "body": "It depends on what you mean by mistranslation since the actual meanings are easily available. You should see when Sam Shamoun debates Jews on the Bible and they go to a website I forget what it is called, but every single word is referenced in Hebrew and Greek and its meaning. What people don't do which you should is read a chapter then go over its meaning. There is so much depth to the verses. Also the Bible is not the Quran the Bible does not claim to explain all things perfectly and exactly like the Quran does. You need to research and go beyond the texts. Also I have never heard that God's grace ensures it gets translated correctly. What you also failed to mention is anyone can read the Dead Sea scrolls. They are literally online for free to read if people are want to get into exactly what every single word means. Like I said though if you want to understand the texts you  need to do research on what is actually being said why is it being said what is it referencing etc etc."}], "swapped": false}, {"index": 92, "branch_id": "t3_1nveucj_1", "title": "CMV: Republicans could easily resolve the current government shutdown impasse on a purely partisan basis, solely on their terms.", "description": "My reasoning:\n\nSending the military into peaceful cities is a pretty major authoritarian move. You know what would be a very minor authoritarian move by the President in comparison? Declaring that the government remains open, notwithstanding the budget impasse, and that funding will be appropriated ad hoc, as needed, to keep the government open. \n\nAlternatively, Senate Republicans could, with a 50+1 majority, amend the rules of the chamber to permit passage of funding bills with a 50+1 majority, with no 60 vote filibuster available. \n\nFinally, House and Senate Republicans could probably secure Democratic support if they stripped out all of the culture war garbage in the funding bill, and made it \"clean.\"", "threadA": [{"author": "Randomousity", "body": ">You know what would be a very minor authoritarian move by the President in comparison? Declaring that the government remains open, notwithstanding the budget impasse, and that funding will be appropriated ad hoc, as needed, to keep the government open.\n\nNot possible, and wouldn't be desirable even if it were possible, which it's not.\n\n>The Congress shall have Power To lay and collect Taxes, Duties, Imposts and Excises, to pay the Debts and provide for the common Defence and general Welfare of the United States[.] [Art. I, \u00a7 8, cl. 1](https://www.archives.gov/founding-docs/constitution-transcript#1-8).\n\nand\n\n>[The Congress shall have Power] To borrow Money on the credit of the United States[.] [Art. I, \u00a7 8, cl. 2](https://www.archives.gov/founding-docs/constitution-transcript#1-8).\n\nand\n\n>No Money shall be drawn from the Treasury, but in Consequence of Appropriations made by Law[.] [Art. I, \u00a7 9, cl. 7](https://www.archives.gov/founding-docs/constitution-transcript#1-9).\n\nThe power to fund the government belongs exclusively to Congress. Only Congress may pay debts, only Congress may create new debts, and only Congress may direct money to be spent from the Treasury. If we let Trump just take \"the power of the purse\" for himself, how do you propose Congress prevent him from spending money on anything? Suppose Republicans in Congress get their shit together & pass a bill, appropriating however much money to various programs and departments, and Trump signs it. Suppose also this bill gives $0 to something Trump wants. By your logic, he can just spend that money, even though Congress refused to give him that money. Then what? Is the only remedy impeachment and removal? And, if we set that precedent, then any future President, from any party, can also just spend at will. We have a separation of powers for a reason.\n\nThis is like saying that, since he's already violating the law and the Constitution, why bother to care about anything? If he's violating the Constitution one way, what's letting him do it a second way? If he's violating it tens ways, what's an eleventh?\n\n>House and Senate Republicans could probably secure Democratic support if they stripped out all of the culture war garbage in the funding bill, and made it \"clean.\"\n\nThere's no deal to be had IMO. Republicans, and especially Trump, are not trustworthy counter-parties to negotiate a deal with. There is no promise they can make that Democrats should accept, because Trump will break the promise, and it will be unenforceable. Like what? Is he going to promise to spend the money as required by law? He's already required to do that! And he's already not doing it! A promise to do what he's already obligated to do, and what he already refuses to do, is worthless. If the law doesn't bind him, his own promises certainly won't.\n\nAny promises for future concessions should be treated as worthless, too. Oh, fund the government now, and, in exchange, you'll get [thing] in the future? No you won't. Trump will absolutely not follow through and uphold that bargain, and there will be no way to force him to against his will.\n\nThe only things that would be worth bargaining for are statutory changes. They could create a new crime, or extend the statute of limitations on some existing crimes, or make criminal statutes explicitly applicable to the President. Those wouldn't be enforced until at least 2029, but at least they wouldn't require anything of Trump beyond his signature. But, Trump and the GOP would never go for things like that.\n\nThey will never concede anything worth getting, and anything they do concede won't be worth spit.\n\nWe could, in theory, have a fiscal policy that says the budget just goes in perpetuity at the agreed upon rates unless and until Congress affirmatively changes them (with the exception of the military budget, which is constitutionally constrained to only be appropriated no for no more than two years at a time:\n\n>[The Congress shall have Power] To raise and support Armies, but no Appropriation of Money to that Use shall be for a longer Term than two Years[.] [Art. I, \u00a7 8, cl. 12](https://www.archives.gov/founding-docs/constitution-transcript#1-8).\n\nThat would be a reasonable policy, especially if the spending were automatically adjusted for inflation, as would just saying that the debt ceiling doesn't exist because it's stupid, and if Congress authorized deficit spending, they also, necessarily, authorized creating the debt (and because Amend. XIV \u00a7 4 says the public debt shall not be questioned). But those are not the current policies, and while I'd generally support adopting both of them, there's no reason to let Trump be the very first beneficiary of those policies when he's acting like a dictator.\n\n>Alternatively, Senate Republicans could, with a 50+1 majority, amend the rules of the chamber to permit passage of funding bills with a 50+1 majority, with no 60 vote filibuster available.\n\nThis is the only true and reasonable point you made. There's a GOP trifecta, and the Constitution only requires legislating by simple majority, except in a few specific exceptions where it explicitly requires some supermajority. Spending bills is not one of those exceptions. It's only the Senate's own rules that require 60 votes for cloture, and the majority can change the rules whenever it likes.\n\nSo yes, the GOP could end the shutdown whenever it likes, all on its own, without a single Democratic vote, but that would require the GOP to all get on the same page and show an actual interest in governing."}], "threadB": [{"author": "Vivid_Chip_6828", "body": "What do you mean \"funding will be appropriated ad hoc\"? The CR Republicans are proposing funds the government for a few months only, effectively it is an attempt to secure ad hoc funding that is so far being thwarted. \n\nAnd what \"culture war garbage\"? There are no social policy riders in there. The Democrats aren't even criticising the contents of the bill, they only seeking to leverage their power in the Senate to get stuff added to it that goes beyond the scope of current funding requirements."}], "swapped": false}, {"index": 2, "branch_id": "t3_1fifdyy_1", "title": "CMV: Democrats give LBJ and Roosevelt a pass their racism when they were just as bad as Reagan or Nixon, if not worse. ", "description": "To be clear, in an ideal world there would be no racist presidents in American history and wouldn\u2019t even need to have this debate. Unfortunately that isn\u2019t the case so here we are. \n\nNow there\u2019s no doubt that all 4 of the men mentioned in the title were on some spectrum of racism for their times. But progressive media, black Americans, white liberal Americans and in general the left mediasphere seem to only think it was Republican presidents who were guilty of it. \n\nAnd, in Reagan\u2019s case, as proof of their evil and of a justifiably stained legacy. Yet Reagan, even though he was racist, could argue he wasn\u2019t talking about his countrymen when he called people who were black \u201cmonkeys\u201d. He was taking about African representatives of the UN General Assembly who voted against a resolution supported by the United States and celebrated it. \n\nStill gross and ugly but you can see it was contempt for a nonamerican not contempt for blacks at large. Nixon who was caught on tape calling black people the n-word was also referring to Africans from the continent and of course is guilty of going hard at the white disaffected democratic voters by going against black Americans or policies explicitly for them via dog whistle tactics. He nonetheless had no issue with going after the Mexican American vote hard. His use of antiblack racism was a means to an end. \n\nLBJ on the other hand is the epitome of what many progressives hate today about white men so it\u2019s somewhat ironic the unspoken argument on the left is \u201che gets a pass on the racism because of his policies.\u201d\n\nThe man had to be coached not to say the n-word and he still used it constantly. He called the very first black man to serve on the Supreme Court, thurgood Marshall, \u201chis n-word\u201d. He called black people the n-word, uncle or boy all the time. And when a black man confronted him on the issue he told him \u2014 and I\u2019m paraphrasing here \u2014 to get used to it because he wasn\u2019t stopping.\n\nDoesn\u2019t matter what you do for black people, it\u2019s weird the Robert Caro or the the other fawning biographies don\u2019t mention it nearly as much as left leaning writers do Reagan\u2019s racism and it doesn\u2019t mean you get the right to say that. \n\nAnd finally, in many ways, FDR is the worst of them all. He, illegally in my mind at least, imprisoned Japanese Americans solely on the basis of racist policies without any form apology or compensation. Thankfully, none of them died or were abused in their internment camps. But that\u2019s objectively more racist than either of the other 3 men we\u2019ve spoken about here. \n\nAnd this is without mentioning him putting a literal klansman on the Supreme Court lol", "threadA": [{"author": "Toverhead", "body": "Have you actually read Caro\u2019s biographies? He covers it in depth, giving multiple examples of LBJ making racist be statements.\n\nThe overall finding of Carl though is that LBJ was primarily an opportunist and a chameleon who was willing to talk however he needed to get people on board with him. With southern oil men he\u2019d happily drop n-bombs like one of the good ole boys, while with Northern liberals he\u2019d talk about racial equality.\n\n\n\nHowever Caro\u2019s analysis is that secondarily, when it didn\u2019t impact his own position and he had a free choice of what to do - he would aggressively pursue egalitarian anti-racist policies with his passing of the Civil Rights bill making him the single greatest white champion of black Americans since Abraham Lincoln. \n\nWhile he was ruthlessly realpolitik and first of all entrenched his own power, it was this ruthlessness that let him accrue power that he then used to champion civil rights. To compare him to someone like Reagan who fought against civil rights legislation when he didn\u2019t need to, that is to ignore passive differences in policy which have made huge and fundamental changes to how the USA functions."}], "threadB": [{"author": "eggs-benedryl", "body": "If someone hands me 10 grand and says, here you worthless fuck\n\nI'm better off than i was before I was insulted\n\n  \nPolicies and actions are the defining factor here. LBJ knew he was prejudiced but knew we'd be better off with the policies that helped reduce prejudice. He knew it wouldn't fix our issues or his with race overnight but just like a cast for a broken bone, heals you over time setting you up for success. If he could not stand the thought of black people benefitting from those policies, he wouldn't have enacted them. It is hard to believe someone who did not see benefit in them would enact them if their prejudice was stronger than the good will behind the policies. At some point presidents no longer benefit from political points they score, if LBJ didn't want to live in a world with the civil rights act, he wouldn't have signed it."}], "swapped": true}, {"index": 79, "branch_id": "t3_1ochcnh_4", "title": "CMV: Most people misuse the word pedophilia", "description": "I believe pedophilia is widely misunderstood. Clinically, it refers to sexual attraction to prepubescent children. Attraction to teenagers is hebephilia or ephebophilia, and adult-adult relationships, even with big age gaps, are never pedophilia. Misusing the term spreads misinformation and trivializes real child abuse.\n\nI\u2019m open to changing my view about how common this misunderstanding really is. If evidence shows that most people know the correct definition but exaggerate for effect, I\u2019d reconsider my assumption. CMV.", "threadA": [{"author": "HazyAttorney", "body": "I see a lot of comments that are commenting on presumed changes in terms over time. What nobody has seemed to do is look at the etymology or the origins of these words and track their use. \n\nThe Diagnostic and Statistics Manual, which is used by psychologists to diagnose mental illness, uses the word pedophilia and that is its origin. \n\nIf you think about it, the field of childhood development has exploded since the 1950s. People used to think of children as little adults. Now, not only do we distinguish between child and adult, we're now subcategorizing ranges of child (prepubescent, adolescent, etc) in ways we never did before.\n\nIt, then, should not surprise you that pedophile is the oldest word and these newer terms have been coined. Just like other psychology terms pop into public use, pedophile, like psycho, and others, have emerged. However, not even in researchers who study sex offenders are those subcategories really used.  Source: [https://pubmed.ncbi.nlm.nih.gov/18686026/](https://pubmed.ncbi.nlm.nih.gov/18686026/) see also: [https://pmc.ncbi.nlm.nih.gov/articles/PMC9663395/](https://pmc.ncbi.nlm.nih.gov/articles/PMC9663395/)\n\nIt shouldn't surprise that language has to evolve along side as we accept subcategories of human development. You may see more acceptance of the term if researchers start using those terms and start studying these subgroups as distinct universes of people. You'll also likely see it being used more as we understand the root cause(s) especially if some of the root causes are things like a neurological development issues rather than just being evil. [https://digitalcommons.liberty.edu/cgi/viewcontent.cgi?article=5865&context=doctoral](https://digitalcommons.liberty.edu/cgi/viewcontent.cgi?article=5865&context=doctoral)\n\nOne thing to note, the DSM-5 requires not just someone to be attracted to children, but to also have marked distress, interpersonal difficulties from the attraction, and deviant urges that cause harm to another person."}], "threadB": [{"author": "JungGPT", "body": "Well, Im in my 30's. Is it possible I could see a very developed 17 year old and think shes of age? Yeah, and that happens. But if you're still attracted to her after speaking with her that IMO is weird. Even if shes 18 its kind of weird. Its a massive difference between being 30 and 18. Even though its technically legal i'd still think like you were kinda weird. Because theres literally nothing you have in common with someone that age, if you're continuing to talk to them you're basically just grooming them.\n\nBeing attracted to prepubescent children makes people stomachs curl.\n\nStill I feel like this post comes from a place of \"what if i see an overdeveloped teenager at target?\" That's not pedophilia."}], "swapped": false}, {"index": 146, "branch_id": "t3_1h8359s_1", "title": "CMV: On an individual level, being poisonous is the worst defense mechanism.", "description": "You and your family of prey creatures move to a new area, perhaps there was a catastrophe, you snuck on a vessel or simply moved. You have a singular defense mechanism to not get eaten. for each individual member of your group, being poisonous is the worst one to have, since it only comes into play once you are already being eaten. New animals won't know to avoid eating you, and will basically only find out once you are in their mouth, and you are dead. The alternatives all come into play at some point before you are already being eaten. Camouflage results in you not being seen, so you never get eaten in the first place. Being big scares predators off since you appear to be able to defend yourself. Being fast allows you to get away. Having protective gear (spikes,armor etc) allows you to defend yourself. Staying in a herd is playing the numbers game by providing alternative targets (which is a bit of an asshole move).\n\nNote: I am aware this is not how evolution works. I am also assuming that the various defense mechanisms work. Also, I am aware that many poisonous creatures rely on advertising to let other predators know they are poisonous. Advertising doesn't work in a new area if the language is different, and the key point is that it sucks on the individual level: You will die and let others know that your species is poisonous, so your family might survive.", "threadA": [{"author": "Tanaka917", "body": "I had a few counter arguments but wow this seems biased against camouflage. Your note actually demonstrates how well thought out this is against them. Note I don't say this to accuse you of being deliberate in your intent, I just think your mind does that thing minds do at times and unwittingly pushed you towards the scenario you really wanted. \n\n>I am also assuming that the various defense mechanisms work.\n\nBut you aren't. I'll show you why in the next quote\n\n>\u00a0I am aware that many poisonous creatures rely on advertising to let other predators know they are poisonous. Advertising doesn't work in a new area if the language is different,\n\nThis exact argument can be made for camouflage as well. Camouflage doesn't work in a new area if the geologic and fauna language is different. \n\nAnd yet your scenario wants to take place in an area which is close enough to the original for camouflage to still work, yet you don't extend this same courtesy to poison. You deliberately specify that the language is different. \n\nWhy? Why is camouflage allowed to keep the same language advantage, but poison doesn't get that? In a fair scenario either both keep it (making poison very effective) or both lose it (making camoflouge every bit as bad as poison and arguable much worse).\n\nYour scenario is unfair to camouflage which is why it comes out behind. Poison isn't the issue, the scenario is. Change the scenario and suddenly poison is useful."}], "threadB": [{"author": "jatjqtjat", "body": "it depends on if you use a r and K reproductive styles.\n\nif you use little r, and make a million babies nearly 100% of which are eaten, then moving to a new area and getting eaten by predators is normal.  No big deal.  If your a using r style reproduction with Camouflage  or spikes you are still getting eaten.  But if you are poisonous then your predators die.\n\nIn the real world, predators all over have learned not to eat brightly colored things, because the server as a warning of poison.  So even for K style reproduction, in practice, its a great defense mechanism.  nobody even bothers you."}], "swapped": false}, {"index": 117, "branch_id": "t3_1be7cq9_1", "title": "CMV: The idea of colonizing other planets in our solar system is completely stupid.", "description": "Why in the world would we want to colonize Mars? Even if climate change means human extinction in a century it\u2019s a stupid idea (and human extinction any time soon based on climate change is highly unlikely based on everything I have read \u2014 but I digress).   \nWhy do I think it\u2019s a dumb idea? It\u2019s not like building bio-domes on Mars is gonna be any easier than building bio-domes on Antarctica, or flotillas in the Pacific Ocean, or bio-domes in the middle of the uninhabited Sahara Desert, or bio-domes in the Amazon. It\u2019s not like it\u2019s gonna get colder with less oxygen than Mars in the next hundred or even five hundred years anywhere on our planet. We would need to build a terraformer to make colonizing Mars practical, and so far we can barely safely land a rover there yet someone like Elon Musk is saying he anticipates starting a colony on Mars in his lifetime.   \nIf you ask me it smells fishy, as if space travel is a large scam on governments and taxpayers, as if maybe all that money goes towards other things, or maybe it\u2019s about building space lasers for warfare, or maybe it goes towards some kind of extraterrestrial/extradimensional reverse engineering project\u2026 or something. Whatever the case may be it simply doesn\u2019t make sense that we \u201cneed\u201d to colonize Mars practically ever.    \nSo please tell me why colonizing Mars (or even the Moon) is anything less than a dumb idea. The only smart idea for doing it that I can think of is, like I said before, scamming money or space lasers or something. As a practical thing a Mars or Moon colony just sounds totally stupid.", "threadA": [{"author": "Quentanimobay", "body": "With this line of thinking lots of think humanity does is \"stupid\". Lots of practical technological and scientific advancement starts off with advancement and study simply for the sake of it. But I think there are 3 practical reasons for colonizing local space.\n\n1. Resource Extraction - Its pretty well known that extracting resources from Earth is not only damaging to the environment but also that the resources are finite. Having a larger presence in space means the possibility of space mining. \n\n2. Trickle down technology - Colonizing space is a difficult goal that tends to be attractive to the best people in their fields. Having the best people solve really tough problems tends to lead tons of technological advancements that can be put to use in other fields. Once you include the new information that can be obtained once we regularly have people in space I expect to see a leap in a multitude of fields. \n\n3. Human Perception - While I understand that are some pragmatic and even some nihilistic people who see space travel as a waste and would prefer money be spent fixing problems on our own planet, space travel tends to excite people. The truth is the state of our planet and the current political climate are exhausting. The space race during the Cold War was largely a distraction from the \"impending\" nuclear war. I think for lots of people the idea of renewed space programs and space colonization is exciting and gives people hope for humanity's future."}], "threadB": [{"author": "RexRatio", "body": ">So please tell me why colonizing Mars (or even the Moon) is anything less than a dumb idea.\u00a0\n\nThe [Chicxulub impactor](https://www.newscientist.com/definition/chicxulub/) comes to mind.\n\nBeing a multiple planet species reduces the chance of extinction by impact events by a factor of quadrillions.\n\n\n\n>space travel is a large scam on governments and taxpayers\n\n[Neil DeGrasse Tyson explains why this is not the case](https://www.youtube.com/watch?v=RQhNZENMG1o) way better than I ever could.\n\nBut sure, not spending [0.48% of the tax dollar on a space program](https://en.wikipedia.org/wiki/Budget_of_NASA) is a scam while you don't seem to have a problem with the [military taking up a whopping 13% of that same tax dollar](https://www.cbpp.org/research/policy-basics-where-do-our-federal-tax-dollars-go). Said differently: the U.S. defense budget has been larger than those of China, India, Russia, Saudi Arabia, France, Germany, the United Kingdom, and Japan combined.\n\nOr that mere interest on debts in the US take up another 10% of that dollar. \n\nOr that you wouldn't be able to use Google Maps or your navigation system without a space program.\n\nBut sure, the space program is a scam. /s"}], "swapped": false}, {"index": 41, "branch_id": "t3_1aklgz6_1", "title": "CMV: There's times where you should lie to your doctor", "description": "Obviously, of you're having a heart attack from doing lines of coke, you should tell the paramedics and the doctor exactly what you were doing.\n\nBut there's so many reasons you should lie to your doctor (whether ethical or unethical). Whatever you say is going on your permanent medical record , accessible to all your healthcare providers. \n\nYou should never admit to tobacco use, drug use, or mental health problems (unless you need help and are actually gonna do something about it). There's tons of jobs, whether CIA, military, pilot, Supreme Court Justice, etc., where having these things on your record would be automatic disqualification. Yes, HIPAA, but how comfortable are you lying with a written record by a physician out there that would prove that you're lying? \n\nPlus, who knows when a judge can subpoena your health records for whatever reason? No jury looks at a person with any history of mental illness as credible. \n\nFinally, what does telling your doctor achieve anyways?\n\n \"Ah, I see you do cocaine. Don't do that. It's not good for you\" (as if you already didn't know).\n\n\"Oh, you're depressed? That sucks. You gonna kill yourself anytime soon? Let me know so then I can put you in involuntary confinement. Best I can do is toss random drugs at you, see if it works, and tell you to exercise\".\n\n\"You smoke? Stop that, don't do that. In the meantime, your health insurance is gonna go up\".", "threadA": [{"author": "monkey-pox", "body": "So if you have a mental health issue you should just deal with it? The remedies for serious depression - meds mainly - require a doctor's prescription. It's not really something you can just power through without medical help."}], "threadB": [{"author": "DrKsg", "body": "1. Please don\u2019t, that just screws you over as you won\u2019t get the care and treatment you need \n\n2. Yes your EMR should be accessible to other doctors as that makes your care better. It would be beneficial to a pulmonologist to know your smoking history when they see you as an example.\n\n3. HIPAA protections are very strong. \n\n4. What it really sounds like is that you don\u2019t trust the current system and guess what \u201cwe doctors hate it too\u201d. We over document because of CYA reasons and it fucking sucks. Medical legal liability raises costs the medicine and decreases patient-provider trust. Fuck Lawyers! \n\nAlso private healthcare doesn\u2019t help because when patients have to pay directly they see medicine as a consumption good rather than a public service."}], "swapped": true}, {"index": 47, "branch_id": "t3_1iwozvy_1", "title": "CMV: if a woman believes a \u201cman\u2019s job\u201d exists then they shouldn\u2019t let men do \u201cwomen\u2019s work.\u201d", "description": "I only say this because I saw a video on social media where a lady said \u201cthis a boys job\u201d which is fine, if you would like to have a traditional relationship do what makes you happy but it can\u2019t be halfway. If you\u2019re going to make a partner do all the automotive work all the heavy lifting this and that then okay\u2026 you should cook clean take care of the kids do the laundry. Relationships based on \u201ctraditional roles\u201d can\u2019t be 50% either you\u2019re equals or you aren\u2019t. Oh you can\u2019t carry in the water bottles because it\u2019s too heavy? I can\u2019t wash the dishes. That\u2019s a woman\u2019s job. \n\nBefore I someone says oh it\u2019s just one video on social media I read the comments and there was a lot of people agreeing and yes obviously I saw misogynistic sexist comments. I\u2019ve also seen this in real life. Traditional relationships where the man participates in child rearing cooking cleaning but the woman doesn\u2019t do any masculine things. \n\nTo be clear, I have no problem with traditional relationships. Personally I like to cook I hate to clean I will work on the cars but my girlfriend is perfectly capable of heavy lifting on her own she\u2019s not dependent on me and I love that because I would feel like I\u2019m in a relationship with a child if that were the case. We do things based on what we have an aptitude for but it\u2019s never \u201cI\u2019m a woman I refuse to do this\u201d it just like yeah this isn\u2019t something I can do. My problem is the refusal or when you add onto a man\u2019s workload but refuse to even do the traditional things you are expected to do. Like I think men should be involved in a child\u2019s life but that\u2019s not the traditional role you can\u2019t expect them to go above and beyond there when they\u2019re assuming a masculine role. ", "threadA": [{"author": "shockpaws", "body": "Obviously hypocritical exceptions exist, but I think you\u2019re describing two different types of people.\n\nFrom what I\u2019ve seen, most people who believe in traditional gender roles for one gender tend to follow them for their own (or they\u2019re using the term \u201cmen\u2019s work\u201d ironically / for humor / whathaveyou). With the way discourse, especially gendered discourse, tends to go in online spaces, I see a lot of people who say \u201cmen / women always say [this] while they do [this]!\u201d without understanding that they\u2019ve seen ONE man/woman saying something and a DIFFERENT man/woman doing the other thing. Tradwives & the like have a tendency to practice what they preach, from what I\u2019ve seen of them. \n\nThat being said, every person\u2019s relationship is different. These are perfectly fine boundaries / mindsets for you to have in your intrapersonal relationships, but ascribing it across the board leaves no room for situational nuance.\n\nWhen you\u2019re on the outside of a relationship looking in, it can seem like tasks are wildly unbalanced, but each living situation has different circumstances. Maybe the man does lifting / auto work as well as cooking and cleaning, but the woman is doing the financials (budgeting, taxes), and renovating the bathroom, and keeping the kids\u2019 stuff organized, and etcetera. Maybe they live on a farm and she does a lot of the farmwork. Maybe they\u2019re in a small town and she organizes a lot of the community events. Just because the \u201cbasic tasks\u201d aren\u2019t 50/50 doesn\u2019t mean that a relationship isn\u2019t equal.\n\nAlso, it needs to be said, but a lot of stereotypical \u201cmen\u2019s work\u201d isn\u2019t actually very frequent. Unless it\u2019s a really big hobby of yours or the car is extremely broken, you\u2019re not going to have to do all too much mechanical work. Yeah, heavy lifting is a bit more common, but it\u2019s pretty brief. The lawn needs to be mowed maybe once a month. Compared to cooking, cleaning, laundry, childcare, shopping, etc, which are all constant and near Sisyphean tasks, the \u201cfifty fifty\u201d gender roles aren\u2019t actually all that balanced. It\u2019s possible that relationships where the man is doing some of the feminine tasks and the woman\u2019s doing none of the masculine tasks are actually completely even in terms of actual work being done.\n\nAnyways, all this is to say that life is nuanced and complicated and what people should and shouldn\u2019t do is dependent on individual circumstances and the agreements that they come to with their partners."}], "threadB": [{"author": "pipswartznag55", "body": "The problem with your argument is that you're creating a false equivalence between physical capability and social roles. When someone says \"this is a man's job\" about heavy lifting, they're often acknowledging biological differences in average muscle mass and strength - not making a statement about gender roles.\n\nI work in construction and I've seen plenty of men who can't lift as much as others. Should they also be banned from cooking or doing laundry because they can't carry as many bricks? That's basically what you're suggesting.\n\n> Traditional relationships where the man participates in child rearing cooking cleaning but the woman doesn't do any masculine things.\n\nYou're mixing up physically demanding tasks with general household duties. Cooking isn't inherently feminine - it's a basic life skill. Most top chefs are men. Cleaning isn't biologically harder for men. Child-rearing isn't something women are automatically better at.\n\nThe whole \"if you can't do X, then you can't do Y\" logic is childish. Relationships aren't about tit-for-tat exchanges. My wife can't reach the top shelves without a stool - should I refuse to do low-cabinet organizing because that's \"her height range\"? \n\nYour view basically punishes couples for helping each other based on their actual abilities. That's toxic AF."}], "swapped": false}, {"index": 186, "branch_id": "t3_1ipx7lc_1", "title": "CMV: Dictators like Hitler should be remembered as weak and pathetic, rather than fearsome, leaders.", "description": "The more I've read about history (which is hardly to academic levels), the more I've noticed there is a wide gulf between how we view Hitler, Mao, Stalin etc, and how they were.\n\nWe seem to continuously fall into this Nietzschean 'strong man fallacy, where we think of Hitler exactly the way he would want to be remembered: A powerful fascist leader.\n\nIn actually fact Hitler was a failed artist, who's adolescent anger happened to attach itself to a political movement. As he aged he developed perhaps the worst IBS the world has ever known, famous for clearing the room with his farts (seriousl, look it up). He ended up so jacked up on drugs and painkillers he was just making decisions almost at random by the end of the war. Ultimately he died a deluded failure, with bad bowl movements, with the blood of millions on his incompetent hands.\n\nStalin was nothing more than a gutter thug, who largely by accident found himself at the apex of the communist revolution. Only by being a nasty little shit did he take the top spot, and much like Hitler spent his life a paranoid and incompetent dictator.\n\nMao was a chubby mummy's boy, whos poor record keeping, and bad management, in addition to his anger issues led to the deaths of tens of millions.\n\nThese aren't evil geniuses, they're morons, who's stupidity and flaws led to countless deaths. \n\nTo cmv prove that in a historical context these people should be more feared than derided. And that I'm being complacent in not giving them enough credit. ", "threadA": [{"author": "8NaanJeremy", "body": "In the UK (and by extension the countries we share a strong cultural bond with like NZ, Ireland etc)\n\nthere has always been a strong tradition of making a mockery of authority figures.\n\nGood examples stretch back to the late 60s at least, with Monty Python's 'Hitler in England' sketch\n\nAll the way up to the not too recent, but not so far away 'The Death of Stalin', written by famed satirist Armando Iannucci (also starring Michael Palin, coincidentally)"}], "threadB": [{"author": "myluggage2022", "body": "Your premise is false.\n\nHitler is mocked constantly. On reddit, there are multiple threads a week about how he may have had IBS, had one testicle blown off, may have been addicted to drugs, and more. Movies and TV shows constantly mock Hitler. Your post seems to build off many of these same themes, which makes me wonder how you believe he is mostly viewed in a light that he would have appreciated.\n\nI agree that we have to view these figures as people and not all-powerful monsters, but in doing so, we have to take the good and the bad. Your position seems to go the opposite way, and view them as clowns. You almost seem to work backward from the position of \"these are bad people\" so you conclude, \"they have bad traits\" and it comes across like physiognomy.\n\nDo you really believe that Hitler, Stalin, and Mao were incompetent idiots who just lucked into positions of power? Be careful with this view, you may end up underestimating not only political figures you disagree with but many other potential rivals in your life."}], "swapped": false}, {"index": 80, "branch_id": "t3_1lwkdoc_1", "title": "CMV: Protest voters\u2014especially those behind the \"Abandon Harris\" movement\u2014cannot claim the moral high ground, and they should be held accountable for enabling Trump\u2019s return to power in 2024.", "description": "(Disclaimer: I use some AI tools to help my wording, but the argument itself is from me)\n\n\n\n1. In 2024, the choice was clear:\n\nYou had three options:\n\na) Vote for Trump\n\nb) Vote against Trump\n\nc) Stay neutral or disengaged\n\n\n\nBy choosing to actively oppose the Democratic ticket or to sit out the election, you effectively supported Trump\u2019s rise\u2014or at least chose not to prevent it. That\u2019s not a political protest; that\u2019s complicity. This is especially reckless given Trump\u2019s stated intention to implement Project 2025, an openly authoritarian agenda.\n\n\n\n2. The \u2018Abandon Harris\u2019 movement admits its goal:\n\nThe official site (https://abandonharris.com/) even states:\n\n\n\n\"We organized across every swing state. We moved voters. And we cost Kamala Harris the White House.\"\n\n\n\nThis isn\u2019t just electoral commentary\u2014it\u2019s a declaration of intent. Stripped of euphemism, it reads like: \u201cWe helped Trump win\u201d. Whether intentional or not, the outcome is the same. If you publicly take credit for undermining a candidate in a two-person race, you're indirectly taking credit for empowering the other.\n\n\n\n3. There\u2019s no logical path from sinking Harris to saving Gaza:\n\nIt is naive\u2014or willfully ignorant\u2014to believe that defeating Harris would somehow lead to better outcomes in Gaza. Trump has a track record that includes lifting sanctions on Israeli settlers and threatening free speech around criticism of Israel. There is zero evidence he would be more sympathetic to Palestinian suffering.\n\n\n\nWhat I mean by holding 'Protest voters' accountable:\n\n\n\n1. Protest voters should face the same scrutiny as those who supported Trump over domestic issues like inflation.\n\n2. If they organize again in 2026 or 2028, they should be met with firm, vocal opposition.\n\n3. The movement\u2019s failure should be widely discussed to prevent similar efforts in the future.\n\n4. Their actions should be documented as cautionary tales\u2014comparable to other historical examples of internal sabotage during crises.\n\n5. Founders of these movements deserve intense public scrutiny for their role in enabling a fascist resurgence.\n\n\n\nCommon Counterarguments I heard from Other Redditors \u2013 and Why They Fail:\n\n\n\n\u201cBlame the Democrats for running a bad campaign.\u201d\n\nIt's a fundamental duty of citizenship to actively research and decide which candidates truly benefit the country, rather than expecting politicians to tell you what's right and wrong. You don\u2019t need to agree with every policy to recognize existential threats to democracy. Trump is not just another Republican\u2014his rhetoric and platform (see Project 2025) are openly authoritarian. Choosing to \u201cpunish\u201d Democrats by letting Trump win is reckless brinkmanship. \n\n\n\n\u201cBut Biden/Harris failed Gaza.\u201d\n\nThis is not a Gaza debate in this post. But unless you can demonstrate how Trump would be better than Harris, your argument doesn\u2019t hold. (Trump has done things in point 3)\n\n\n\n\u201cI refuse to support genocide.\u201d\n\nDo you believe genocide will stop with Trump in office? If not, then how is this protest vote helping? Refusing to vote doesn\u2019t absolve you\u2014it just hands more power to those who will escalate harm.\n\n\n\n\u201cProtest voters didn\u2019t change the outcome.\u201d\n\n1. Kamala lost due to low turnout. Movements like this likely contributed to voter apathy. 2. A wrong action isn\u2019t excused because it\u2019s small. Even minor forces can tip a close election.\n\n\n\nHow to Change My Mind:\n\n1. Show me a tangible, positive political outcome from the \u201cAbandon Harris\u201d movement.\n\n2. Help me empathise with protest voters who felt this was the only option.\n\n3. Any other arguments that are not covered in the counterargument section", "threadA": [{"author": "lukefiskeater", "body": "Based on numerous studies post 2024 of voter data, I'm pretty sure trump won the majority of low propensity voters, based on the data if more people would have came out to vote Harris would have lost by more."}], "threadB": [{"author": "Stonedwarder", "body": "I have three main arguments here\n\n1. For the vast majority of voters their vote for president doesn't matter. As one of these I have no shame in saying that my vote went to Claudia De La Cruz because I liked her better and I live in a deeply red state. Therefore your actual claim would be true only for protest voters in swing states, which is a miniscule member of people relative to the voting population. Add to that decades of voter suppression laws and the growing pile of evidence indicating that the Trump campaign and Elon Musk cheated during the election, and I simply don't see that protest votes changed all that much. \n\n2. The Democrats did run a bad campaign, not just Harris most of the party. This isn't specific to this election but was one of the worst we've seen. While already battling uphill on foreign policy they chose to basically ignore domestic issues and focus solely on an offense strategy based on how bad Donald Trump is. The fact they are right about that was never going to help them, because as we all know politics isn't about who's right, it's about who wins. The closest we got to a domestic policy change was a half hearted \"promise\" to raise the minimum wage delivered less than a month before the election. Regardless how bad your opponent is, you still have to have something people want and they just didn't. While Republicans choose policies they believe will appeal to their base, the Democratic party takes their base for granted and chooses policies that alienate them. Then blame their base when they lose. \n\n3. The voices and votes of Americans are being oppressed and have been for a long time, and while a great deal of that has come from Republicans, the Democrats have done their part to silence us as well. Looking at a two party system where neither party gives a shit about us it's easy to get disillusioned about the efficacy of participating in the process. The common response to that is to simply not participate. This system in its current form cannot exist forever. From this loss the Democrats must realize that their current strategies aren't working and find new ones. The other option is that the party continues to lose traction and is ultimately replaced. While this may end up the better option in the long run it comes with a lot of pain in the short term. Just look at the line of Democratic presidents between the death of the Whig party and the rise of the Republican party. \n\nYou can blame protest voters if you want but that's just a symptom of larger issues and ignoring those issues is what led to this loss, so it's not really a good long term strategy. In politics you either need to actually have sincerity or be good at faking it. Neither party actually has sincerity but Republicans are better at faking it. \n\nTLDR: \n1.Your argument doesn't take the electoral college into account. Most people's votes genuinely don't matter\n2. The Democrats actually did run a bad campaign. So bad that they lost what should have been a gimme. \n3. The Democrats need to change their strategies if they want to win elections, which I'm not convinced that they do. It's not the disillusioned voters fault that the Democrats have bad political strategies."}], "swapped": false}, {"index": 82, "branch_id": "t3_1g97ubh_1", "title": "CMV: My Vote is a waste of time ", "description": "Gonna apologize ahead of time since this point comes up a lot but never addresses my personal attitude. I will also say that I really am approaching this in good faith, I absolutely hate being a pessimist about democracy and want to be confronted with a take that can change my mind for the better, I just have not seen it yet, and I hope by addressing the question at this time to people smarter than I, then I can finally be forced to change my mind on this.\n\nWith such a large body of voters, no vote is going to be so close, a vote sways an election either way. In effect, this means the result of said election is the same with or without your participation.\n\nIf the end result of any event remains the exact same with or without your participation, then what is the point of participating in the first place? Even a vote's recount changes the result by hundreds if not thousands, completely negating the effect of your vote just with a rounding error.\n\nThings that will CMV: any logical line of thinking or statistical proof that my vote, by itself, having some kind of tangible in a nationwide election (large or small). Something that can say MY vote matters enough to make the act of voting worth it. I'm not looking to replace my HOA treasurer, I'm talking about presidents.\n\nWhat I am not looking for: Some appeal to a higher concept, like upkeeping the \"integrity and validity\" of democracy, or anything similar. I'm looking for a straight cause to effect to measure a vote's value, not a morality lecture on how the fate of America is in my hands. Also, nothing I do can bear responsibility for any other person and their actions, so any mention of \"literally millions of missing votes\" is not pertinent to me or my view. In a sentence, IDGAF what other voters are doing so don't bother mentioning them please.", "threadA": [{"author": "Ender_Octanus", "body": "Consider this:\n\nIf your vote is a waste of time, then my vote is a waste of time. If mine is, then my father's is. If his is, the his sister's is. If his sister's is, then her son's is. If her son's is, then his wife's is. If his wife's is, then their neighbor's is. See where this leads? If one vote is pointless, then they all are. So what changes if we all just stop voting? Maybe nobody gets elected, sure, but it's also quite possible that someone you really don't want to take power, takes power.\n\nIf we universalize your belief, then it cannot work. Ergo, it's not a good belief to hold."}], "threadB": [{"author": "Jartblacklung", "body": "I was thinking about this today-  your vote may just be a number, but numbers matter.\n\n\nAs a measure of public sentiment towards issues and/ or candidates, the numbers matter. The *lack of* numbers appears not to. People mention low participation, but neither party appears to make any effort to appeal to the no voter, since they are seen as chronically checked out.\n\n\nBut when a party with some lock on a particular state begins to see the numbers shift, even with their lock intact, but the numbers just shift:  that\u2019s a signal and they will pay attention.\n\n\nAnd if you\u2019re not convinced, here\u2019s a good way to know that numbers do matter:  check out how much energy people put into lying about them.  Crowd sizes for example-  people write this off as pure narcissism but it\u2019s actually quite important.\nFor the same reason astroturfing works well enough to merit effort and resources.\n\n\nI know you\u2019re likely not convinced by any categorical imperative, but it\u2019s just that out true that the more people who think the way you do, the freer reign politicians have to cater exclusively to the crazies.\n\n\nHow much does your vote matter? Well, it matters one many.   But that\u2019s not zero."}], "swapped": true}, {"index": 25, "branch_id": "t3_1lagw9j_1", "title": "CMV: We need to spend less years in school and more years working in an aging society", "description": "Until the Industrial Revolution, most people started working when they could - including in hazardous occupations and worked until they died. It was a horrible existence but I believe the pendulum (in developed countries) has swung too far now.\n\nThe average person lives to 80+ but only enters the work force at 21-22 and work until 65. So they end up supporting 80 years of life with at most 40 years of work. On top of which, we have an aging population and workforce. Most people do degrees they never use and come out saddled with student debt. Pension funds are going to run out soon and this is unsustainable. \n\nMeanwhile demand for trade jobs has been sky high and there simply isn't enough manpower to fill them. \n\nWhen people enter the workforce at 21, already saddled with massive debt, they then spend their early career just staying afloat, put off having families until 30s and struggle to pay mortgages and childcare well unto their retirements. \n\nOther than highly specialized subjects, most jobs can be done with a basic high school education - say 10th grade. Specialized subjects like research or rocket science can be taught on the job anyway.\n\nWe have arbitrarily defined adulthood as somewhere between 18 and 21. Why not 15? \n\nMost 14-16 year olds are just about as physically and mentally capable as an 18-21 year old. Sure, they may have some maturing emotionally but that is hardly a reason to keep them out of the workforce. In fact there are plenty of 20 somethings who are immature today in the workforce. And having them enter the workforce earlier may help them mature better. \n\nReducing the years spent in schooling, having 14-16 year olds enter the workforce (and be legally able to make life decisions such as renting a house or marrying) would greatly help the economy, create a more stable population.\n\nIn fact, this has been true for much of human history. When you were physically ready, you entered manhood or womanhood - not when you randomly turned 18! \n\nBy reducing the years spent in education and limiting college only to highly specialized skillsets (probably even sponsored by the employer), we would create better income equality, a much better trained workforce and a stronger economy. Not to forget, pension funds would be well endowed and people will get their help in their old age - supporting by a strong workforce of younger people entering the work force. ", "threadA": [{"author": "Tydeeeee", "body": "Couple of issues here.\n\nFirst, is that you don't seem to realise that the economy has shifted towards knowledge and skills. We no longer live in an era where manual labor dominates the job market. The 21st century economy increasingly values critical thinking, adaptability, communication, technical expertise, and so on. Learning these skills take time and education. Rolling back on education means less people with these skills and this will inevitably mean we revert back to an industrial economy, with all of the consequences that it brings. Think of it like this, Back in the industrial era, many people suffered greatly because of the working conditions being so poor. We invented machines to alleviate this by a large margin, and if we suddenly lost the brain, and manpower to maintain and operate said machines, the standards we had back then will come back with a vengeance.\n\nSecond, claiming that 14/16 year olds are \"just as capable\" as 18/21 year olds greatly underestimates neuroscience and developmental psychology. The prefrontal cortex doesn't completely mature untill 21 or so and between the ages that you suggest, there are MASSIVE cognitive developments going on. You point to the edge cases where people are either less or more mature for their age but that doesn't say anything tbh, we can't look at edge cases to make large sweeping decisions aimed at the general population.\n\nLast thing i'll touch on, is that you do make a fair argument by pointing out that we overemphasise education at times, sending people into job markets that are already oversaturated and thus leaving them with a degree that they have little chance of using. But this is just a balancing issue, not an argument to completely roll back high education, because for every oversaturated job market, there is another that is desperately looking for skilled workers."}], "threadB": [{"author": "Fifteen_inches", "body": "I\u2019m going to do a rolling thing as I read, sorry if it\u2019s not super uniform \n\n>Until the industrial revolution most people started working when they could\u2026\n\nBefore the industrual revolution people worked when they needed to, and had to wait between workloads. Qualitatively studies showed that peasants were less busy worth work and more busy with household chores.\n\n>the average person lives till 80\u2026with 40 years of work \n\nThe average worker today produces several times his/her value than their lifetime. Worker productivity goes up constantly but compensation lags behind.\n\n>demand for trades is sky high\n\nAnd it takes years to decades to train in those trades, and not everyone has the capacity to do a trade.\n\n>people enter the workforce at 21\u2026\n\nAgreed on all points.\n\n>most jobs can be done with a basic highschool education \n\nAgreed\n\n>why not 15\n\nBecause a 15 year old is not capable of the judgment necessary to do most jobs, which is why they have a narrow scope of work they can do. A 15 y/o shouldn\u2019t drive a forklift for instance or stick their hands in a running factory machine.\n\n>greatly help the economy\n\nIt won\u2019t. Healthier, more educated workers make the economy go. A 15 y/o working as a gas station clerk is losing more by not completely the last 2 years of secondary school than they gain scrubbing toilets.\n\n>by limiting college to specialized skills \n\nSTOP! You\u2019ve created obscurantism. College is imporant for passing on history, science, culture, and everything that makes being human worthwhile. By letting employers decide who should be able to learn what you hand all the power of culture and history to the rich and powerful, widening the gap between the haves and have nots."}], "swapped": true}, {"index": 129, "branch_id": "t3_1g5s219_2", "title": "CMV: The No Child Left Behind and Every Student Succeeds Acts Are Killing Education ", "description": "From my understanding these two acts essentially give schools a grade based on student performance, and allows the states to intervene in the worst performing schools. \n\nMy problem with this is that it incentivises schools to lie about grades and force students to graduate even if they are not ready simply to avoid state sanctions and possibly takeovers. This means the students themselves care less about their education because there are no consequences for performing poorly or not at all. The teachers will be forced by their admin to give them passing grades so that the school continues to look just good enough to avoid intervention. If students don't care to learn, they never will. There *must* be consequences for the students for performing poorly. I understand the idea that schools should simply do better and teach their students properly to avoid punishment, but it's much easier for them to just lie, and so only the schools who are honest are being punished for actually trying to help while dishonest schools are popping out uneducated children who simply got C's and a diploma so admin could keep their jobs", "threadA": [{"author": "iamintheforest", "body": "How is it that the schools are lying on the scores of the standardized tests - the thing that is actually used and not the marks given by teachers?  These are marked, packaged up and sent in for scoring..\n\nSeems you have a misunderstanding of the mechanics of this intervention best I can tell.  Where is the school's opportunity to \"Lie\" on the results of standardized tests that they don't score themselves?"}], "threadB": [{"author": "sheerfire96", "body": "I would argue it\u2019s a growing share of parents who are unable or unwilling to parent their kid and ensure that their kid gives a shit or is at least trying in school.\n\nA child interested in learning on their own accord will perform adequately regardless.\n\nA child who has no interest and pays no attention will be the opposite. NCLB or not, they won\u2019t care if they fail or not, it just doesn\u2019t matter to them, they\u2019re just in school because they have to be.\n\nFor this second case though, an involved parent can make the difference, being on them to give a shit and push them to do better. But we\u2019re seeing multiple hurdles - one is that parents view the schools as having most of the responsibility. This is anecdotal I\u2019ll admit, but the teacher friends I have lament about how they have to essentially be a parent to their students. Part of this also comes from the fact that parents are viewing school as essentially day care while they go work.\n\nAnd this isn\u2019t to say it\u2019s all intentional or malicious, some parents probably don\u2019t give a shit and others are just working their butts off and don\u2019t have the physical mental energy to come home from work, keep the house in order, make food and make sure the kid is studying and trying their best.\n\nNone of these things hinge on NCLB or similar legislation."}], "swapped": true}, {"index": 137, "branch_id": "t3_1ncp2cr_5", "title": "CMV: Allowing a Player Characters death, and making it permeant in any RPG weather it is Tabletop or a Videogame is good and should be the norm, not the exception.", "description": "While my argument here will be widely based on Dungeon Masters and D&D, I feel it extrapolates to basically any system as well as to any RPG Video game in which you are playing a character of your own design. Which is to say, not something like Final Fantasy or Kingdom hearts where you're playing a narrative of someone else's experiences.\n\nIn my experience, both as a player and as a DM, its difficult to push upon players meaningful consequences to their action when they know damn well, \"They aren't going to kill me over this. I'll just get roughed up, give a witty one liner to the guards/thugs, then get up, sleep it off, and go along my merry way without anything of meaning being lost.\"\n\nThis problem can be extended to ANY consequence of ANY action, but I specifically mention death as it seems to be vilified in the RPG space as a thing you shouldn't do.\n\nI've played under many DM's and the most common recourse I see is 'Deus Ex Machina', when the player or players is in any actual danger of death. It rarely does anything but fall flat and reeks of 'I just dont want to commit the sin of killing my players character(s).'\n\nI would challenge that, the spark that give meaning to our actions as players is the fact that if we do not handle ourselves well, if we do not make good decisions, if we choose to be horrendous people (in game) then the direct consequence truly could be that this character is dead, and that would just be the end of it.\n\nWhile DMing, I do the unthinkable and roll in the open. It serves as a warning that \"The dice roll how they roll, and your actions and choices have led you to this fate.\" I reserve the right to not tell my players their enemies stats, of course, so i can still bend things here and there. But if players are making a decision to risk their lives over something, it feels like a disservice to just ... give it to them for free, with no chance of failure.\n\nNow, with video games in particular, I do understand that its not as easy to have this argument. 'Permadeath Modes exist', 'You need to account for mechanical issues that aren't directly the players fault', 'Everyone has fun their own way' (a fair argument to both TTRPG and video games). But its my opinion that permadeath should be the default, and that \"Save/Load anytime\" should be the optional route.\n\nI can think of a couple arguments to this that I'm already on the edge with but just cant find my own way towards viewing them as strong enough to win me over in my own brain.   \n  \nThanks in advance for the read!", "threadA": [{"author": "Icy_River_8259", "body": ">This problem can be extended to ANY consequence of ANY action, but I specifically mention death as it seems to be vilified in the RPG space as a thing you shouldn't do.\n\nThis is because death is the one consequence that sucks *for the player* not just the character.\n\n>I would challenge that, the spark that give meaning to our actions as players is the fact that if we do not handle ourselves well, if we do not make good decisions, if we choose to be horrendous people (in game) then the direct consequence truly could be that this character is dead, and that would just be the end of it.\n\nThat's not true for every player though. For some, the idea of shepherding this character through a long narrative is what gives them the \"spark.\"\n\nBut ultimately this is just a one-size-does-not-fit-all thing. Some groups wanna \"weave stories\" or whatever, and character death gets in the way of that. Some players just wanna throw dice and the threat of death is what makes combat exciting. Some players wanna play old-school style and roll up 10 more or less identical guys and not even give any of them personalities because they know they're one trap away from being disintegrated."}], "threadB": [{"author": "chicken-denim", "body": "I can't find any argument explaining *why* it should be the default. Can you elaborate on that? Why is it better as a default instead of just being able to choose whatever each individual player prefers?"}], "swapped": false}, {"index": 126, "branch_id": "t3_1guf4zf_1", "title": "CMV: Zionism is no different from other successful national movements", "description": "A significant development of the 20th century was ethnic minorities gaining their own nation states. For example, in Europe, the number of states increased from 24 at the start of the century to 45 in 1995. My argument is that Zionism is no different from other national liberation movements, either substantively or historically.\n\nLet's examine common counter-arguments. \n\n1. Zionism caused a large-scale displacement of people\n\nThat is true of many, if not most, other national movements. For example, the creation of modern-day Czechia (formerly Czechoslovakia) and Poland involved the expulsion of over 12M German civilians between 1945-50. The history of Sudeten Germans in those lands dated back 700 years, and their descendants would now outnumber the populations of Czechia and Slovakia combined.\n\nWhile it is true that, under EU treaties, any German *today* can settle in Czechia, this is a unique situation and a major achievement of European diplomacy. Besides, this has only been the case for the last 20 years; prior to that, Sudeten Germans had been demanding their right-of-return and the liberation of \"their homeland\" for decades.\n\nAdditional examples include the 14M Hindu/Muslims who were driven out of Pakistan/India in 1947. Up to 2M people were forcefully moved between Poland and Ukraine in 1944-46. Similarly, 350K Italians were forced out of Yugoslavia. 800K Mizrahi Jews were driven out of the Arab states in 1940-60s and explicitly denied citizenship in many of them. Thousands of Cham Albanians were expelled from Greece. 1.5M civilians were expelled during the Azeri-Armenian wars in 1992-2000. None of these groups got the right-of-return or even compensation. \n\nSome also point to Israel's Law of Return, which allows any ethnic Jew to claim citizenship, while excluding Palestinian Arabs who fled or were expelled. However, giving preference to a particular ethnicity was and continues to be the practice in many nation-states. For instance, in the 1990s, Germany accepted 400k ethnic Germans from the former Soviet Union, whose ancestors had left modern-day German territories in the 17th and 18th centuries. Finland brought in Ingarian Finns, who haven't lived in Finland since 17th century. Armenia today offers citizenship to anyone of 'ethnic Armenian origin,' while denying it to the millions of Azeri expelled during the 1992 war.\n\n2. Jews had not been the demographic majority in modern-day Israel for centuries\n\nFirst, it is important to note that, according to the 1947 Partition Plan, the lands alloted to Jews were precisely those where they already constituted a demographic majority. This demographic status had been achieved through *consentual* land-purchases from Arab/Ottoman landlords, including many members of the Palestinian elite.\n\nSecond, similar scenarios have occured with other national movements, such as in Armenia. Armenian sovereignty was lost in 1375, and the territories of modern-day Armenia eventually fell under the control of the Erivan Khanate. Following the Great Surgun of 1604, ethnic Armenians comprised less than 20% of the population in the region of modern-day Armenia. They only recovered their demographic majority in the 19th century when the Russian Empire conquered the Erivan Khanate from Persia. Over the course of the 19th century, Russia facilitated the resettlement of tens of thousands of Armenians by supporting land purchases and, in some cases, relocating Azeri civilians.\n\n3. Modern-day Israeli Jews are not indigenous to the Middle East\n\nThis is the weakest argument. Other than the fact that over 50% of Israeli Jews are Mizrahim, whose parents were expelled from the Arab states, all evidence points to genetic similarity between all major Jewish groups. I will not be entertaining Khazar conspiracy theories here, nor attempts to deny Jewish history in the land. This is a point where anti-Zionism usually crosses into outright antisemitism.\n\nAnother thing to note is that, much like self-determination is a collective right, indigeneity as a concept applies to entire ethnic groups, rather than individuals. Indigenous peoples are inheritors and practitioners of unique cultures and ways of relating to people and the environment, and in the case of Jews, there is a unique indigenous culture that spans millenia. Note that I am not denying that the Palestinian Arab and, more broadly, Levantine Arab culture has become indigenous too.", "threadA": [{"author": "GiraffeRelative3320", "body": ">3.\u00a0**Modern-day Israeli Jews are not indigenous to the Middle East**\n\n>This is the weakest argument. Other than the fact that over 50% of Israeli Jews are Mizrahim, whose parents were expelled from the Arab states, all evidence points to genetic similarity between all major Jewish groups. \n\nThe Zionist movement was created by Ashkenazi Jews who were from Europe and largely viewed themselves as European. The leaders of the movement clearly positioned themselves as Europeans creating an outpost of Europe in the Middle East. Only after European Jews had created the state of Israel was there a large influx of Mizrahi Jews. So it really makes the most sense to understand Zionism as a European colonial nationalist movement created by Jews who were not indigenous to the middle east that subsequently incorporated (and was accepted by) Mizrahi jews who were indigenous to the middle east.\n\nAlso, saying that Jews are indigenous to the Middle East is quite a different thing from saying that they are indigenous to historical Palestine. There has been a small population of Jews in Palestine for millenia, and no one would argue that they aren't indigenous. That's quite a different thing from arguing that Ashkenazi Jews or Iranian Jews are indigenous to Palestine, especially given that the idea that all Jews are indigenous to Palestine is a very modern concept that Jews from outside of Palestine would not have agreed with 100 or 200 years ago. Even early zionists would not have agreed with that. It's an idea that has only gained steam in service of the legitimation of Zionism in a world that opposes colonialism. \n\n>Another thing to note is that, much like self-determination is a collective right, indigeneity as a concept applies to entire ethnic groups, rather than individuals. Indigenous peoples are inheritors and practitioners of unique cultures and ways of relating to people and the environment, and in the case of Jews, there is a unique indigenous culture that spans millenia. Note that I am not denying that the Palestinian Arab and, more broadly, Levantine Arab culture has become indigenous too.\n\nBut this approach to indigeneity doesn't make much sense. \n\nFirst, ethnic groupings are constantly in flux. The Jewish ethnoreligious category has only recently become a cohesive group. It has subsumed
